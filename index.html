<!DOCTYPE html>
<!-- ops-trainer v4.10 · SaaS wave layout -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, viewport-fit=cover" />
<script>
(function () {
  var mq = window.matchMedia('(max-width: 899px), (hover: none) and (pointer: coarse)');
  function apply() { document.documentElement.classList.toggle('is-mobile', mq.matches); }
  apply();
  if (mq.addEventListener) mq.addEventListener('change', apply);
  else if (mq.addListener) mq.addListener(apply);
})();
</script>
<meta name="color-scheme" content="light" />
<meta name="format-detection" content="telephone=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>MindTraining · 产运思维训练</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Outfit:wght@600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f7;
    --white: #ffffff;
    --wash: #f5f5f7;
    --ink: #1d1d1f;
    --ink2: #6e6e73;
    --ink3: #86868b;
    --line: rgba(0, 0, 0, 0.06);
    --line-strong: rgba(0, 0, 0, 0.1);
    --accent: #0071e3;
    --accent-soft: rgba(0, 113, 227, 0.08);
    --product: #26c281;
    --product-soft: rgba(38, 194, 129, 0.12);
    --btn-green-top: #4ae0ad;
    --btn-green-mid: #32d598;
    --btn-green-base: #26c281;
    --btn-green-lip: #1e9e68;
    --btn-green-glow: rgba(38, 194, 129, 0.38);
    --ops: #0066cc;
    --ops-soft: rgba(0, 102, 204, 0.08);
    --interview: #5e5ce6;
    --interview-soft: rgba(94, 92, 230, 0.08);
    --biz: #30b0a6;
    --biz-soft: rgba(48, 176, 166, 0.08);
    --map: #ac8e68;
    --map-soft: rgba(172, 142, 104, 0.1);
    --wave-1: #e8f0ff;
    --wave-2: #f0e8ff;
    --frost: rgba(255, 255, 255, 0.42);
    --frost-strong: rgba(255, 255, 255, 0.62);
    --frost-solid: rgba(255, 255, 255, 0.78);
    --frost-border: rgba(255, 255, 255, 0.72);
    --frost-edge: rgba(0, 0, 0, 0.05);
    --frost-dark: rgba(29, 29, 31, 0.72);
    --blur-sm: blur(14px) saturate(165%);
    --blur-md: blur(28px) saturate(185%);
    --blur-lg: blur(44px) saturate(200%);
    --inset-hi: inset 0 1px 0 rgba(255, 255, 255, 0.75);
    --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.04);
    --shadow: 0 8px 32px rgba(0, 0, 0, 0.06), 0 2px 8px rgba(0, 0, 0, 0.03);
    --shadow-lg: 0 24px 56px rgba(0, 0, 0, 0.08), 0 8px 20px rgba(0, 0, 0, 0.04);
    --danger: #ff3b30;
    --danger-bg: rgba(255, 59, 48, 0.08);
    --ok: #34c759;
    --r: 12px;
    --r-md: 16px;
    --r-lg: 20px;
    --r-xl: 28px;
    --max: 1080px;
    --sidebar-w: 200px;
    --sidebar-gap: 20px;
    --sans: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'HarmonyOS Sans SC', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --sans-en: 'Syne', 'Outfit', var(--sans);
  }

  html {
    font-size: 16px;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
  }
  html, body {
    overflow-x: hidden;
    max-width: 100%;
  }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    min-height: 100dvh;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    word-break: break-word;
    overflow-wrap: anywhere;
  }

  .bg-scene {
    position: absolute; inset: 0; z-index: 0; pointer-events: none;
    background: linear-gradient(180deg, #e8f2fa 0%, #e4ebf8 45%, #dde8f5 100%);
    overflow: hidden;
  }
  #gate .bg-scene { min-height: 100%; }
  .bg-horizon-svg {
    position: absolute;
    top: 0;
    left: -10%;
    width: 120%;
    height: clamp(300px, 44vh, 480px);
    z-index: 1;
    pointer-events: none;
    will-change: transform;
    animation: horizonPan 28s ease-in-out infinite;
  }
  .bg-horizon-svg path {
    transform-box: fill-box;
    transform-origin: 50% 100%;
    animation: horizonPathSway 14s ease-in-out infinite;
  }
  @keyframes horizonPan {
    0%, 100% { transform: translate3d(0, 0, 0); }
    50% { transform: translate3d(-5%, 0, 0); }
  }
  @keyframes horizonPathSway {
    0%, 100% { transform: translate3d(0, 0, 0) scaleY(1); }
    33% { transform: translate3d(2%, -2%, 0) scaleY(1.018); }
    66% { transform: translate3d(-2%, 1.5%, 0) scaleY(0.985); }
  }
  .bg-wave-svg {
    position: absolute; width: 140%; left: -20%; top: 24%;
    opacity: 0.82;
    will-change: transform;
    z-index: 0;
    animation: wavePan 28s ease-in-out infinite;
  }
  .bg-wave-mid {
    transform-origin: 55% 85%;
    animation: waveDriftMid 14s ease-in-out infinite;
  }
  .bg-wave-back {
    transform-origin: 50% 80%;
    animation: waveDriftBack 18s ease-in-out infinite;
  }
  .bg-wave-front {
    transform-origin: 40% 90%;
    animation: waveDriftFront 11s ease-in-out infinite;
  }
  @keyframes wavePan {
    0%, 100% { transform: translate3d(0, 0, 0); }
    50% { transform: translate3d(-5%, 0, 0); }
  }
  @keyframes waveDriftMid {
    0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
    25% { transform: translate3d(4%, -3%, 0) scale(1.025); }
    50% { transform: translate3d(-3%, 2.5%, 0) scale(0.985); }
    75% { transform: translate3d(2%, -1.5%, 0) scale(1.015); }
  }
  @keyframes waveDriftBack {
    0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
    33% { transform: translate3d(-5%, 2.5%, 0) scale(1.03); }
    66% { transform: translate3d(3.5%, -2%, 0) scale(0.98); }
  }
  @keyframes waveDriftFront {
    0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
    50% { transform: translate3d(6%, -3.5%, 0) scale(1.04); }
  }
  .bg-blob {
    position: absolute; border-radius: 50%; filter: blur(80px);
    opacity: 0.58; will-change: transform;
  }
  .bg-blob-1 {
    width: 480px; height: 480px; top: -100px; right: -80px;
    background: linear-gradient(135deg, rgba(74, 224, 173, 0.55), rgba(184, 212, 255, 0.5));
    animation: blobFloat1 18s ease-in-out infinite;
  }
  .bg-blob-2 {
    width: 360px; height: 360px; bottom: 8%; left: -90px;
    background: linear-gradient(135deg, rgba(212, 245, 224, 0.65), rgba(232, 240, 255, 0.55));
    animation: blobFloat2 24s ease-in-out infinite;
  }
  .bg-blob-3 {
    width: 280px; height: 280px; top: 38%; right: 12%;
    background: linear-gradient(135deg, rgba(38, 194, 129, 0.22), rgba(94, 92, 230, 0.12));
    animation: blobFloat3 20s ease-in-out infinite;
  }
  @keyframes blobFloat3 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(-25px, 30px) scale(1.06); }
  }
  @keyframes blobFloat1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(-30px, 25px) scale(1.08); }
  }
  @keyframes blobFloat2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(40px, -20px) scale(1.05); }
  }
  @media (prefers-reduced-motion: reduce) {
    .bg-horizon-svg, .bg-horizon-svg path, .bg-wave-svg, .bg-wave-mid, .bg-wave-back, .bg-wave-front, .bg-blob-1, .bg-blob-2, .bg-blob-3 { animation: none; }
  }

  .frost-base {
    background: var(--frost);
    backdrop-filter: var(--blur-md);
    -webkit-backdrop-filter: var(--blur-md);
    border: 1px solid var(--frost-border);
    box-shadow: var(--shadow), var(--inset-hi);
  }
  .glass {
    background: var(--frost);
    backdrop-filter: var(--blur-md);
    -webkit-backdrop-filter: var(--blur-md);
    border: 1px solid var(--frost-border);
    box-shadow: var(--shadow-sm), var(--inset-hi);
  }
  .surface {
    background: var(--frost-strong);
    backdrop-filter: var(--blur-lg);
    -webkit-backdrop-filter: var(--blur-lg);
    border: 1px solid var(--frost-border);
    box-shadow: var(--shadow), var(--inset-hi);
  }
  .surface-card {
    background: var(--frost-strong);
    backdrop-filter: var(--blur-md);
    -webkit-backdrop-filter: var(--blur-md);
    border: 1px solid var(--frost-border);
    border-radius: var(--r-xl);
    box-shadow: var(--shadow-sm), var(--inset-hi);
  }
  .surface-card--flat {
    box-shadow: var(--shadow-sm), var(--inset-hi);
    border-radius: var(--r-lg);
  }
  .btn-frost {
    font-family: inherit;
    cursor: pointer;
    background: var(--frost);
    backdrop-filter: var(--blur-sm);
    -webkit-backdrop-filter: var(--blur-sm);
    border: 1px solid var(--frost-border);
    box-shadow: var(--inset-hi), 0 2px 10px rgba(0, 0, 0, 0.04);
    transition: background 0.25s, border-color 0.25s, transform 0.2s, box-shadow 0.25s;
  }
  .btn-frost:hover {
    background: var(--frost-strong);
    border-color: rgba(255, 255, 255, 0.85);
  }
  @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
    .glass, .surface, .surface-card, .btn-frost {
      background: rgba(255, 255, 255, 0.94);
    }
  }

  /* —— 门禁（SaaS Hero） —— */
  #gate {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column;
    padding: 0 max(20px, env(safe-area-inset-right)) 1.5rem max(20px, env(safe-area-inset-left));
    overflow-y: auto;
  }
  #gate.hidden { display: none; }

  .gate-layout {
    position: relative; z-index: 1;
    flex: 1; display: flex; align-items: center; justify-content: center;
    width: 100%; max-width: var(--max); margin: 0 auto;
    padding: 2.5rem 0 3rem;
  }
  .gate-grid {
    display: grid; grid-template-columns: 1fr; gap: 1.5rem;
    width: 100%; align-items: center;
  }
  @media (min-width: 860px) {
    .gate-grid { grid-template-columns: 1.15fr 0.85fr; gap: 2rem; }
  }

  .gate-intro { padding: 0.5rem 0; }
  .gate-intro .hero-brand { margin-bottom: 1rem; }
  .gate-intro h1 {
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 700;
    letter-spacing: -0.035em;
    line-height: 1.08;
    margin-bottom: 1.25rem;
  }
  .gate-intro .lead {
    font-size: 17px; color: var(--ink2); line-height: 1.55;
    max-width: 28em; margin-bottom: 0;
  }
  .gate-actions { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .btn-ghost {
    font-size: 15px; font-weight: 500; color: var(--accent);
    background: none; border: none; cursor: default;
    font-family: inherit; padding: 0;
  }
  .gate-card {
    padding: 2rem; border-radius: var(--r-xl);
    background: var(--frost-solid);
    backdrop-filter: var(--blur-lg);
    -webkit-backdrop-filter: var(--blur-lg);
    border: 1px solid var(--frost-border);
    box-shadow: var(--shadow-lg), var(--inset-hi);
  }
  .gate-card h2 {
    font-size: 22px; font-weight: 700; letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  .gate-card .sub { font-size: 15px; color: var(--ink2); margin-bottom: 1.75rem; line-height: 1.5; }
  .gate-field label {
    display: block; font-size: 12px; font-weight: 500;
    color: var(--ink3); margin-bottom: 8px;
  }
  .gate-field input {
    width: 100%; height: 48px; padding: 0 16px;
    font-size: 16px; font-family: inherit;
    border: 1px solid var(--frost-border); border-radius: var(--r);
    background: rgba(255, 255, 255, 0.5);
    backdrop-filter: var(--blur-sm);
    -webkit-backdrop-filter: var(--blur-sm);
    outline: none;
    box-shadow: var(--inset-hi);
  }
  .gate-field input:focus {
    border-color: rgba(255, 255, 255, 0.9);
    background: rgba(255, 255, 255, 0.65);
    box-shadow: var(--inset-hi), 0 0 0 4px rgba(48, 209, 88, 0.12);
  }
  .gate-remember {
    display: flex; align-items: center; gap: 8px;
    margin: 14px 0 1.25rem; font-size: 13px; color: var(--ink2);
    cursor: pointer;
  }
  .btn-enter, .btn-primary {
    font-size: 15px; font-weight: 600; font-family: inherit;
    color: #fff;
    border: none;
    border-radius: 980px;
    cursor: pointer;
    position: relative;
    background: linear-gradient(
      180deg,
      var(--btn-green-top) 0%,
      var(--btn-green-mid) 38%,
      var(--btn-green-base) 100%
    );
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.48),
      inset 0 -1px 0 rgba(0, 0, 0, 0.08),
      0 5px 0 var(--btn-green-lip),
      0 10px 24px var(--btn-green-glow);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .btn-enter { width: 100%; height: 48px; }
  .btn-enter:hover, .btn-primary:hover {
    background: linear-gradient(
      180deg,
      #55e6b8 0%,
      #3adba2 38%,
      #2bcc8a 100%
    );
    transform: translateY(-1px);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.55),
      inset 0 -1px 0 rgba(0, 0, 0, 0.06),
      0 6px 0 var(--btn-green-lip),
      0 14px 30px rgba(38, 194, 129, 0.44);
  }
  .btn-enter:active, .btn-primary:active {
    transform: translateY(4px);
    background: linear-gradient(
      180deg,
      var(--btn-green-mid) 0%,
      var(--btn-green-base) 55%,
      #22b078 100%
    );
    box-shadow:
      inset 0 2px 5px rgba(0, 0, 0, 0.18),
      inset 0 1px 0 rgba(255, 255, 255, 0.28),
      0 1px 0 var(--btn-green-lip),
      0 5px 16px rgba(38, 194, 129, 0.28);
  }
  .btn-enter:disabled, .btn-primary:disabled {
    opacity: 0.52;
    cursor: not-allowed;
    transform: none;
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.3),
      0 3px 0 var(--btn-green-lip),
      0 6px 14px rgba(38, 194, 129, 0.18);
  }
  .gate-error {
    margin-top: 12px; padding: 11px 14px; font-size: 13px;
    color: var(--danger); background: var(--danger-bg);
    border-radius: var(--r); display: none;
  }
  .gate-error.visible { display: block; }
  .gate-hint { margin-top: 1rem; font-size: 11px; color: var(--ink3); text-align: center; }

  /* —— 主应用 —— */
  #app { display: none; position: relative; z-index: 1; min-height: 100vh; }
  #app.visible { display: flex; flex-direction: column; }

  .btn-exit {
    position: fixed;
    top: max(14px, env(safe-area-inset-top));
    right: max(18px, env(safe-area-inset-right));
    z-index: 20;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink2);
    padding: 8px 16px;
    border-radius: 980px;
    cursor: pointer;
    background: var(--frost);
    backdrop-filter: var(--blur-sm);
    -webkit-backdrop-filter: var(--blur-sm);
    border: 1px solid var(--frost-border);
    box-shadow: var(--inset-hi), 0 2px 10px rgba(0, 0, 0, 0.04);
    transition: background 0.2s, color 0.2s, border-color 0.2s;
  }
  .btn-exit:hover {
    color: var(--ink);
    background: var(--frost-strong);
    border-color: rgba(255, 255, 255, 0.85);
  }

  .page-wrap {
    position: relative; z-index: 1;
    max-width: var(--max); margin: 0 auto;
    padding: 0 24px 3rem; width: 100%;
  }

  .hero-compact {
    position: relative;
    padding: 2.25rem 0 1.5rem;
    max-width: 720px;
    isolation: isolate;
  }
  .hero-eyebrow-row {
    display: flex;
    align-items: center;
    gap: clamp(12px, 3vw, 28px);
    margin-bottom: 0.65rem;
    min-height: 92px;
  }
  .hero-eyebrow-row .eyebrow {
    flex: 0 0 auto;
    margin-bottom: 0;
    line-height: 1.3;
  }
  .hero-waveform {
    position: relative;
    z-index: 0;
    flex: 1 1 auto;
    min-width: 140px;
    max-width: min(480px, 58vw);
    height: 92px;
    pointer-events: none;
    opacity: 0.68;
    -webkit-mask-image: linear-gradient(90deg, transparent 0%, rgba(0, 0, 0, 0.35) 12%, rgba(0, 0, 0, 0.92) 42%, rgba(0, 0, 0, 0.55) 100%);
    mask-image: linear-gradient(90deg, transparent 0%, rgba(0, 0, 0, 0.35) 12%, rgba(0, 0, 0, 0.92) 42%, rgba(0, 0, 0, 0.55) 100%);
  }
  .hero-copy {
    position: relative;
    z-index: 1;
  }
  @media (max-width: 720px) {
    .hero-eyebrow-row {
      flex-wrap: wrap;
      min-height: 0;
      gap: 0.35rem 0.75rem;
      margin-bottom: 0.6rem;
    }
    .hero-waveform {
      flex: 1 1 100%;
      max-width: none;
      height: 80px;
      opacity: 0.52;
    }
  }
  .hero-compact::before {
    content: '';
    position: absolute;
    inset: -24px -40px auto -20px;
    height: 200px;
    border-radius: 48px;
    background: radial-gradient(ellipse 90% 100% at 20% 0%, rgba(38, 194, 129, 0.1), transparent 68%),
                radial-gradient(ellipse 70% 80% at 80% 20%, rgba(184, 212, 255, 0.18), transparent 72%);
    pointer-events: none;
    z-index: -1;
  }
  .hero-brand {
    font-family: var(--sans-en);
    font-size: clamp(2.25rem, 5.5vw, 3.35rem);
    line-height: 1.12;
    margin-bottom: 1.1rem;
    letter-spacing: -0.04em;
    white-space: nowrap;
  }
  .hero-brand .hb-mind {
    font-weight: 800;
    letter-spacing: -0.045em;
    color: #141416;
  }
  .hero-brand .hb-train {
    font-family: 'Outfit', var(--sans);
    font-weight: 700;
    letter-spacing: -0.028em;
    color: var(--btn-green-base);
  }
  .hero-copy .eyebrow {
    font-size: 12px; font-weight: 600; color: var(--accent);
    margin-bottom: 0.75rem; letter-spacing: 0.02em;
  }
  .hero-copy h1 {
    font-size: clamp(1.75rem, 4vw, 2.35rem);
    font-weight: 700; letter-spacing: -0.035em;
    line-height: 1.12; margin-bottom: 0.75rem;
  }
  .hero-copy .desc {
    font-size: 15px; color: var(--ink2); line-height: 1.6;
    max-width: 36em;
  }

  .sync-bar {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--ink3);
    padding: 12px 16px; border-radius: var(--r-lg);
    margin-bottom: 1rem;
  }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ink3); }
  .sync-dot.ok { background: var(--ok); }
  .sync-dot.err { background: var(--danger); }

  .workspace-shell {
    border-radius: var(--r-xl);
    padding: 20px;
    margin-bottom: 1rem;
    overflow: visible;
    background: var(--frost-strong);
    border: 1px solid var(--frost-border);
    box-shadow: var(--shadow-sm), var(--inset-hi);
  }
  .workspace {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr;
    gap: 1rem;
    align-items: start;
  }
  @media (min-width: 900px) {
    .workspace {
      display: grid;
      grid-template-columns: var(--sidebar-w) minmax(0, 1fr);
      gap: var(--sidebar-gap);
      align-items: start;
    }
    .workspace-aside {
      position: static;
    }
    .train-main {
      overflow: visible;
    }
  }

  .module-nav {
    border-radius: var(--r-xl);
    padding: 8px;
    flex-shrink: 0;
    background: var(--frost);
    backdrop-filter: var(--blur-md);
    -webkit-backdrop-filter: var(--blur-md);
    border: 1px solid var(--frost-border);
    box-shadow: var(--inset-hi), 0 4px 20px rgba(0, 0, 0, 0.04);
  }
  @media (min-width: 900px) {
    .module-nav {
      width: 100%;
    }
  }
  .nav-group {
    border-radius: var(--r-md);
    margin-bottom: 8px;
    background: rgba(255, 255, 255, 0.28);
    backdrop-filter: var(--blur-sm);
    -webkit-backdrop-filter: var(--blur-sm);
    border: 1px solid rgba(255, 255, 255, 0.45);
  }
  .nav-group-head {
    padding: 8px 10px 4px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    display: flex;
    align-items: center;
    justify-content: space-between;
    user-select: none;
    pointer-events: none;
  }
  .nav-group.cat-product .nav-group-head { color: var(--product); }
  .nav-group.cat-product .nav-summary-count {
    background: var(--product-soft); color: var(--product);
  }

<script>
const GITHUB_TOPICS_URL = '';

const CODE_KEY = 'ops-access-code';
const SESSION_UNTIL_KEY = 'ops-session-until';
const REMEMBER_DAYS = 7;

let accessCode = '';
let TOPICS = [];
let activeTopicId = '';
/** @type {Record<string, { scenario: string, answer: string, feedback: string, history: {q:string,a:string}[] }>} */
const mentorSessions = {};

const gate = document.getElementById('gate');
const app = document.getElementById('app');
const gateCode = document.getElementById('gateCode');
const gateBtn = document.getElementById('gateBtn');
const gateError = document.getElementById('gateError');

/**
 * 侧栏精简模块：每项对应一个训练入口，poolIds 合并同类题库（题目不删，随机池更大）
 */
const CURRICULUM = {
  product: [
    { label: '用户需求挖掘', id: 'user', desc: '表面反馈 vs 核心需求' },
    { label: '功能与交互', id: 'feature', poolIds: ['feature', 'interaction'], desc: '方案取舍 · 信息架构' },
    { label: '竞品与产品判断', id: 'competitor', poolIds: ['competitor', 'iv-pm'], desc: '战略意图 · 需求真伪' }
  ],
  ops: [
    { label: '经营与决策', id: 'decision', poolIds: ['decision', 'data', 'content', 'crisis'], desc: '决策 · 数据 · 传播 · 舆情' },
    { label: '增长与留存', id: 'growth', poolIds: ['growth', 'retention'], desc: 'AARRR · 用户分层' },
    { label: '产运策略', id: 'iv-ops', poolIds: ['iv-ops', 'iv-open'], desc: '增长商业化 · 平台博弈' },
    { label: '行业商业', id: 'biz-platform', poolIds: ['biz-platform', 'biz-vertical', 'biz-monetize', 'map-ride', 'map-local'], desc: '平台 · 垂直 · 出行与本地生活' }
  ],
  interview: [
    { label: '面试 · 产品实操', id: 'prod-open', poolIds: ['prod-open', 'iv-skills'], desc: '设计开放题 · PM 方法' },
    { label: '求职表达', id: 'iv-exp', poolIds: ['iv-exp', 'iv-self', 'iv-career', 'iv-misc'], desc: 'STAR · 优势困难 · 规划动机' }
  ]
};

function curriculumPoolIds(mod) {
  return mod.poolIds || [mod.id];
}

function buildNavMeta() {
  const map = new Map();
  CURRICULUM.product.forEach(m => map.set(m.id, m));
  CURRICULUM.ops.forEach(m => map.set(m.id, m));
  CURRICULUM.interview.forEach(m => map.set(m.id, m));
  return map;
}

function navCategory(id) {
  if (CURRICULUM.interview.some(m => m.id === id)) {
    return { cat: 'interview', catLabel: '面试通用问题' };
  }
  const t = getTopic(id);
  return meta(t);
}
let NAV_META = null;

function getNavModule(id) {
  if (!NAV_META) NAV_META = buildNavMeta();
  return NAV_META.get(id);
}

function meta(topicOrId) {
  const t = typeof topicOrId === 'string' ? getTopic(topicOrId) : topicOrId;
  if (!t) return { cat: 'ops', catLabel: '运营思维', desc: '' };
  const cat = t.cat === 'product' ? 'product' : 'ops';
  const catLabel = t.catLabel || (cat === 'product' ? '产品思维' : '运营思维');
  return { cat, catLabel, desc: t.desc || '' };
}

function topicMap() {
  return new Map(TOPICS.map(t => [t.id, t]));
}

function countScenarios(list) {
  return list.reduce((n, t) => n + (t.scenarios?.length || 0), 0);
}

function countModuleScenarios(mod, map) {
  return curriculumPoolIds(mod).reduce((n, id) => {
    const t = map.get(id);
    return n + (t?.scenarios?.length || 0);
  }, 0);
}

function topicsByCategory() {
  const map = topicMap();
  const product = CURRICULUM.product.map(m => map.get(m.id)).filter(Boolean);
  const ops = CURRICULUM.ops.map(m => map.get(m.id)).filter(Boolean);
  const interview = CURRICULUM.interview.map(m => map.get(m.id)).filter(Boolean);
  return { product, ops, interview, ordered: [...product, ...ops, ...interview] };
}

function topicsUrl() {
  const base = GITHUB_TOPICS_URL.trim() || 'topics.json';
  const sep = base.includes('?') ? '&' : '?';
  return base + sep + 't=' + Date.now();
}

function setSyncStatus(ok, text) {
  const bar = document.getElementById('syncBar');
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  if (!bar || !dot || !txt) return;
  if (ok) {
    bar.hidden = true;
    bar.classList.add('sync-bar--hidden');
    return;
  }
  bar.hidden = false;
  bar.classList.remove('sync-bar--hidden');
  dot.className = 'sync-dot err';
  txt.textContent = text;
}

function showGateError(msg) {
  gateError.textContent = msg;
  gateError.classList.add('visible');
}
function hideGateError() {
  gateError.classList.remove('visible');
}

function isSessionValid() {
  const v = localStorage.getItem(SESSION_UNTIL_KEY);
  return v ? Date.now() < Number(v) : false;
}

function clearSession() {
  accessCode = '';
  sessionStorage.removeItem(CODE_KEY);
  localStorage.removeItem(CODE_KEY);
  localStorage.removeItem(SESSION_UNTIL_KEY);
}

function logoutApp() {
  clearSession();
  Object.keys(mentorSessions).forEach(k => delete mentorSessions[k]);
  lockApp();
}

function unlockApp() {
  gate.classList.add('hidden');
  app.classList.add('visible');
  if (!document.documentElement.classList.contains('is-mobile')) {
    initHeroWaveform();
  }
}

function lockApp() {
  gate.classList.remove('hidden');
  app.classList.remove('visible');
  gateCode.value = '';
  hideGateError();
}

function authHeaders(code) {
  return {
    'Content-Type': 'application/json',
    'X-Access-Code': code
  };
}

async function verifyCode(code) {
  const headers = {
    'Content-Type': 'application/json',
    'X-Access-Code': code,
    'X-Verify-Only': '1'
  };
  const payload = JSON.stringify({ action: 'verify', accessCode: code });
  let res = await fetch('/api/verify', { method: 'POST', headers: { 'X-Access-Code': code } });
  if (res.status === 404 || res.status === 400) {
    res = await fetch('/api/chat', { method: 'POST', headers, body: payload });
  }
  const data = await res.json().catch(() => ({}));
  if (res.ok && data.ok) return { ok: true };
  if (res.status === 401) return { ok: false, msg: '访问码无效，请与 Vercel 中 ACCESS_CODE 一致' };
  if (res.status === 500) return { ok: false, msg: data.error || '请配置 ACCESS_CODE' };
  return { ok: false, msg: data.error || '验证失败（HTTP ' + res.status + '）' };
}

async function tryEnter(code, remember) {
  gateBtn.disabled = true;
  gateBtn.textContent = '验证中…';
  hideGateError();
  try {
    const result = await verifyCode(code);
    if (!result.ok) { showGateError(result.msg); return false; }
    accessCode = code;
    sessionStorage.setItem(CODE_KEY, accessCode);
    if (remember) {
      localStorage.setItem(CODE_KEY, accessCode);
      localStorage.setItem(SESSION_UNTIL_KEY, String(Date.now() + REMEMBER_DAYS * 86400000));
    }
    unlockApp();
    await loadTopicsAndRender();
    return true;
  } catch (e) {
    showGateError('无法连接服务：' + e.message);
    return false;
  } finally {
    gateBtn.disabled = false;
    gateBtn.textContent = '开始训练';
  }
}

async function loadTopics() {
  const res = await fetch(topicsUrl(), { cache: 'no-store' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  if (!Array.isArray(data.topics) || !data.topics.length) throw new Error('topics 格式错误');
  const topics = data.topics;
  for (const topicsFile of ['topics-interview.json', 'topics-biz.json', 'topics-map.json']) {
    try {
      const tr = await fetch(topicsFile + '?t=' + Date.now(), { cache: 'no-store' });
      if (tr.ok) {
        const trData = await tr.json();
        if (Array.isArray(trData.topics)) topics.push(...trData.topics);
      }
    } catch (_) { /* 可选 */ }
  }
  for (const file of [
    'scenarios-extra.json',
    'scenarios-industry-ota.json',
    'scenarios-industry-ecommerce.json',
    'scenarios-industry-community.json',
    'scenarios-industry-instant-retail.json',
    'scenarios-interview-pm.json',
    'scenarios-interview-misc.json',
    'scenarios-interview-skills.json',
    'scenarios-interview-ops.json',
    'scenarios-interview-open.json',
    'scenarios-interview-biz.json',
    'scenarios-industry-map.json'
  ]) {
    try {
      const ex = await fetch(file + '?t=' + Date.now(), { cache: 'no-store' });
      if (!ex.ok) continue;
      const extra = await ex.json();
      topics.forEach(t => {
        const list = extra[t.id];
        if (!Array.isArray(list)) return;
        list.forEach(s => {
          if (typeof s === 'string' && s.trim()) t.scenarios.push(s.trim());
        });
      });
    } catch (_) { /* 可选文件 */ }
  }
  return topics;
}

function totalScenarios() {
  return TOPICS.reduce((n, t) => n + t.scenarios.length, 0);
}

function updateModuleHead(id) {
  const t = getTopic(id);
  const mod = getNavModule(id);
  const m = navCategory(id);
  const head = document.getElementById('moduleHead');
  if (!head || !t) return;
  head.innerHTML = `
    <span class="mh-cat ${m.cat}">${m.catLabel}</span>
    <h2>${escapeHtml(mod ? mod.label : t.label)}</h2>
    <p>${escapeHtml(mod ? mod.desc : (t.desc || ''))}</p>
  `;
}

function appendModuleBtn(parent, t, mod, isActive, navCat) {
  const m = navCat || meta(t);
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'module-item cat-' + m.cat + (isActive ? ' active' : '');
  btn.dataset.id = t.id;
  btn.innerHTML = `
    <span class="mi-label">${escapeHtml(mod.label)}</span>
    <span class="mi-desc">${escapeHtml(mod.desc)}</span>
  `;
  btn.onclick = () => switchTab(t.id, btn);
  parent.appendChild(btn);
  return btn;
}

function renderNavGroup(nav, cat, catLabel, modules, topicById, firstActiveRef) {
  const topics = modules.map(m => topicById.get(m.id)).filter(Boolean);
  const q = modules.reduce((n, m) => n + countModuleScenarios(m, topicById), 0);
  const navMeta = { cat, catLabel };
  const group = document.createElement('div');
  group.className = 'nav-group cat-' + cat;
  const head = document.createElement('div');
  head.className = 'nav-group-head';
  head.innerHTML = `${escapeHtml(catLabel)}<span class="nav-summary-count">${modules.length} 模块</span>`;
  group.appendChild(head);
  const body = document.createElement('div');
  body.className = 'nav-group-body';
  modules.forEach(mod => {
    const t = topicById.get(mod.id);
    if (!t) return;
    appendModuleBtn(body, t, mod, firstActiveRef.value, navMeta);
    if (firstActiveRef.value) firstActiveRef.value = false;
  });
  group.appendChild(body);
  nav.appendChild(group);
  return { topics, q };
}

function renderTopics() {
  NAV_META = buildNavMeta();
  const main = document.getElementById('mainContent');
  main.classList.remove('loading-main');
  const { product, ops, interview, ordered } = topicsByCategory();
  const topicById = topicMap();
  main.innerHTML = `
    <div class="workspace-shell">
      <div class="workspace">
        <aside class="workspace-aside" aria-label="训练模块">
          <nav class="module-nav" id="moduleNav"></nav>
        </aside>
        <div class="train-main">
          <div class="module-head" id="moduleHead"></div>
          <div id="panels"></div>
        </div>
      </div>
    </div>
  `;

  const nav = document.getElementById('moduleNav');
  const panels = document.getElementById('panels');
  const firstActiveRef = { value: true };
  renderNavGroup(nav, 'product', '产品思维', CURRICULUM.product, topicById, firstActiveRef);
  renderNavGroup(nav, 'ops', '运营思维', CURRICULUM.ops, topicById, firstActiveRef);
  renderNavGroup(nav, 'interview', '面试通用问题', CURRICULUM.interview, topicById, firstActiveRef);

  let firstActive = true;
  ordered.forEach((t) => {
    const panel = document.createElement('div');
    panel.className = 'panel' + (firstActive ? ' active' : '');
    firstActive = false;
    panel.id = 'panel-' + t.id;
    panel.innerHTML = `
      <div class="train-flow">
        <article class="surface-card case-card">
          <div class="case-head">
            <span>业务场景</span>
            <button type="button" class="btn-refresh" data-reload="${t.id}">换一题</button>
      </div>
          <div class="case-body" id="scenario-${t.id}"></div>
        </article>
        <div class="surface-card work-card">
          <div class="work-block">
            <div class="wb-label">你的分析</div>
            <div class="wb-hint">${escapeHtml(t.fieldLabel)}</div>
            <textarea id="answer-${t.id}" placeholder="${escapeAttr(t.placeholder)}"></textarea>
          </div>
        </div>
        <div class="surface-card surface-card--flat action-card">
      <div class="btn-row">
            <button class="btn-primary" id="btn-${t.id}" type="button">提交 · 获取 AI 点评</button>
      </div>
        </div>
        <div class="surface-card feedback-card" id="resp-${t.id}">
          <div class="feedback-head">AI 导师点评</div>
          <div class="feedback-body" id="resp-body-${t.id}"></div>
          <div class="followup-wrap" id="followup-${t.id}">
            <div class="followup-label">继续追问导师</div>
            <div class="followup-thread" id="followup-thread-${t.id}"></div>
            <div class="followup-compose">
              <textarea id="followup-input-${t.id}" rows="2" maxlength="800" placeholder="针对点评继续提问…" disabled></textarea>
              <p class="followup-hint">Enter 发送 · Shift+Enter 换行</p>
              <button type="button" class="btn-followup" id="followup-btn-${t.id}" disabled>发送追问</button>
            </div>
          </div>
        </div>
      </div>
    `;
    panels.appendChild(panel);
    panel.querySelector('[data-reload]').onclick = () => loadScenario(t.id);
    document.getElementById('btn-' + t.id).onclick = () => submitAnswer(t.id);
    initFollowUp(t.id);
    loadScenario(t.id);
  });

  activeTopicId = ordered[0].id;
  updateModuleHead(activeTopicId);
  setupMobileModuleNav(ordered);
}

async function loadTopicsAndRender() {
  try {
    TOPICS = await loadTopics();
    setSyncStatus(true);
    renderTopics();
  } catch (e) {
    setSyncStatus(false, '加载失败：' + e.message);
    document.getElementById('mainContent').innerHTML =
      '<p style="color:var(--danger);text-align:center;padding:3rem">无法加载场景数据</p>';
  }
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escapeAttr(s) {
  return escapeHtml(s).replace(/"/g,'&quot;');
}

function getTopic(id) {
  return TOPICS.find(t => t.id === id);
}

function switchTab(id, el) {
  activeTopicId = id;
  document.querySelectorAll('.module-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  if (el) el.classList.add('active');
  else {
    const btn = document.querySelector('.module-item[data-id="' + id + '"]');
    if (btn) btn.classList.add('active');
  }
  const mobileSel = document.getElementById('mobileModuleSelect');
  if (mobileSel && mobileSel.value !== id) mobileSel.value = id;
  document.getElementById('panel-' + id).classList.add('active');
  updateModuleHead(id);
  const head = document.getElementById('moduleHead');
  if (head) head.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function setupMobileModuleNav(ordered) {
  const aside = document.querySelector('.workspace-aside');
  const nav = document.getElementById('moduleNav');
  if (!aside || !nav) return;
  const existing = document.getElementById('mobileModuleSelect');
  const isMobile = window.matchMedia('(max-width: 899px), (hover: none) and (pointer: coarse)').matches;
  if (!isMobile) {
    if (existing) existing.remove();
    const label = document.getElementById('mobileModuleLabel');
    if (label) label.remove();
    return;
  }
  let label = document.getElementById('mobileModuleLabel');
  if (!label) {
    label = document.createElement('label');
    label.id = 'mobileModuleLabel';
    label.className = 'mobile-module-label';
    label.htmlFor = 'mobileModuleSelect';
    label.textContent = '切换训练模块';
    aside.insertBefore(label, nav);
  }
  let select = existing;
  if (!select) {
    select = document.createElement('select');
    select.id = 'mobileModuleSelect';
    select.className = 'mobile-module-select';
    select.setAttribute('aria-label', '选择训练模块');
    aside.insertBefore(select, nav);
    select.addEventListener('change', () => {
      switchTab(select.value, null);
    });
  }
  select.innerHTML = '';
  ordered.forEach(t => {
    const mod = getNavModule(t.id);
    const opt = document.createElement('option');
    opt.value = t.id;
    opt.textContent = mod ? mod.label : t.label;
    if (t.id === activeTopicId) opt.selected = true;
    select.appendChild(opt);
  });
}

function filterScenarioPool(navId, list) {
  if (navId === 'prod-open') {
    const pd = list.filter(s => typeof s === 'string' && (s.includes('【面试·产品设计·') || s.includes('【面试·')));
    return pd.length ? pd : list;
  }
  if (navId === 'iv-exp' || navId.startsWith('iv-')) {
    const iv = list.filter(s => typeof s === 'string' && s.includes('【面试·'));
    return iv.length ? iv : list;
  }
  if (navId === 'biz-platform' || navId.startsWith('biz-') || navId.startsWith('map-')) {
    const bz = list.filter(s => typeof s === 'string' && (s.includes('【业务分析·') || s.includes('【地图·')));
    return bz.length ? bz : list;
  }
  return list;
}

function scenariosForNavModule(navId) {
  const mod = getNavModule(navId);
  if (!mod) {
    const t = getTopic(navId);
    return t?.scenarios || [];
  }
  let list = [];
  curriculumPoolIds(mod).forEach(id => {
    const t = getTopic(id);
    if (t?.scenarios?.length) list.push(...t.scenarios);
  });
  return filterScenarioPool(navId, list);
}

function pickScenarios(topic) {
  const navId = topic.id || '';
  const pooled = scenariosForNavModule(navId);
  if (pooled.length) return pooled;
  return topic.scenarios || [];
}

function answerHintForScenario(scenarioText, fallback) {
  if (!scenarioText) return fallback || '请阅读上方场景，结构化写出你的分析。';
  const body = scenarioText.replace(/^【[^】]+】\s*/, '').trim();
  const ask = body.match(/请[^。；？]+[。；？]?/);
  if (ask) return ask[0].replace(/[。；]$/, '') + '。';
  const q = body.match(/[^。；]*？/);
  if (q) return '请回答：' + q[0].trim();
  if (/面试官问：/.test(body)) {
    const part = body.split(/[。；]/)[0];
    return part + '。';
  }
  if (/：[^：]{10,}/.test(body) && !body.includes('？') && !/请|如何|怎么|面试官/.test(body)) {
    const idx = body.indexOf('：');
    const head = body.slice(0, idx);
  return '请围绕「' + head + '」按要求作答：' + body.slice(idx + 1).replace(/[。.]$/, '') + '。';
  }
  return fallback || '请阅读上方场景，写出你的分析思路、依据与可验证的下一步。';
}

function loadScenario(id) {
  const t = getTopic(id);
  const pool = pickScenarios(t);
  if (!pool.length) {
    document.getElementById('scenario-' + id).textContent = '本题库暂无题目，请检查 scenarios-interview-pm.json';
    return;
  }
  const idx = Math.floor(Math.random() * pool.length);
  const scenario = pool[idx];
  document.getElementById('scenario-' + id).textContent = scenario;
  const hintEl = document.querySelector('#panel-' + id + ' .wb-hint');
  if (hintEl) hintEl.textContent = answerHintForScenario(scenario, t.fieldLabel);
  document.getElementById('answer-' + id).value = '';
  const resp = document.getElementById('resp-' + id);
  if (resp) resp.classList.remove('visible');
  clearMentorSession(id);
}

function clearMentorSession(id) {
  delete mentorSessions[id];
  const wrap = document.getElementById('followup-' + id);
  const thread = document.getElementById('followup-thread-' + id);
  const input = document.getElementById('followup-input-' + id);
  const btn = document.getElementById('followup-btn-' + id);
  if (wrap) wrap.classList.remove('visible');
  if (thread) thread.innerHTML = '';
  if (input) { input.value = ''; input.disabled = true; }
  if (btn) { btn.disabled = true; btn.textContent = '发送追问'; }
}

function initFollowUp(id) {
  const input = document.getElementById('followup-input-' + id);
  const btn = document.getElementById('followup-btn-' + id);
  if (!input || !btn) return;
  btn.onclick = () => submitFollowUp(id);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!btn.disabled) submitFollowUp(id);
    }
  });
}

function enableFollowUp(id) {
  const wrap = document.getElementById('followup-' + id);
  const input = document.getElementById('followup-input-' + id);
  const btn = document.getElementById('followup-btn-' + id);
  if (wrap) wrap.classList.add('visible');
  if (input) input.disabled = false;
  if (btn) btn.disabled = false;
}

function appendFollowUpBubble(id, role, text, pending) {
  const thread = document.getElementById('followup-thread-' + id);
  if (!thread) return null;
  const el = document.createElement('div');
  el.className = 'fu-msg ' + role + (pending ? ' pending' : '');
  if (pending) {
    el.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
  } else {
    el.textContent = text;
  }
  thread.appendChild(el);
  thread.scrollTop = thread.scrollHeight;
  return el;
}

async function submitFollowUp(id) {
  if (!accessCode) { lockApp(); return; }
  const session = mentorSessions[id];
  if (!session?.feedback) {
    alert('请先完成首轮作答并获取 AI 点评');
    return;
  }
  const input = document.getElementById('followup-input-' + id);
  const btn = document.getElementById('followup-btn-' + id);
  const question = (input?.value || '').trim();
  if (!question) { alert('请输入追问内容'); return; }

  const t = getTopic(id);
  btn.disabled = true;
  input.disabled = true;
  btn.textContent = '回复中…';
  appendFollowUpBubble(id, 'user', question, false);
  input.value = '';
  const pending = appendFollowUpBubble(id, 'assistant', '', true);

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: authHeaders(accessCode),
      body: JSON.stringify({
        accessCode,
        topic: id,
        mode: 'followup',
        systemPrompt: t.systemPrompt,
        scenario: session.scenario,
        answer: session.answer,
        priorFeedback: session.feedback,
        history: session.history,
        question
      })
    });
    let data = {};
    const raw = await res.text();
    try { data = raw ? JSON.parse(raw) : {}; } catch { /* */ }

    if (pending) pending.remove();
    if (res.ok && data.text) {
      session.history.push({ q: question, a: data.text });
      appendFollowUpBubble(id, 'assistant', data.text, false);
    } else if (res.status === 401) {
      appendFollowUpBubble(id, 'assistant', '访问码已失效，请重新登录。', false);
      setTimeout(() => { clearSession(); lockApp(); }, 2000);
    } else if (res.status === 429) {
      appendFollowUpBubble(id, 'assistant', data.error || '今日次数已达上限', false);
    } else {
      appendFollowUpBubble(id, 'assistant', data.error || ('请求失败（HTTP ' + res.status + '）'), false);
    }
  } catch (e) {
    if (pending) pending.remove();
    appendFollowUpBubble(id, 'assistant', '网络错误：' + e.message, false);
  }

  btn.disabled = false;
  input.disabled = false;
  btn.textContent = '发送追问';
  input.focus();
}

async function submitAnswer(id) {
  if (!accessCode) { lockApp(); return; }
  const answer = document.getElementById('answer-' + id).value.trim();
  if (!answer) { alert('请先写下你的分析'); return; }

  const t = getTopic(id);
  const scenario = document.getElementById('scenario-' + id).textContent;
  const btn = document.getElementById('btn-' + id);
  const respArea = document.getElementById('resp-' + id);
  const respBody = document.getElementById('resp-body-' + id);

  btn.disabled = true;
  btn.textContent = '点评生成中…';
  respArea.classList.add('visible');
  respBody.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: authHeaders(accessCode),
      body: JSON.stringify({
        accessCode,
        topic: id,
        systemPrompt: t.systemPrompt,
        scenario,
        answer
      })
    });
    let data = {};
    const raw = await res.text();
    try {
      data = raw ? JSON.parse(raw) : {};
    } catch {
      respBody.textContent = '服务端返回格式异常，请稍后重试';
      return;
    }

    if (data.ok && !data.text) {
      respBody.textContent = '请求被误判为验证接口，请刷新页面后重试。若仍失败请重新部署最新 index.html。';
      return;
    }
    if (res.ok && data.text) {
      respBody.textContent = data.text;
      mentorSessions[id] = { scenario, answer, feedback: data.text, history: [] };
      enableFollowUp(id);
    } else if (res.status === 401) {
      respBody.textContent = '访问码已失效，请重新登录。';
      setTimeout(() => { clearSession(); lockApp(); }, 2000);
    } else if (res.status === 429) {
      respBody.textContent = data.error || '今日次数已达上限';
    } else {
      respBody.textContent = data.error || ('请求失败（HTTP ' + res.status + '）');
      clearMentorSession(id);
    }
  } catch (e) {
    respBody.textContent = '网络错误：' + e.message;
    clearMentorSession(id);
  }

  btn.disabled = false;
  btn.textContent = '提交 · 获取 AI 点评';
}


function initMobile() {
  const mq = window.matchMedia('(max-width: 899px), (hover: none) and (pointer: coarse)');
  const apply = () => {
    document.documentElement.classList.toggle('is-mobile', mq.matches);
    if (TOPICS.length) {
      const { ordered } = topicsByCategory();
      setupMobileModuleNav(ordered);
    }
  };
  apply();
  if (mq.addEventListener) mq.addEventListener('change', apply);
  else mq.addListener(apply);
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(apply, 180);
  });
}

function initHorizonWave() {
  if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  document.querySelectorAll('.bg-horizon-svg animate').forEach(el => el.remove());
}

function initHeroWaveform() {
  const canvas = document.getElementById('heroWaveform');
  if (!canvas || canvas.dataset.ready === '1') return;
  canvas.dataset.ready = '1';
  const ctx = canvas.getContext('2d');
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  let mouse = { x: -9999, y: -9999 };
  let tick = 0;
  let cw = 0;
  let ch = 0;

  function resize() {
    const rect = canvas.getBoundingClientRect();
    cw = Math.max(1, rect.width);
    ch = Math.max(1, rect.height);
    canvas.width = Math.floor(cw * dpr);
    canvas.height = Math.floor(ch * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function roundRect(x, y, w, h, r) {
    const rr = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + rr, y);
    ctx.arcTo(x + w, y, x + w, y + h, rr);
    ctx.arcTo(x + w, y + h, x, y + h, rr);
    ctx.arcTo(x, y + h, x, y, rr);
    ctx.arcTo(x, y, x + w, y, rr);
    ctx.closePath();
  }

  function draw() {
    resize();
    ctx.clearRect(0, 0, cw, ch);
    const rect = canvas.getBoundingClientRect();
    const BAR = Math.max(36, Math.floor(cw / 5.2));
    const step = cw / BAR;
    const barW = step * 0.42;
    const midY = ch * 0.52;
    const bandH = ch * 0.92;
    const mx = mouse.x - rect.left;
    const my = mouse.y - rect.top;

    for (let i = 0; i < BAR; i++) {
      const x = i * step + (step - barW) / 2;
      const cx = x + barW / 2;
      const phase = i * 0.42;
      let amp = 0.18 + 0.82 * Math.pow(Math.abs(Math.sin(tick * 0.028 + phase)), 1.35);
      amp *= 0.55 + 0.45 * Math.sin(i * 0.22 + tick * 0.012);
      const dist = Math.hypot(mx - cx, my - midY);
      const boost = Math.max(0, 1 - dist / Math.max(140, cw * 0.38));
      amp = Math.min(1, amp + boost * 0.85);
      const barH = 8 + bandH * amp * 0.62;
      const y = midY - barH / 2;
      const g = ctx.createLinearGradient(x, y, x, y + barH);
      g.addColorStop(0, 'rgba(74, 224, 173, 0.08)');
      g.addColorStop(0.35, 'rgba(50, 213, 152, 0.42)');
      g.addColorStop(0.7, 'rgba(38, 194, 129, 0.55)');
      g.addColorStop(1, 'rgba(38, 194, 129, 0.12)');
      ctx.fillStyle = g;
      roundRect(x, y, barW, barH, barW / 2);
      ctx.fill();
    }
    tick += 1;
    if (!reduced) requestAnimationFrame(draw);
  }

  window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; }, { passive: true });
  window.addEventListener('touchmove', (e) => {
    if (e.touches[0]) { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; }
  }, { passive: true });
  if (typeof ResizeObserver !== 'undefined') new ResizeObserver(resize).observe(canvas);
  else window.addEventListener('resize', resize, { passive: true });
  tick = reduced ? 36 : 0;
  function boot() {
    resize();
    if (canvas.getBoundingClientRect().width < 2) {
      requestAnimationFrame(boot);
      return;
    }
    if (reduced) draw();
    else requestAnimationFrame(draw);
  }
  boot();
}


async function bootstrap() {
  initMobile();
  initHorizonWave();
  const btnExit = document.getElementById('btnExit');
  if (btnExit) btnExit.onclick = logoutApp;
  gateBtn.onclick = () => {
    const code = gateCode.value.trim();
    if (!code) { showGateError('请输入访问码'); return; }
    tryEnter(code, document.getElementById('gateRemember').checked);
  };
  gateCode.addEventListener('keydown', e => { if (e.key === 'Enter') gateBtn.click(); });

  const remembered = localStorage.getItem(CODE_KEY);
  if (remembered && isSessionValid()) {
    gateCode.value = remembered;
    if (await tryEnter(remembered, true)) return;
  }
  const sessionCode = sessionStorage.getItem(CODE_KEY);
  if (sessionCode && await tryEnter(sessionCode, false)) return;
  lockApp();
}

bootstrap();
