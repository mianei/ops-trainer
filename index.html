<!DOCTYPE html>
<!-- ops-trainer v3.0 · Apple glass style -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>运营思维训练器</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-base: #f5f5f7;
    --text: #1d1d1f;
    --text2: rgba(29, 29, 31, 0.72);
    --text3: rgba(29, 29, 31, 0.48);
    --accent: #0071e3;
    --accent-hover: #0077ed;
    --glass: rgba(255, 255, 255, 0.72);
    --glass-border: rgba(255, 255, 255, 0.85);
    --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.08), 0 1px 0 rgba(255,255,255,0.8) inset;
    --glass-input: rgba(255, 255, 255, 0.55);
    --danger: #ff3b30;
    --danger-bg: rgba(255, 59, 48, 0.12);
    --success: #34c759;
    --blur: blur(24px) saturate(180%);
    --radius: 20px;
    --radius-sm: 12px;
    --radius-pill: 980px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg-base: #000000;
      --text: #f5f5f7;
      --text2: rgba(245, 245, 247, 0.72);
      --text3: rgba(245, 245, 247, 0.45);
      --accent: #2997ff;
      --accent-hover: #40a9ff;
      --glass: rgba(28, 28, 30, 0.72);
      --glass-border: rgba(255, 255, 255, 0.12);
      --glass-shadow: 0 8px 40px rgba(0, 0, 0, 0.45), 0 1px 0 rgba(255,255,255,0.06) inset;
      --glass-input: rgba(255, 255, 255, 0.08);
      --danger-bg: rgba(255, 69, 58, 0.18);
    }
  }

  html { font-size: 16px; scroll-behavior: smooth; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Noto Sans SC', 'PingFang SC', sans-serif;
    background: var(--bg-base);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.47059;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* 背景光晕 */
  .bg-mesh {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .bg-mesh::before,
  .bg-mesh::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.55;
    animation: float 18s ease-in-out infinite;
  }
  .bg-mesh::before {
    width: 55vw; height: 55vw;
    top: -15%; left: -10%;
    background: radial-gradient(circle, #a8c6ff 0%, transparent 70%);
  }
  .bg-mesh::after {
    width: 50vw; height: 50vw;
    bottom: -20%; right: -15%;
    background: radial-gradient(circle, #c4b5fd 0%, transparent 70%);
    animation-delay: -9s;
  }
  @media (prefers-color-scheme: dark) {
    .bg-mesh::before { background: radial-gradient(circle, #1a3a5c 0%, transparent 70%); opacity: 0.7; }
    .bg-mesh::after { background: radial-gradient(circle, #2d1f4e 0%, transparent 70%); opacity: 0.6; }
  }
  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(3%, 4%) scale(1.05); }
  }

  .glass {
    background: var(--glass);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow);
  }

  /* —— 门禁 —— */
  #gate {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: max(1.5rem, env(safe-area-inset-top)) 1.5rem 1.5rem;
  }
  #gate.hidden { display: none; }

  .gate-card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 2.5rem 2rem 2rem;
    border-radius: 28px;
  }
  .gate-icon {
    width: 56px; height: 56px;
    border-radius: 16px;
    background: linear-gradient(145deg, var(--accent), #5856d6);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    margin-bottom: 1.5rem;
    box-shadow: 0 8px 24px rgba(0, 113, 227, 0.35);
  }
  .gate-card h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.15;
    margin-bottom: 0.5rem;
  }
  .gate-card .sub {
    font-size: 15px;
    color: var(--text2);
    margin-bottom: 1.75rem;
    line-height: 1.5;
  }
  .gate-field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }
  .gate-field input {
    width: 100%;
    height: 48px;
    padding: 0 16px;
    font-size: 17px;
    font-family: inherit;
    background: var(--glass-input);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-sm);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .gate-field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.2);
  }
  .gate-remember {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 14px 0 1.5rem;
    font-size: 14px;
    color: var(--text2);
    cursor: pointer;
    user-select: none;
  }
  .gate-remember input {
    width: 18px; height: 18px;
    accent-color: var(--accent);
  }
  .btn-enter {
    width: 100%;
    height: 48px;
    font-size: 17px;
    font-weight: 600;
    font-family: inherit;
    letter-spacing: -0.01em;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-pill);
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
  }
  .btn-enter:hover { background: var(--accent-hover); }
  .btn-enter:active { transform: scale(0.98); }
  .btn-enter:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .gate-error {
    margin-top: 14px;
    padding: 12px 14px;
    font-size: 13px;
    color: var(--danger);
    background: var(--danger-bg);
    border-radius: var(--radius-sm);
    display: none;
    line-height: 1.45;
  }
  .gate-error.visible { display: block; }
  .gate-hint {
    margin-top: 1.5rem;
    font-size: 12px;
    color: var(--text3);
    text-align: center;
  }

  /* —— 主应用 —— */
  #app { display: none; position: relative; z-index: 1; }
  #app.visible { display: block; }

  .nav-bar {
    position: sticky;
    top: 0;
    z-index: 50;
    margin: 0 auto;
    max-width: 920px;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    border-radius: 0 0 var(--radius) var(--radius);
    margin-bottom: 0;
  }
  .nav-brand {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .nav-brand span {
    color: var(--text3);
    font-weight: 400;
    font-size: 13px;
    margin-left: 8px;
  }
  .btn-logout {
    height: 32px;
    padding: 0 16px;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    color: var(--accent);
    background: transparent;
    border: none;
    border-radius: var(--radius-pill);
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-logout:hover {
    background: rgba(0, 113, 227, 0.1);
  }

  .page {
    max-width: 920px;
    margin: 0 auto;
    padding: 0 20px 5rem;
  }

  .hero {
    text-align: center;
    padding: 3rem 0 2.5rem;
  }
  .hero .badge {
    display: inline-block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--accent);
    padding: 6px 14px;
    border-radius: var(--radius-pill);
    margin-bottom: 1rem;
  }
  .hero h1 {
    font-size: clamp(36px, 6vw, 56px);
    font-weight: 700;
    letter-spacing: -0.04em;
    line-height: 1.05;
    margin-bottom: 0.75rem;
  }
  .hero p {
    font-size: clamp(17px, 2.5vw, 21px);
    color: var(--text2);
    max-width: 520px;
    margin: 0 auto;
    font-weight: 400;
    letter-spacing: -0.01em;
  }

  .sync-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 1.75rem;
    padding: 12px 18px;
    border-radius: var(--radius-sm);
  }
  .sync-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text3);
    flex-shrink: 0;
  }
  .sync-dot.ok { background: var(--success); box-shadow: 0 0 8px var(--success); }
  .sync-dot.err { background: var(--danger); }

  .tabs-wrap {
    margin-bottom: 1.5rem;
    padding: 6px;
    border-radius: var(--radius-pill);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tabs {
    display: flex;
    gap: 4px;
    min-width: min-content;
  }
  .tab {
    padding: 8px 18px;
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    letter-spacing: -0.01em;
    background: transparent;
    color: var(--text2);
    border: none;
    border-radius: var(--radius-pill);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
  }
  .tab:hover:not(.active) {
    color: var(--text);
    background: rgba(128, 128, 128, 0.12);
  }
  .tab.active {
    background: var(--text);
    color: var(--bg-base);
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  @media (prefers-color-scheme: dark) {
    .tab.active { background: #f5f5f7; color: #1d1d1f; }
  }

  .panel { display: none; animation: fadeUp 0.4s ease; }
  .panel.active { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .scenario-card {
    padding: 1.5rem 1.75rem;
    border-radius: var(--radius);
    margin-bottom: 1.5rem;
  }
  .scenario-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }
  .scenario-text {
    font-size: 17px;
    line-height: 1.65;
    letter-spacing: -0.01em;
    color: var(--text);
  }

  .field-label {
    font-size: 14px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 10px;
    letter-spacing: -0.01em;
  }
  textarea {
    width: 100%;
    min-height: 120px;
    padding: 16px 18px;
    font-size: 15px;
    font-family: inherit;
    line-height: 1.6;
    letter-spacing: -0.01em;
    background: var(--glass-input);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: var(--text);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    resize: vertical;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.15);
  }
  textarea::placeholder { color: var(--text3); }

  .btn-row {
    display: flex;
    gap: 12px;
    margin-top: 1.25rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .btn-primary {
    height: 44px;
    padding: 0 28px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    letter-spacing: -0.01em;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-pill);
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
  .btn-ghost {
    height: 44px;
    padding: 0 22px;
    font-size: 15px;
    font-weight: 500;
    font-family: inherit;
    color: var(--accent);
    background: transparent;
    border: none;
    border-radius: var(--radius-pill);
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-ghost:hover {
    background: rgba(0, 113, 227, 0.1);
  }

  .response-area {
    margin-top: 1.5rem;
    border-radius: var(--radius);
    overflow: hidden;
    display: none;
    animation: fadeUp 0.35s ease;
  }
  .response-area.visible { display: block; }
  .response-header {
    padding: 12px 20px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text3);
    border-bottom: 1px solid var(--glass-border);
  }
  .response-body {
    padding: 1.5rem 1.75rem;
    font-size: 15px;
    line-height: 1.75;
    letter-spacing: -0.01em;
    white-space: pre-wrap;
    color: var(--text);
  }

  .dots { display: inline-flex; gap: 6px; padding: 10px 0; }
  .dots span {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text3);
    animation: pulse 1.2s ease-in-out infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.15s; }
  .dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes pulse { 0%,80%,100%{opacity:0.25; transform:scale(0.85)} 40%{opacity:1; transform:scale(1)} }

  .loading-main {
    text-align: center;
    padding: 5rem 1rem;
    color: var(--text2);
    font-size: 15px;
  }

  .footer {
    margin-top: 4rem;
    padding-top: 2rem;
    font-size: 12px;
    color: var(--text3);
    text-align: center;
    letter-spacing: -0.01em;
  }
</style>
</head>
<body>

<div class="bg-mesh" aria-hidden="true"></div>

<div id="gate">
  <div class="gate-card glass">
    <div class="gate-icon">◆</div>
    <h1>运营思维训练器</h1>
    <p class="sub">请输入访问码后进入。访问码由站长发放，仅用于身份校验。</p>
    <div class="gate-field">
      <label for="gateCode">访问码</label>
      <input type="password" id="gateCode" placeholder="请输入访问码" autocomplete="off" />
    </div>
    <label class="gate-remember">
      <input type="checkbox" id="gateRemember" checked />
      7 天内免重复输入
    </label>
    <button class="btn-enter" id="gateBtn" type="button">继续</button>
    <div class="gate-error" id="gateError"></div>
    <p class="gate-hint">没有访问码？联系站长获取</p>
  </div>
</div>

<div id="app">
  <header class="nav-bar glass">
    <div class="nav-brand">运营思维<span>训练器</span></div>
    <button class="btn-logout" type="button" id="logoutBtn">退出</button>
  </header>

  <div class="page">
    <section class="hero">
      <div class="badge glass">AI · 运营</div>
      <h1>像产品经理一样思考。</h1>
      <p>真实业务场景 × AI 点评。训练决策力，而不只是生成内容。</p>
    </section>

    <div class="sync-bar glass" id="syncBar">
      <span class="sync-dot" id="syncDot"></span>
      <span id="syncText">正在加载场景数据…</span>
    </div>

    <div id="mainContent" class="loading-main">加载中…</div>

    <footer class="footer">运营思维训练器 · 仅供学习使用</footer>
  </div>
</div>

<script>
const GITHUB_TOPICS_URL = '';

const CODE_KEY = 'ops-access-code';
const SESSION_UNTIL_KEY = 'ops-session-until';
const REMEMBER_DAYS = 7;

let accessCode = '';
let TOPICS = [];

const gate = document.getElementById('gate');
const app = document.getElementById('app');
const gateCode = document.getElementById('gateCode');
const gateBtn = document.getElementById('gateBtn');
const gateError = document.getElementById('gateError');

function topicsUrl() {
  const base = GITHUB_TOPICS_URL.trim() || 'topics.json';
  const sep = base.includes('?') ? '&' : '?';
  return base + sep + 't=' + Date.now();
}

function setSyncStatus(ok, text) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  if (!dot || !txt) return;
  dot.className = 'sync-dot ' + (ok ? 'ok' : 'err');
  txt.textContent = text;
}

function showGateError(msg) {
  gateError.textContent = msg;
  gateError.classList.add('visible');
}

function hideGateError() {
  gateError.classList.remove('visible');
}

function getSessionUntil() {
  const v = localStorage.getItem(SESSION_UNTIL_KEY);
  return v ? Number(v) : 0;
}

function isSessionValid() {
  return Date.now() < getSessionUntil();
}

function clearSession() {
  accessCode = '';
  sessionStorage.removeItem(CODE_KEY);
  localStorage.removeItem(CODE_KEY);
  localStorage.removeItem(SESSION_UNTIL_KEY);
}

function unlockApp() {
  gate.classList.add('hidden');
  app.classList.add('visible');
}

function lockApp() {
  gate.classList.remove('hidden');
  app.classList.remove('visible');
  gateCode.value = '';
  hideGateError();
}

function authHeaders(code) {
  return {
    'Content-Type': 'application/json',
    'X-Access-Code': code,
    'X-Verify-Only': '1'
  };
}

async function verifyCode(code) {
  const headers = authHeaders(code);
  const payload = JSON.stringify({ action: 'verify', accessCode: code });

  let res = await fetch('/api/verify', {
    method: 'POST',
    headers: { 'X-Access-Code': code }
  });

  if (res.status === 404 || res.status === 400) {
    res = await fetch('/api/chat', { method: 'POST', headers, body: payload });
  }

  const data = await res.json().catch(() => ({}));
  if (res.ok && data.ok) return { ok: true };
  if (res.status === 401) {
    return { ok: false, msg: '访问码无效，请与 Vercel 环境变量 ACCESS_CODE 完全一致（区分大小写）' };
  }
  if (res.status === 404) {
    return { ok: false, msg: 'API 未部署。请在 Vercel Redeploy 并确认有 api/chat.js' };
  }
  if (res.status === 400) {
    return { ok: false, msg: (data.error || '请求被拒绝') + ' — 请重新部署最新代码' };
  }
  if (res.status === 500) {
    return { ok: false, msg: data.error || '请在 Vercel 配置 ACCESS_CODE 后 Redeploy' };
  }
  return { ok: false, msg: data.error || '验证失败（HTTP ' + res.status + '）' };
}

async function tryEnter(code, remember) {
  gateBtn.disabled = true;
  gateBtn.textContent = '验证中…';
  hideGateError();
  try {
    const result = await verifyCode(code);
    if (!result.ok) {
      showGateError(result.msg);
      return false;
    }
    accessCode = code;
    sessionStorage.setItem(CODE_KEY, accessCode);
    if (remember) {
      localStorage.setItem(CODE_KEY, accessCode);
      localStorage.setItem(SESSION_UNTIL_KEY, String(Date.now() + REMEMBER_DAYS * 86400000));
    }
    unlockApp();
    await loadTopicsAndRender();
    return true;
  } catch (e) {
    showGateError('无法连接验证服务：' + e.message);
    return false;
  } finally {
    gateBtn.disabled = false;
    gateBtn.textContent = '继续';
  }
}

async function loadTopics() {
  const url = topicsUrl();
  const res = await fetch(url, { cache: 'no-store' });
  if (!res.ok) throw new Error('加载 topics 失败：HTTP ' + res.status);
  const data = await res.json();
  if (!Array.isArray(data.topics) || data.topics.length === 0) {
    throw new Error('topics.json 格式错误');
  }
  return data.topics;
}

async function loadTopicsAndRender() {
  try {
    TOPICS = await loadTopics();
    const src = GITHUB_TOPICS_URL.trim() ? 'GitHub' : '本地';
    setSyncStatus(true, '已同步 · ' + src + ' · ' + TOPICS.length + ' 个训练模块');
    renderTopics();
  } catch (e) {
    setSyncStatus(false, '场景加载失败：' + e.message);
    document.getElementById('mainContent').innerHTML =
      '<p style="color:var(--danger);text-align:center;padding:2rem">无法加载训练场景，请检查 topics.json。</p>';
  }
}

function renderTopics() {
  const main = document.getElementById('mainContent');
  main.innerHTML = '<div class="tabs-wrap glass"><div class="tabs" id="tabs"></div></div><div id="panels"></div>';
  const tabs = document.getElementById('tabs');
  const panels = document.getElementById('panels');

  TOPICS.forEach((t, i) => {
    const tab = document.createElement('button');
    tab.className = 'tab' + (i === 0 ? ' active' : '');
    tab.textContent = t.label;
    tab.type = 'button';
    tab.onclick = () => switchTab(t.id, tab);
    tabs.appendChild(tab);

    const panel = document.createElement('div');
    panel.className = 'panel' + (i === 0 ? ' active' : '');
    panel.id = 'panel-' + t.id;
    panel.innerHTML = `
      <div class="scenario-card glass">
        <div class="scenario-label">场景</div>
        <div class="scenario-text" id="scenario-${t.id}"></div>
      </div>
      <div class="field-label">${escapeHtml(t.fieldLabel)}</div>
      <textarea id="answer-${t.id}" placeholder="${escapeAttr(t.placeholder)}"></textarea>
      <div class="btn-row">
        <button class="btn-primary" id="btn-${t.id}" type="button">提交分析</button>
        <button class="btn-ghost" type="button" data-reload="${t.id}">换一个场景</button>
      </div>
      <div class="response-area glass" id="resp-${t.id}">
        <div class="response-header">AI 点评</div>
        <div class="response-body" id="resp-body-${t.id}"></div>
      </div>
    `;
    panels.appendChild(panel);
    panel.querySelector('[data-reload]').onclick = () => loadScenario(t.id);
    document.getElementById('btn-' + t.id).onclick = () => submitAnswer(t.id);
    loadScenario(t.id);
  });
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escapeAttr(s) {
  return escapeHtml(s).replace(/"/g,'&quot;');
}

function getTopic(id) {
  return TOPICS.find(t => t.id === id);
}

function switchTab(id, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-' + id).classList.add('active');
}

function loadScenario(id) {
  const t = getTopic(id);
  const list = t.scenarios;
  const idx = Math.floor(Math.random() * list.length);
  document.getElementById('scenario-' + id).textContent = list[idx];
  document.getElementById('answer-' + id).value = '';
  document.getElementById('resp-' + id).classList.remove('visible');
}

async function submitAnswer(id) {
  if (!accessCode) {
    lockApp();
    return;
  }
  const answer = document.getElementById('answer-' + id).value.trim();
  if (!answer) {
    alert('请先写下你的分析');
    return;
  }

  const t = getTopic(id);
  const scenario = document.getElementById('scenario-' + id).textContent;
  const btn = document.getElementById('btn-' + id);
  const respArea = document.getElementById('resp-' + id);
  const respBody = document.getElementById('resp-body-' + id);

  btn.disabled = true;
  btn.textContent = '分析中…';
  respArea.classList.add('visible');
  respBody.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: authHeaders(accessCode),
      body: JSON.stringify({
        accessCode,
        topic: id,
        systemPrompt: t.systemPrompt,
        scenario,
        answer
      })
    });
    const data = await res.json();
    if (res.ok && data.text) {
      respBody.textContent = data.text;
    } else if (res.status === 401) {
      respBody.textContent = '访问码已失效，请重新登录。';
      setTimeout(() => { clearSession(); lockApp(); }, 2000);
    } else if (res.status === 429) {
      respBody.textContent = data.error || '今日使用次数已达上限，明天再来吧。';
    } else {
      respBody.textContent = '请求失败：' + (data.error || ('HTTP ' + res.status));
    }
  } catch (e) {
    respBody.textContent = '网络错误：' + e.message;
  }

  btn.disabled = false;
  btn.textContent = '提交分析';
}

async function bootstrap() {
  gateBtn.onclick = () => {
    const code = gateCode.value.trim();
    if (!code) { showGateError('请输入访问码'); return; }
    tryEnter(code, document.getElementById('gateRemember').checked);
  };
  gateCode.addEventListener('keydown', e => {
    if (e.key === 'Enter') gateBtn.click();
  });
  document.getElementById('logoutBtn').onclick = () => {
    clearSession();
    lockApp();
  };

  const remembered = localStorage.getItem(CODE_KEY);
  if (remembered && isSessionValid()) {
    gateCode.value = remembered;
    const ok = await tryEnter(remembered, true);
    if (ok) return;
  }

  const sessionCode = sessionStorage.getItem(CODE_KEY);
  if (sessionCode) {
    const ok = await tryEnter(sessionCode, false);
    if (ok) return;
  }

  lockApp();
}

bootstrap();
</script>
</body>
</html>
