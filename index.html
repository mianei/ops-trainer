<!DOCTYPE html>
<!-- ops-trainer v3.1 · 白色流线磨砂风格 -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="color-scheme" content="light" />
<title>运营思维训练器</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f4f6f9;
    --bg-pure: #ffffff;
    --text: #1c1c1e;
    --text2: #5c5c62;
    --text3: #8e8e93;
    --line: rgba(0, 0, 0, 0.06);
    --line-strong: rgba(0, 0, 0, 0.12);
    --accent: #1c1c1e;
    --glass: rgba(255, 255, 255, 0.78);
    --glass-strong: rgba(255, 255, 255, 0.92);
    --glass-border: rgba(255, 255, 255, 0.95);
    --shadow: 0 4px 24px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
    --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.08);
    --blur: blur(20px) saturate(160%);
    --danger: #d70015;
    --danger-bg: rgba(215, 0, 21, 0.08);
    --success: #248a3d;
    --radius: 16px;
    --radius-lg: 24px;
    --pill: 980px;
  }

  html { font-size: 16px; scroll-behavior: smooth; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* 流线背景 */
  .bg-scene {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background: linear-gradient(165deg, #fafbfc 0%, #eef1f6 45%, #f8f9fb 100%);
    overflow: hidden;
  }
  .bg-scene svg {
    position: absolute;
    width: 120%;
    height: auto;
    min-height: 100%;
    left: -10%;
    top: -5%;
    opacity: 0.85;
  }
  .wave-layer-2 {
    top: 15% !important;
    opacity: 0.5 !important;
    transform: scale(1.05);
  }

  .glass {
    background: var(--glass);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border);
    box-shadow: var(--shadow);
  }
  .glass-strong {
    background: var(--glass-strong);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border: 1px solid rgba(255,255,255,1);
    box-shadow: var(--shadow-lg);
  }

  /* —— 门禁 —— */
  #gate {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }
  #gate.hidden { display: none; }

  .gate-wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 440px;
  }
  .gate-card {
    padding: 2.75rem 2.25rem 2.25rem;
    border-radius: var(--radius-lg);
  }
  .gate-logo {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 1.75rem;
  }
  .gate-card h1 {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.15;
    margin-bottom: 0.6rem;
    color: var(--text);
  }
  .gate-card .sub {
    font-size: 15px;
    font-weight: 400;
    color: var(--text2);
    margin-bottom: 2rem;
    line-height: 1.6;
  }
  .gate-field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text3);
    margin-bottom: 8px;
    letter-spacing: 0.02em;
  }
  .gate-field input {
    width: 100%;
    height: 50px;
    padding: 0 18px;
    font-size: 16px;
    font-family: inherit;
    background: var(--bg-pure);
    border: 1px solid var(--line-strong);
    border-radius: var(--radius);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .gate-field input:focus {
    border-color: rgba(0,0,0,0.25);
    box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.04);
  }
  .gate-remember {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 16px 0 1.75rem;
    font-size: 14px;
    color: var(--text2);
    cursor: pointer;
  }
  .gate-remember input { accent-color: var(--accent); width: 17px; height: 17px; }

  .btn-enter {
    width: 100%;
    height: 50px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--pill);
    cursor: pointer;
    transition: transform 0.15s, opacity 0.2s;
  }
  .btn-enter:hover { opacity: 0.88; }
  .btn-enter:active { transform: scale(0.98); }
  .btn-enter:disabled { opacity: 0.45; cursor: not-allowed; }

  .gate-error {
    margin-top: 14px;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--danger);
    background: var(--danger-bg);
    border-radius: var(--radius);
    display: none;
    line-height: 1.5;
  }
  .gate-error.visible { display: block; }
  .gate-hint {
    margin-top: 1.5rem;
    font-size: 12px;
    color: var(--text3);
    text-align: center;
  }

  /* —— 主应用 —— */
  #app { display: none; position: relative; z-index: 1; }
  #app.visible { display: block; }

  .site-header {
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 1100px;
    margin: 0 auto;
    padding: 14px 28px;
    border-bottom: 1px solid var(--line);
  }
  .logo {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text);
  }
  .btn-logout {
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    color: var(--text2);
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 8px 0;
    border-bottom: 1px solid transparent;
    transition: color 0.2s, border-color 0.2s;
  }
  .btn-logout:hover {
    color: var(--text);
    border-bottom-color: var(--text);
  }

  .page {
    max-width: 820px;
    margin: 0 auto;
    padding: 0 28px 5rem;
    position: relative;
    z-index: 1;
  }

  .hero {
    text-align: center;
    padding: clamp(3rem, 8vw, 5.5rem) 0 clamp(2rem, 5vw, 3rem);
  }
  .hero-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 1.25rem;
  }
  .hero h1 {
    font-size: clamp(2.25rem, 5.5vw, 3.5rem);
    font-weight: 700;
    letter-spacing: -0.04em;
    line-height: 1.08;
    margin-bottom: 1rem;
    color: var(--text);
  }
  .hero p {
    font-size: clamp(1rem, 2vw, 1.125rem);
    font-weight: 400;
    color: var(--text2);
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.65;
  }

  .sync-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 2rem;
    padding: 12px 18px;
    border-radius: var(--radius);
  }
  .sync-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text3);
    flex-shrink: 0;
  }
  .sync-dot.ok { background: var(--success); }
  .sync-dot.err { background: var(--danger); }

  .tabs-wrap {
    margin-bottom: 1.75rem;
    padding: 5px;
    border-radius: var(--pill);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tabs { display: flex; gap: 4px; min-width: min-content; }
  .tab {
    padding: 9px 20px;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    color: var(--text2);
    background: transparent;
    border: none;
    border-radius: var(--pill);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.25s ease;
  }
  .tab:hover:not(.active) {
    color: var(--text);
    background: rgba(255,255,255,0.6);
  }
  .tab.active {
    color: var(--text);
    background: var(--bg-pure);
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  .panel { display: none; animation: rise 0.45s ease; }
  .panel.active { display: block; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .scenario-card {
    padding: 1.75rem 2rem;
    border-radius: var(--radius-lg);
    margin-bottom: 1.5rem;
  }
  .scenario-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 12px;
  }
  .scenario-text {
    font-size: 17px;
    font-weight: 400;
    line-height: 1.7;
    letter-spacing: -0.01em;
    color: var(--text);
  }

  .field-label {
    font-size: 14px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 10px;
  }
  textarea {
    width: 100%;
    min-height: 128px;
    padding: 18px 20px;
    font-size: 15px;
    font-family: inherit;
    line-height: 1.65;
    background: var(--bg-pure);
    color: var(--text);
    border: 1px solid var(--line-strong);
    border-radius: var(--radius-lg);
    resize: vertical;
    outline: none;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.02);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  textarea:focus {
    border-color: rgba(0,0,0,0.2);
    box-shadow: 0 0 0 4px rgba(0,0,0,0.04);
  }
  textarea::placeholder { color: var(--text3); }

  .btn-row {
    display: flex;
    gap: 14px;
    margin-top: 1.35rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .btn-primary {
    height: 46px;
    padding: 0 32px;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--pill);
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-ghost {
    height: 46px;
    padding: 0 28px;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text);
    background: transparent;
    border: 1px solid var(--line-strong);
    border-radius: var(--pill);
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .btn-ghost:hover {
    background: rgba(255,255,255,0.8);
    border-color: rgba(0,0,0,0.18);
  }

  .response-area {
    margin-top: 1.5rem;
    border-radius: var(--radius-lg);
    overflow: hidden;
    display: none;
    animation: rise 0.35s ease;
  }
  .response-area.visible { display: block; }
  .response-header {
    padding: 14px 22px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    border-bottom: 1px solid var(--line);
  }
  .response-body {
    padding: 1.75rem 2rem;
    font-size: 15px;
    line-height: 1.75;
    white-space: pre-wrap;
    color: var(--text);
  }

  .dots { display: inline-flex; gap: 6px; padding: 10px 0; }
  .dots span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text3);
    animation: pulse 1.2s ease-in-out infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.15s; }
  .dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes pulse { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

  .loading-main {
    text-align: center;
    padding: 5rem 1rem;
    color: var(--text2);
    font-size: 15px;
  }

  .footer {
    margin-top: 4rem;
    font-size: 12px;
    color: var(--text3);
    text-align: center;
  }
</style>
</head>
<body>

<div class="bg-scene" aria-hidden="true">
  <svg class="wave-layer-1" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
    <path d="M-80 420C180 280 380 120 720 200C1060 280 1280 480 1520 360L1520 900L-80 900Z" fill="url(#g1)" opacity="0.9"/>
    <path d="M-80 520C220 400 480 320 760 400C1040 480 1200 600 1520 500L1520 900L-80 900Z" fill="url(#g2)" opacity="0.7"/>
    <defs>
      <linearGradient id="g1" x1="720" y1="120" x2="720" y2="900" gradientUnits="userSpaceOnUse">
        <stop stop-color="#ffffff"/>
        <stop offset="0.5" stop-color="#e8ecf2"/>
        <stop offset="1" stop-color="#d8dee8"/>
      </linearGradient>
      <linearGradient id="g2" x1="400" y1="300" x2="1100" y2="900" gradientUnits="userSpaceOnUse">
        <stop stop-color="#ffffff" stop-opacity="0.95"/>
        <stop offset="1" stop-color="#c5cdd9" stop-opacity="0.6"/>
      </linearGradient>
    </defs>
  </svg>
  <svg class="wave-layer-2" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
    <path d="M-100 600C200 500 500 380 800 450C1100 520 1300 650 1540 580" stroke="rgba(0,0,0,0.04)" stroke-width="1.5" fill="none"/>
    <path d="M-100 480C280 360 600 280 900 340C1200 400 1350 520 1540 440" stroke="rgba(255,255,255,0.9)" stroke-width="2" fill="none"/>
    <path d="M-80 380C240 260 520 180 820 240C1120 300 1280 400 1520 320L1520 0L-80 0Z" fill="url(#g3)" opacity="0.5"/>
    <defs>
      <linearGradient id="g3" x1="720" y1="0" x2="720" y2="500" gradientUnits="userSpaceOnUse">
        <stop stop-color="#ffffff"/>
        <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
      </linearGradient>
    </defs>
  </svg>
</div>

<div id="gate">
  <div class="gate-wrap">
    <div class="gate-card glass-strong">
      <div class="gate-logo">Ops Trainer</div>
      <h1>运营思维训练器</h1>
      <p class="sub">请输入访问码后进入。访问码由站长发放，仅用于身份校验。</p>
      <div class="gate-field">
        <label for="gateCode">访问码</label>
        <input type="password" id="gateCode" placeholder="请输入访问码" autocomplete="off" />
      </div>
      <label class="gate-remember">
        <input type="checkbox" id="gateRemember" checked />
        7 天内免重复输入
      </label>
      <button class="btn-enter" id="gateBtn" type="button">进入</button>
      <div class="gate-error" id="gateError"></div>
      <p class="gate-hint">白色主题 v3.1 · 没有访问码请联系站长</p>
    </div>
  </div>
</div>

<div id="app">
  <header class="site-header glass">
    <div class="logo">Ops Trainer</div>
    <button class="btn-logout" type="button" id="logoutBtn">退出</button>
  </header>

  <div class="page">
    <section class="hero">
      <div class="hero-tag">AI · 运营实战</div>
      <h1>训练你的<br/>运营判断力</h1>
      <p>真实业务场景，AI 导师式点评。在思考里成长，而不只是生成答案。</p>
    </section>

    <div class="sync-bar glass" id="syncBar">
      <span class="sync-dot" id="syncDot"></span>
      <span id="syncText">正在加载场景数据…</span>
    </div>

    <div id="mainContent" class="loading-main">加载中…</div>

    <footer class="footer">运营思维训练器 · 仅供学习使用</footer>
  </div>
</div>

<script>
const GITHUB_TOPICS_URL = '';

const CODE_KEY = 'ops-access-code';
const SESSION_UNTIL_KEY = 'ops-session-until';
const REMEMBER_DAYS = 7;

let accessCode = '';
let TOPICS = [];

const gate = document.getElementById('gate');
const app = document.getElementById('app');
const gateCode = document.getElementById('gateCode');
const gateBtn = document.getElementById('gateBtn');
const gateError = document.getElementById('gateError');

function topicsUrl() {
  const base = GITHUB_TOPICS_URL.trim() || 'topics.json';
  const sep = base.includes('?') ? '&' : '?';
  return base + sep + 't=' + Date.now();
}

function setSyncStatus(ok, text) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  if (!dot || !txt) return;
  dot.className = 'sync-dot ' + (ok ? 'ok' : 'err');
  txt.textContent = text;
}

function showGateError(msg) {
  gateError.textContent = msg;
  gateError.classList.add('visible');
}

function hideGateError() {
  gateError.classList.remove('visible');
}

function getSessionUntil() {
  const v = localStorage.getItem(SESSION_UNTIL_KEY);
  return v ? Number(v) : 0;
}

function isSessionValid() {
  return Date.now() < getSessionUntil();
}

function clearSession() {
  accessCode = '';
  sessionStorage.removeItem(CODE_KEY);
  localStorage.removeItem(CODE_KEY);
  localStorage.removeItem(SESSION_UNTIL_KEY);
}

function unlockApp() {
  gate.classList.add('hidden');
  app.classList.add('visible');
}

function lockApp() {
  gate.classList.remove('hidden');
  app.classList.remove('visible');
  gateCode.value = '';
  hideGateError();
}

function authHeaders(code) {
  return {
    'Content-Type': 'application/json',
    'X-Access-Code': code,
    'X-Verify-Only': '1'
  };
}

async function verifyCode(code) {
  const headers = authHeaders(code);
  const payload = JSON.stringify({ action: 'verify', accessCode: code });

  let res = await fetch('/api/verify', {
    method: 'POST',
    headers: { 'X-Access-Code': code }
  });

  if (res.status === 404 || res.status === 400) {
    res = await fetch('/api/chat', { method: 'POST', headers, body: payload });
  }

  const data = await res.json().catch(() => ({}));
  if (res.ok && data.ok) return { ok: true };
  if (res.status === 401) {
    return { ok: false, msg: '访问码无效，请与 Vercel 环境变量 ACCESS_CODE 完全一致（区分大小写）' };
  }
  if (res.status === 404) {
    return { ok: false, msg: 'API 未部署。请在 Vercel Redeploy 并确认有 api/chat.js' };
  }
  if (res.status === 400) {
    return { ok: false, msg: (data.error || '请求被拒绝') + ' — 请重新部署最新代码' };
  }
  if (res.status === 500) {
    return { ok: false, msg: data.error || '请在 Vercel 配置 ACCESS_CODE 后 Redeploy' };
  }
  return { ok: false, msg: data.error || '验证失败（HTTP ' + res.status + '）' };
}

async function tryEnter(code, remember) {
  gateBtn.disabled = true;
  gateBtn.textContent = '验证中…';
  hideGateError();
  try {
    const result = await verifyCode(code);
    if (!result.ok) {
      showGateError(result.msg);
      return false;
    }
    accessCode = code;
    sessionStorage.setItem(CODE_KEY, accessCode);
    if (remember) {
      localStorage.setItem(CODE_KEY, accessCode);
      localStorage.setItem(SESSION_UNTIL_KEY, String(Date.now() + REMEMBER_DAYS * 86400000));
    }
    unlockApp();
    await loadTopicsAndRender();
    return true;
  } catch (e) {
    showGateError('无法连接验证服务：' + e.message);
    return false;
  } finally {
    gateBtn.disabled = false;
    gateBtn.textContent = '进入';
  }
}

async function loadTopics() {
  const url = topicsUrl();
  const res = await fetch(url, { cache: 'no-store' });
  if (!res.ok) throw new Error('加载 topics 失败：HTTP ' + res.status);
  const data = await res.json();
  if (!Array.isArray(data.topics) || data.topics.length === 0) {
    throw new Error('topics.json 格式错误');
  }
  return data.topics;
}

async function loadTopicsAndRender() {
  try {
    TOPICS = await loadTopics();
    const src = GITHUB_TOPICS_URL.trim() ? 'GitHub' : '本地';
    setSyncStatus(true, '已同步 · ' + src + ' · ' + TOPICS.length + ' 个训练模块');
    renderTopics();
  } catch (e) {
    setSyncStatus(false, '场景加载失败：' + e.message);
    document.getElementById('mainContent').innerHTML =
      '<p style="color:var(--danger);text-align:center;padding:2rem">无法加载训练场景，请检查 topics.json。</p>';
  }
}

function renderTopics() {
  const main = document.getElementById('mainContent');
  main.innerHTML = '<div class="tabs-wrap glass"><div class="tabs" id="tabs"></div></div><div id="panels"></div>';
  const tabs = document.getElementById('tabs');
  const panels = document.getElementById('panels');

  TOPICS.forEach((t, i) => {
    const tab = document.createElement('button');
    tab.className = 'tab' + (i === 0 ? ' active' : '');
    tab.textContent = t.label;
    tab.type = 'button';
    tab.onclick = () => switchTab(t.id, tab);
    tabs.appendChild(tab);

    const panel = document.createElement('div');
    panel.className = 'panel' + (i === 0 ? ' active' : '');
    panel.id = 'panel-' + t.id;
    panel.innerHTML = `
      <div class="scenario-card glass">
        <div class="scenario-label">场景</div>
        <div class="scenario-text" id="scenario-${t.id}"></div>
      </div>
      <div class="field-label">${escapeHtml(t.fieldLabel)}</div>
      <textarea id="answer-${t.id}" placeholder="${escapeAttr(t.placeholder)}"></textarea>
      <div class="btn-row">
        <button class="btn-primary" id="btn-${t.id}" type="button">提交分析</button>
        <button class="btn-ghost" type="button" data-reload="${t.id}">换一个场景</button>
      </div>
      <div class="response-area glass" id="resp-${t.id}">
        <div class="response-header">AI 点评</div>
        <div class="response-body" id="resp-body-${t.id}"></div>
      </div>
    `;
    panels.appendChild(panel);
    panel.querySelector('[data-reload]').onclick = () => loadScenario(t.id);
    document.getElementById('btn-' + t.id).onclick = () => submitAnswer(t.id);
    loadScenario(t.id);
  });
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escapeAttr(s) {
  return escapeHtml(s).replace(/"/g,'&quot;');
}

function getTopic(id) {
  return TOPICS.find(t => t.id === id);
}

function switchTab(id, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-' + id).classList.add('active');
}

function loadScenario(id) {
  const t = getTopic(id);
  const list = t.scenarios;
  const idx = Math.floor(Math.random() * list.length);
  document.getElementById('scenario-' + id).textContent = list[idx];
  document.getElementById('answer-' + id).value = '';
  document.getElementById('resp-' + id).classList.remove('visible');
}

async function submitAnswer(id) {
  if (!accessCode) {
    lockApp();
    return;
  }
  const answer = document.getElementById('answer-' + id).value.trim();
  if (!answer) {
    alert('请先写下你的分析');
    return;
  }

  const t = getTopic(id);
  const scenario = document.getElementById('scenario-' + id).textContent;
  const btn = document.getElementById('btn-' + id);
  const respArea = document.getElementById('resp-' + id);
  const respBody = document.getElementById('resp-body-' + id);

  btn.disabled = true;
  btn.textContent = '分析中…';
  respArea.classList.add('visible');
  respBody.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: authHeaders(accessCode),
      body: JSON.stringify({
        accessCode,
        topic: id,
        systemPrompt: t.systemPrompt,
        scenario,
        answer
      })
    });
    const data = await res.json();
    if (res.ok && data.text) {
      respBody.textContent = data.text;
    } else if (res.status === 401) {
      respBody.textContent = '访问码已失效，请重新登录。';
      setTimeout(() => { clearSession(); lockApp(); }, 2000);
    } else if (res.status === 429) {
      respBody.textContent = data.error || '今日使用次数已达上限，明天再来吧。';
    } else {
      respBody.textContent = '请求失败：' + (data.error || ('HTTP ' + res.status));
    }
  } catch (e) {
    respBody.textContent = '网络错误：' + e.message;
  }

  btn.disabled = false;
  btn.textContent = '提交分析';
}

async function bootstrap() {
  gateBtn.onclick = () => {
    const code = gateCode.value.trim();
    if (!code) { showGateError('请输入访问码'); return; }
    tryEnter(code, document.getElementById('gateRemember').checked);
  };
  gateCode.addEventListener('keydown', e => {
    if (e.key === 'Enter') gateBtn.click();
  });
  document.getElementById('logoutBtn').onclick = () => {
    clearSession();
    lockApp();
  };

  const remembered = localStorage.getItem(CODE_KEY);
  if (remembered && isSessionValid()) {
    gateCode.value = remembered;
    const ok = await tryEnter(remembered, true);
    if (ok) return;
  }

  const sessionCode = sessionStorage.getItem(CODE_KEY);
  if (sessionCode) {
    const ok = await tryEnter(sessionCode, false);
    if (ok) return;
  }

  lockApp();
}

bootstrap();
</script>
</body>
</html>
