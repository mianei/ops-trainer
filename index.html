<!DOCTYPE html>
<!-- CVassistant · ops-trainer -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, viewport-fit=cover" />
<script>
(function () {
  var mq = window.matchMedia('(max-width: 899px), (hover: none) and (pointer: coarse)');
  function apply() { document.documentElement.classList.toggle('is-mobile', mq.matches); }
  apply();
  if (mq.addEventListener) mq.addEventListener('change', apply);
  else if (mq.addListener) mq.addListener(apply);
})();
</script>
<meta name="color-scheme" content="light" />
<meta name="format-detection" content="telephone=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>CVassistant · AI 产品经理训练</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Outfit:wght@600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f7;
    --white: #ffffff;
    --wash: #f5f5f7;
    --ink: #1d1d1f;
    --ink2: #6e6e73;
    --ink3: #86868b;
    --line: rgba(0, 0, 0, 0.06);
    --line-strong: rgba(0, 0, 0, 0.1);
    --accent: #0071e3;
    --accent-soft: rgba(0, 113, 227, 0.08);
    --product: #26c281;
    --product-soft: rgba(38, 194, 129, 0.12);
    --btn-green-top: #4ae0ad;
    --btn-green-mid: #32d598;
    --btn-green-base: #26c281;
    --btn-green-lip: #1e9e68;
    --btn-green-glow: rgba(38, 194, 129, 0.38);
    --ops: #0066cc;
    --ops-soft: rgba(0, 102, 204, 0.08);
    --interview: #5e5ce6;
    --interview-soft: rgba(94, 92, 230, 0.08);
    --biz: #30b0a6;
    --biz-soft: rgba(48, 176, 166, 0.08);
    --map: #ac8e68;
    --map-soft: rgba(172, 142, 104, 0.1);
    --wave-1: #e8f0ff;
    --wave-2: #f0e8ff;
    --frost: rgba(255, 255, 255, 0.42);
    --frost-strong: rgba(255, 255, 255, 0.62);
    --frost-solid: rgba(255, 255, 255, 0.78);
    --frost-border: rgba(255, 255, 255, 0.72);
    --frost-edge: rgba(0, 0, 0, 0.05);
    --frost-dark: rgba(29, 29, 31, 0.72);
    --blur-sm: blur(14px) saturate(165%);
    --blur-md: blur(28px) saturate(185%);
    --blur-lg: blur(44px) saturate(200%);
    --inset-hi: inset 0 1px 0 rgba(255, 255, 255, 0.75);
    --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.04);
    --shadow: 0 8px 32px rgba(0, 0, 0, 0.06), 0 2px 8px rgba(0, 0, 0, 0.03);
    --shadow-lg: 0 24px 56px rgba(0, 0, 0, 0.08), 0 8px 20px rgba(0, 0, 0, 0.04);
    --danger: #ff3b30;
    --danger-bg: rgba(255, 59, 48, 0.08);
    --ok: #34c759;
    --r: 12px;
    --r-md: 16px;
    --r-lg: 20px;
    --r-xl: 28px;
    --max: 1080px;
    --sidebar-w: 200px;
    --sidebar-gap: 20px;
    --sans: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'HarmonyOS Sans SC', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --sans-en: 'Syne', 'Outfit', var(--sans);
  }

  html {
    font-size: 16px;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
  }
  html, body {
    overflow-x: hidden;
    max-width: 100%;
  }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    min-height: 100dvh;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    word-break: break-word;
    overflow-wrap: anywhere;
  }

  .bg-scene {
    position: absolute; inset: 0; z-index: 0; pointer-events: none;
    background: linear-gradient(180deg, #e8f2fa 0%, #e4ebf8 45%, #dde8f5 100%);
    overflow: hidden;
  }
  .bg-horizon-svg {
    position: absolute;
    top: 0;
    left: -10%;
    width: 120%;
    height: clamp(300px, 44vh, 480px);
    z-index: 1;
    pointer-events: none;
    will-change: transform;
    animation: horizonPan 28s ease-in-out infinite;
  }
  .bg-horizon-svg path {
    transform-box: fill-box;
    transform-origin: 50% 100%;
    animation: horizonPathSway 14s ease-in-out infinite;
  }
  @keyframes horizonPan {
    0%, 100% { transform: translate3d(0, 0, 0); }
    50% { transform: translate3d(-5%, 0, 0); }
  }
  @keyframes horizonPathSway {
    0%, 100% { transform: translate3d(0, 0, 0) scaleY(1); }
    33% { transform: translate3d(2%, -2%, 0) scaleY(1.018); }
    66% { transform: translate3d(-2%, 1.5%, 0) scaleY(0.985); }
  }
  .bg-wave-svg {
    position: absolute; width: 140%; left: -20%; top: 24%;
    opacity: 0.82;
    will-change: transform;
    z-index: 0;
    animation: wavePan 28s ease-in-out infinite;
  }
  .bg-wave-mid {
    transform-origin: 55% 85%;
    animation: waveDriftMid 14s ease-in-out infinite;
  }
  .bg-wave-back {
    transform-origin: 50% 80%;
    animation: waveDriftBack 18s ease-in-out infinite;
  }
  .bg-wave-front {
    transform-origin: 40% 90%;
    animation: waveDriftFront 11s ease-in-out infinite;
  }
  @keyframes wavePan {
    0%, 100% { transform: translate3d(0, 0, 0); }
    50% { transform: translate3d(-5%, 0, 0); }
  }
  @keyframes waveDriftMid {
    0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
    25% { transform: translate3d(4%, -3%, 0) scale(1.025); }
    50% { transform: translate3d(-3%, 2.5%, 0) scale(0.985); }
    75% { transform: translate3d(2%, -1.5%, 0) scale(1.015); }
  }
  @keyframes waveDriftBack {
    0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
    33% { transform: translate3d(-5%, 2.5%, 0) scale(1.03); }
    66% { transform: translate3d(3.5%, -2%, 0) scale(0.98); }
  }
  @keyframes waveDriftFront {
    0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
    50% { transform: translate3d(6%, -3.5%, 0) scale(1.04); }
  }
  .bg-blob {
    position: absolute; border-radius: 50%; filter: blur(80px);
    opacity: 0.58; will-change: transform;
  }
  .bg-blob-1 {
    width: 480px; height: 480px; top: -100px; right: -80px;
    background: linear-gradient(135deg, rgba(74, 224, 173, 0.55), rgba(184, 212, 255, 0.5));
    animation: blobFloat1 18s ease-in-out infinite;
  }
  .bg-blob-2 {
    width: 360px; height: 360px; bottom: 8%; left: -90px;
    background: linear-gradient(135deg, rgba(212, 245, 224, 0.65), rgba(232, 240, 255, 0.55));
    animation: blobFloat2 24s ease-in-out infinite;
  }
  .bg-blob-3 {
    width: 280px; height: 280px; top: 38%; right: 12%;
    background: linear-gradient(135deg, rgba(38, 194, 129, 0.22), rgba(94, 92, 230, 0.12));
    animation: blobFloat3 20s ease-in-out infinite;
  }
  @keyframes blobFloat3 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(-25px, 30px) scale(1.06); }
  }
  @keyframes blobFloat1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(-30px, 25px) scale(1.08); }
  }
  @keyframes blobFloat2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(40px, -20px) scale(1.05); }
  }
  @media (prefers-reduced-motion: reduce) {
    .bg-horizon-svg, .bg-horizon-svg path, .bg-wave-svg, .bg-wave-mid, .bg-wave-back, .bg-wave-front, .bg-blob-1, .bg-blob-2, .bg-blob-3 { animation: none; }
  }

  .frost-base {
    background: var(--frost);
    backdrop-filter: var(--blur-md);
    -webkit-backdrop-filter: var(--blur-md);
    border: 1px solid var(--frost-border);
    box-shadow: var(--shadow), var(--inset-hi);
  }
  .glass {
    background: var(--frost);
    backdrop-filter: var(--blur-md);
    -webkit-backdrop-filter: var(--blur-md);
    border: 1px solid var(--frost-border);
    box-shadow: var(--shadow-sm), var(--inset-hi);
  }
  .surface {
    background: var(--frost-strong);
    backdrop-filter: var(--blur-lg);
    -webkit-backdrop-filter: var(--blur-lg);
    border: 1px solid var(--frost-border);
    box-shadow: var(--shadow), var(--inset-hi);
  }
  .surface-card {
    background: var(--frost-strong);
    backdrop-filter: var(--blur-md);
    -webkit-backdrop-filter: var(--blur-md);
    border: 1px solid var(--frost-border);
    border-radius: var(--r-xl);
    box-shadow: var(--shadow-sm), var(--inset-hi);
  }
  .surface-card--flat {
    box-shadow: var(--shadow-sm), var(--inset-hi);
    border-radius: var(--r-lg);
  }
  .btn-frost {
    font-family: inherit;
    cursor: pointer;
    background: var(--frost);
    backdrop-filter: var(--blur-sm);
    -webkit-backdrop-filter: var(--blur-sm);
    border: 1px solid var(--frost-border);
    box-shadow: var(--inset-hi), 0 2px 10px rgba(0, 0, 0, 0.04);
    transition: background 0.25s, border-color 0.25s, transform 0.2s, box-shadow 0.25s;
  }
  .btn-frost:hover {
    background: var(--frost-strong);
    border-color: rgba(255, 255, 255, 0.85);
  }
  @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
    .glass, .surface, .surface-card, .btn-frost {
      background: rgba(255, 255, 255, 0.94);
    }
  }

  .btn-primary {
    font-size: 15px; font-weight: 600; font-family: inherit;
    color: #fff;
    border: none;
    border-radius: 980px;
    cursor: pointer;
    position: relative;
    background: linear-gradient(
      180deg,
      var(--btn-green-top) 0%,
      var(--btn-green-mid) 38%,
      var(--btn-green-base) 100%
    );
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.48),
      inset 0 -1px 0 rgba(0, 0, 0, 0.08),
      0 5px 0 var(--btn-green-lip),
      0 10px 24px var(--btn-green-glow);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .btn-primary:hover {
    background: linear-gradient(
      180deg,
      #55e6b8 0%,
      #3adba2 38%,
      #2bcc8a 100%
    );
    transform: translateY(-1px);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.55),
      inset 0 -1px 0 rgba(0, 0, 0, 0.06),
      0 6px 0 var(--btn-green-lip),
      0 14px 30px rgba(38, 194, 129, 0.44);
  }
  .btn-primary:active {
    transform: translateY(4px);
    background: linear-gradient(
      180deg,
      var(--btn-green-mid) 0%,
      var(--btn-green-base) 55%,
      #22b078 100%
    );
    box-shadow:
      inset 0 2px 5px rgba(0, 0, 0, 0.18),
      inset 0 1px 0 rgba(255, 255, 255, 0.28),
      0 1px 0 var(--btn-green-lip),
      0 5px 16px rgba(38, 194, 129, 0.28);
  }
  .btn-primary:disabled {
    opacity: 0.52;
    cursor: not-allowed;
    transform: none;
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.3),
      0 3px 0 var(--btn-green-lip),
      0 6px 14px rgba(38, 194, 129, 0.18);
  }
  .review-meta {
    font-size: 12px;
    color: var(--ink3);
    margin-bottom: 0.75rem;
    line-height: 1.5;
  }

  /* —— 主应用 —— */
  #app { display: none; position: relative; z-index: 1; min-height: 100vh; }
  #app.visible { display: flex; flex-direction: column; }

  .page-wrap {
    position: relative; z-index: 1;
    max-width: var(--max); margin: 0 auto;
    padding: 0 24px 3rem; width: 100%;
  }

  .hero-compact {
    position: relative;
    padding: 2.25rem 0 1.5rem;
    max-width: 720px;
    isolation: isolate;
  }
  .hero-eyebrow-row {
    display: flex;
    align-items: center;
    gap: clamp(12px, 3vw, 28px);
    margin-bottom: 0.65rem;
    min-height: 92px;
  }
  .hero-eyebrow-row .eyebrow {
    flex: 0 0 auto;
    margin-bottom: 0;
    line-height: 1.3;
  }
  .hero-waveform {
    position: relative;
    z-index: 0;
    flex: 1 1 auto;
    min-width: 140px;
    max-width: min(480px, 58vw);
    height: 92px;
    pointer-events: none;
    opacity: 0.68;
    -webkit-mask-image: linear-gradient(90deg, transparent 0%, rgba(0, 0, 0, 0.35) 12%, rgba(0, 0, 0, 0.92) 42%, rgba(0, 0, 0, 0.55) 100%);
    mask-image: linear-gradient(90deg, transparent 0%, rgba(0, 0, 0, 0.35) 12%, rgba(0, 0, 0, 0.92) 42%, rgba(0, 0, 0, 0.55) 100%);
  }
  .hero-copy {
    position: relative;
    z-index: 1;
  }
  @media (max-width: 720px) {
    .hero-eyebrow-row {
      flex-wrap: wrap;
      min-height: 0;
      gap: 0.35rem 0.75rem;
      margin-bottom: 0.6rem;
    }
    .hero-waveform {
      flex: 1 1 100%;
      max-width: none;
      height: 80px;
      opacity: 0.52;
    }
  }
  .hero-compact::before {
    content: '';
    position: absolute;
    inset: -24px -40px auto -20px;
    height: 200px;
    border-radius: 48px;
    background: radial-gradient(ellipse 90% 100% at 20% 0%, rgba(38, 194, 129, 0.1), transparent 68%),
                radial-gradient(ellipse 70% 80% at 80% 20%, rgba(184, 212, 255, 0.18), transparent 72%);
    pointer-events: none;
    z-index: -1;
  }
  .hero-brand {
    font-family: var(--sans-en);
    font-size: clamp(2.25rem, 5.5vw, 3.35rem);
    line-height: 1.12;
    margin-bottom: 1.1rem;
    letter-spacing: -0.04em;
    white-space: nowrap;
  }
  .hero-brand .hb-mind {
    font-weight: 800;
    letter-spacing: -0.045em;
    color: #141416;
  }
  .hero-brand .hb-train {
    font-family: 'Outfit', var(--sans);
    font-weight: 700;
    letter-spacing: -0.028em;
    color: var(--btn-green-base);
  }
  .hero-copy .eyebrow {
    font-size: 12px; font-weight: 600; color: var(--accent);
    margin-bottom: 0.75rem; letter-spacing: 0.02em;
  }
  .hero-copy h1 {
    font-size: clamp(1.75rem, 4vw, 2.35rem);
    font-weight: 700; letter-spacing: -0.035em;
    line-height: 1.12; margin-bottom: 0.75rem;
  }
  .hero-copy .desc {
    font-size: 15px; color: var(--ink2); line-height: 1.6;
    max-width: 36em;
  }

  .sync-bar {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--ink3);
    padding: 12px 16px; border-radius: var(--r-lg);
    margin-bottom: 1rem;
  }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ink3); }
  .sync-dot.ok { background: var(--ok); }
  .sync-dot.err { background: var(--danger); }

  .workspace-shell {
    border-radius: var(--r-xl);
    padding: 20px;
    margin-bottom: 1rem;
    overflow: visible;
    background: var(--frost-strong);
    border: 1px solid var(--frost-border);
    box-shadow: var(--shadow-sm), var(--inset-hi);
  }
  .workspace-mode-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 1.25rem;
    padding: 4px;
    border-radius: var(--r-lg);
    background: rgba(255, 255, 255, 0.35);
    border: 1px solid var(--frost-border);
    width: fit-content;
    max-width: 100%;
  }
  .mode-btn {
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 18px;
    border: none;
    border-radius: var(--r);
    background: transparent;
    color: var(--ink2);
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .mode-btn.active {
    background: #fff;
    color: var(--ink);
    box-shadow: var(--shadow-sm), var(--inset-hi);
  }
  .scenario-search-wrap {
    position: relative;
    width: 100%;
    margin-bottom: 0;
  }
  .train-toolbar {
    width: 100%;
    margin-bottom: 1rem;
  }
  @media (min-width: 900px) {
    .train-toolbar {
      grid-column: 1 / -1;
    }
  }
  .scenario-search-label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 6px;
  }
  .scenario-search-field {
    position: relative;
    display: flex;
    align-items: stretch;
  }
  .scenario-search-icon {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink3);
    pointer-events: none;
  }
  .scenario-search-icon svg {
    display: block;
    width: 16px;
    height: 16px;
  }
  .scenario-search-input {
    width: 100%;
    font-family: inherit;
    font-size: 14px;
    padding: 10px 14px 10px 40px;
    border-radius: var(--r-lg);
    border: 1px solid var(--frost-border);
    background: rgba(255, 255, 255, 0.55);
    color: var(--ink);
    box-shadow: var(--inset-hi);
    outline: none;
    transition: border-color 0.15s, background 0.15s;
  }
  .scenario-search-input:focus {
    border-color: rgba(0, 0, 0, 0.12);
    background: #fff;
    box-shadow: var(--inset-hi);
  }
  .scenario-search-input::-webkit-search-cancel-button {
    -webkit-appearance: none;
  }
  .scenario-search-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .scenario-search-chip {
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 999px;
    border: 1px solid var(--frost-border);
    background: rgba(255, 255, 255, 0.4);
    color: var(--ink2);
    cursor: pointer;
  }
  .scenario-search-chip:hover { background: #fff; color: var(--ink); }
  .scenario-search-results {
    position: absolute;
    z-index: 40;
    left: 0;
    right: 0;
    top: calc(100% + 4px);
    max-height: min(320px, 50vh);
    overflow-y: auto;
    border-radius: var(--r-lg);
    background: #fff;
    border: 1px solid var(--frost-border);
    box-shadow: var(--shadow-md);
  }
  .scenario-search-results[hidden] { display: none !important; }
  .scenario-search-item {
    display: block;
    width: 100%;
    text-align: left;
    font-family: inherit;
    font-size: 13px;
    line-height: 1.45;
    padding: 10px 12px;
    border: none;
    border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    background: transparent;
    color: var(--ink);
    cursor: pointer;
  }
  .scenario-search-item:last-child { border-bottom: none; }
  .scenario-search-item:hover,
  .scenario-search-item:focus {
    background: rgba(99, 102, 241, 0.08);
    outline: none;
  }
  .scenario-search-item-meta {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--ink3);
    margin-bottom: 4px;
  }
  .scenario-search-item mark {
    background: rgba(250, 204, 21, 0.45);
    color: inherit;
    padding: 0 1px;
    border-radius: 2px;
  }
  .scenario-search-empty {
    padding: 12px 14px;
    font-size: 13px;
    color: var(--ink3);
  }
  .goal-plan-wrap {
    margin-bottom: 1rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--line);
  }
  .goal-plan-label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 6px;
  }
  .goal-plan-row {
    display: flex;
    gap: 8px;
    align-items: stretch;
  }
  .goal-plan-input {
    flex: 1;
    min-width: 0;
    font-family: inherit;
    font-size: 14px;
    padding: 10px 14px;
    border-radius: var(--r-lg);
    border: 1px solid var(--frost-border);
    background: rgba(255, 255, 255, 0.55);
    color: var(--ink);
    box-shadow: var(--inset-hi);
    outline: none;
  }
  .goal-plan-input:focus {
    border-color: rgba(0, 0, 0, 0.12);
    background: #fff;
  }
  .goal-plan-btn {
    flex-shrink: 0;
    height: auto;
    padding: 10px 18px;
    font-size: 14px;
    white-space: nowrap;
  }
  .goal-plan-btn:disabled { opacity: 0.55; cursor: not-allowed; }
  .goal-plan-error {
    margin-top: 8px;
    font-size: 13px;
    color: var(--danger);
    display: none;
  }
  .goal-plan-error.visible { display: block; }
  .module-head .mh-focus {
    font-size: 14px;
    color: var(--accent);
    line-height: 1.5;
    margin-bottom: 10px;
    padding: 10px 12px;

<script>
const GITHUB_TOPICS_URL = '';

let accessCode = 'guest';
let userAccountId = 'guest';
let workspaceMode = localStorage.getItem('workspaceMode') || 'interview';
const LEGACY_WORKSPACE = { sense: 'interview', coach: 'resume', bank: 'interview', train: 'interview', knowledge: 'interview' };
if (LEGACY_WORKSPACE[workspaceMode]) {
  workspaceMode = LEGACY_WORKSPACE[workspaceMode];
  localStorage.setItem('workspaceMode', workspaceMode);
}
let senseSubView = 'home';
let interviewSubView = localStorage.getItem('interviewSubView') || 'prep';
let profileResume = localStorage.getItem('profileResume') || '';
let profileJd = localStorage.getItem('profileJd') || '';
let profileTargetRole = localStorage.getItem('profileTargetRole') || '';
/** @type {{ version: number, questions: object[] } | null} */
let INTERVIEW_BANK_V2 = null;
/** @type {{ questions: object[] } | null} */
let AI_PM_BANK = null;
/** @type {{ questions: object[] } | null} */
let AI_PM_CURATED = null;
let bankSource = localStorage.getItem('bankSource') || 'curated';
/** @type {object | null} */
let activeBankQuestion = null;
const v2TimerByTopic = {};
const v2RecorderByTopic = {};
let knowledgePageId = localStorage.getItem('knowledgePageId') || 'ai-pm';
let knowledgeFlatIndex = 0;
let knowledgeBodyPageIndex = 0;
/** 切到知识库前暂存的题目/作答，返回练习时恢复 */
const scenarioPinByTopic = Object.create(null);
const answerDraftByTopic = Object.create(null);
let trainUiReturnTopicId = '';
const RESUME_COACH_MODES = new Set(['full-report', 'project-direction', 'project-iteration', 'resume-diagnosis']);
const coachIntake = Object.create(null);
const resumeMessages = [];
const interviewPrepMessages = [];
let resumeDraftMessage = '';
let interviewDraftMessage = '';
const KNOWLEDGE_PAGES = [
  {
    id: 'ai-pm',
    label: 'AI 产品方法',
    cat: 'interview',
    hint: 'RAG · Agent · Eval · AIGC 产品',
    sectionIds: ['platform-aigc', 'web-ai-pm', 'interview-pm-extra']
  },
  {
    id: 'interview',
    label: '面试表达',
    cat: 'interview',
    hint: 'STAR · 框架 · 项目 defense',
    sectionIds: ['interview-skills', 'interview-expr', 'interview-frameworks', 'web-interview-core']
  }
];
let KNOWLEDGE = [];
let KNOWLEDGE_MAP = { readingByNav: {}, readingByTopic: {} };
let TOPICS = [];
let activeTopicId = '';
/** @type {{ navId: string, moduleLabel: string, scenario: string, tag: string }[]} */
let SCENARIO_INDEX = [];
let scenarioSearchTimer = null;
/** @type {string} */
let activeGoalFocus = '';
/** @type {{ goal: string, focus: string, steps: object[], currentIndex: number, doneKeys: string[] } | null} */
let agentMission = null;
/** @type {{ navId: string, moduleLabel: string, scenario: string, tag: string }[]} */
let scenarioSearchHits = [];
/** @type {Record<string, { scenario: string, answer: string, feedback: string, history: {q:string,a:string}[] }>} */
const mentorSessions = {};

const app = document.getElementById('app');

/** 侧栏：仅 AI 产品经理训练模块 */
const CURRICULUM = {
  aiPm: [
    { label: 'AI 产品专业课', id: 'iv-pm', desc: 'RAG · Agent · 评测 · AIGC · 大模型产品' },
    { label: '求职与项目表达', id: 'iv-exp', poolIds: ['iv-exp', 'iv-self', 'iv-career'], desc: 'STAR · 项目 defense · 动机规划' }
  ]
};

function curriculumPoolIds(mod) {
  return mod.poolIds || [mod.id];
}

function buildNavMeta() {
  const map = new Map();
  CURRICULUM.aiPm.forEach(m => map.set(m.id, m));
  return map;
}

function navCategory(id) {
  if (CURRICULUM.aiPm.some(m => m.id === id || curriculumPoolIds(m).includes(id))) {
    return { cat: 'interview', catLabel: 'AI 产品经理' };
  }
  const t = getTopic(id);
  return meta(t);
}
let NAV_META = null;

function getNavModule(id) {
  if (!NAV_META) NAV_META = buildNavMeta();
  return NAV_META.get(id);
}

function meta(topicOrId) {
  const t = typeof topicOrId === 'string' ? getTopic(topicOrId) : topicOrId;
  if (!t) return { cat: 'interview', catLabel: 'AI 产品经理', desc: '' };
  return { cat: 'interview', catLabel: t.catLabel || 'AI 产品经理', desc: t.desc || '' };
}

function topicMap() {
  return new Map(TOPICS.map(t => [t.id, t]));
}

function countScenarios(list) {
  return list.reduce((n, t) => n + (t.scenarios?.length || 0), 0);
}

function countModuleScenarios(mod, map) {
  return curriculumPoolIds(mod).reduce((n, id) => {
    const t = map.get(id);
    return n + (t?.scenarios?.length || 0);
  }, 0);
}

function topicsByCategory() {
  const map = topicMap();
  const aiPm = CURRICULUM.aiPm.map(m => map.get(m.id)).filter(Boolean);
  return { aiPm, ordered: aiPm };
}

function topicsUrl() {
  const base = GITHUB_TOPICS_URL.trim() || 'topics.json';
  const sep = base.includes('?') ? '&' : '?';
  return base + sep + 't=' + Date.now();
}

function setSyncStatus(ok, text) {
  const bar = document.getElementById('syncBar');
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  if (!bar || !dot || !txt) return;
  if (ok) {
    bar.hidden = true;
    bar.classList.add('sync-bar--hidden');
    return;
  }
  bar.hidden = false;
  bar.classList.remove('sync-bar--hidden');
  dot.className = 'sync-dot err';
  txt.textContent = text;
}

function unlockApp() {
  app.classList.add('visible');
  const btnHist = document.getElementById('btnHistory');
  if (btnHist) btnHist.hidden = false;
  if (!document.documentElement.classList.contains('is-mobile')) {
    initHeroWaveform();
  }
}

async function enterApp() {
  accessCode = 'guest';
  userAccountId = 'guest';
  unlockApp();
  await loadTopicsAndRender();
}

function authHeaders() {
  return {
    'Content-Type': 'application/json',
    'X-Access-Code': accessCode,
    'X-User-Id': userAccountId
  };
}

async function loadTopics() {
  const AI_PM_TOPIC_IDS = new Set(['iv-pm', 'iv-exp', 'iv-self', 'iv-career', 'prod-open']);
  /** @type {object[]} */
  let topics = [];
  try {
    const tr = await fetch('topics-interview.json?t=' + Date.now(), { cache: 'no-store' });
    if (tr.ok) {
      const trData = await tr.json();
      if (Array.isArray(trData.topics)) {
        topics = trData.topics.filter(t => AI_PM_TOPIC_IDS.has(t.id));
      }
    }
  } catch { /* */ }
  if (!topics.length) {
    topics = [{
      id: 'iv-pm',
      label: 'AI 产品经理',
      fieldLabel: '从 AI 产品视角作答：场景、方案、评测与迭代。',
      placeholder: '写下你的分析…',
      scenarios: [],
      systemPrompt: '你是一位 AI 产品经理面试官。点评学员作答是否体现 RAG/Agent/评测思维、产品判断与可辩护的项目叙事。300 字内，中文。',
      cat: 'interview',
      catLabel: 'AI 产品经理',
      desc: 'RAG · Agent · Eval'
    }];
  }
  for (const file of ['scenarios-interview-pm.json', 'scenarios-interview-misc.json', 'scenarios-interview-open.json']) {
    try {
      const ex = await fetch(file + '?t=' + Date.now(), { cache: 'no-store' });
      if (!ex.ok) continue;
      const extra = await ex.json();
      topics.forEach(t => {
        const list = extra[t.id];
        if (!Array.isArray(list)) return;
        list.forEach(s => {
          if (typeof s === 'string' && s.trim()) t.scenarios.push(s.trim());
        });
      });
    } catch { /* */ }
  }
  return topics;
}

function totalScenarios() {
  return TOPICS.reduce((n, t) => n + t.scenarios.length, 0);
}

function updateModuleHead(id) {
  const t = getTopic(id);
  const mod = getNavModule(id);
  const m = navCategory(id);
  const head = document.getElementById('moduleHead');
  if (!head || !t) return;
  const focusBlock = activeGoalFocus
    ? `<p class="mh-focus"><span class="mh-focus-label">本次重点：</span>${escapeHtml(activeGoalFocus)}</p>`
    : '';
  head.innerHTML = `
    ${focusBlock}
    <span class="mh-cat ${m.cat}">${m.catLabel}</span>
    <h2>${escapeHtml(mod ? mod.label : t.label)}</h2>
    <p>${escapeHtml(mod ? mod.desc : (t.desc || ''))}</p>
  `;
}

function appendModuleBtn(parent, t, mod, isActive, navCat) {
  const m = navCat || meta(t);
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'module-item cat-' + m.cat + (isActive ? ' active' : '');
  btn.dataset.id = t.id;
  btn.innerHTML = `
    <span class="mi-label">${escapeHtml(mod.label)}</span>
    <span class="mi-desc">${escapeHtml(mod.desc)}</span>
  `;
  btn.onclick = () => switchTab(t.id, btn);
  parent.appendChild(btn);
  return btn;
}

function renderNavGroup(nav, cat, catLabel, modules, topicById, activeRef) {
  const topics = modules.map(m => topicById.get(m.id)).filter(Boolean);
  const q = modules.reduce((n, m) => n + countModuleScenarios(m, topicById), 0);
  const navMeta = { cat, catLabel };
  const group = document.createElement('div');
  group.className = 'nav-group cat-' + cat;
  const head = document.createElement('div');
  head.className = 'nav-group-head';
  head.innerHTML = `${escapeHtml(catLabel)}<span class="nav-summary-count">${modules.length} 模块</span>`;
  group.appendChild(head);
  const body = document.createElement('div');
  body.className = 'nav-group-body';
  modules.forEach(mod => {
    const t = topicById.get(mod.id);
    if (!t) return;
    appendModuleBtn(body, t, mod, t.id === activeRef.activeId, navMeta);
  });
  group.appendChild(body);
  nav.appendChild(group);
  return { topics, q };
}

function buildScenarioIndex() {
  SCENARIO_INDEX = [];
  for (const mod of CURRICULUM.aiPm) {
    const pool = scenariosForNavModule(mod.id);
    const seen = new Set();
    pool.forEach(scenario => {
      if (!scenario || seen.has(scenario)) return;
      seen.add(scenario);
      const tagMatch = String(scenario).match(/^【([^·】]+)·([^】]+)】/);
      SCENARIO_INDEX.push({
        navId: mod.id,
        moduleLabel: mod.label,
        scenario,
        tag: tagMatch ? tagMatch[1] + '·' + tagMatch[2].split('·')[0] : ''
      });
    });
  }
}

function highlightSearchText(text, query) {
  const safe = escapeHtml(text);
  const q = String(query || '').trim();
  if (!q) return safe;
  const tokens = q.split(/\s+/).filter(Boolean);
  let out = safe;
  for (const tok of tokens) {
    const re = new RegExp(tok.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
    out = out.replace(re, m => `<mark>${m}</mark>`);
  }
  return out;
}

function searchScenarios(query, limit = 24) {
  const q = String(query || '').trim().toLowerCase();
  if (!q) return [];
  const tokens = q.split(/\s+/).filter(Boolean);
  const scored = [];
  for (const item of SCENARIO_INDEX) {
    const hay = (item.scenario + ' ' + item.moduleLabel + ' ' + item.tag).toLowerCase();
    if (!tokens.every(t => hay.includes(t))) continue;
    let score = 0;
    if (item.scenario.toLowerCase().startsWith('【' + tokens[0])) score += 3;
    if (item.tag.toLowerCase().includes(tokens[0])) score += 2;
    if (item.scenario.toLowerCase().indexOf(q) >= 0) score += 1;
    scored.push({ item, score });
  }
  scored.sort((a, b) => b.score - a.score || a.item.scenario.length - b.item.scenario.length);
  return scored.slice(0, limit).map(s => s.item);
}

function buildCardCatalog() {

  for (const sec of KNOWLEDGE) {
    for (const c of sec.cards || []) {

function scenarioKey(topicId, scenario) {
  return topicId + '::' + scenario;
}

function resolvePracticeScenario(topicId, keywords, excludeKeys) {
  const t = getTopic(topicId);
  if (!t) return null;
  let pool = pickScenarios(t);
  const kw = (keywords || []).filter(Boolean);
  if (kw.length) {
    const filtered = pool.filter(s => kw.some(k => String(s).includes(k)));
    if (filtered.length) pool = filtered;
  }
  const ex = new Set(excludeKeys || []);
  const available = pool.filter(s => !ex.has(scenarioKey(topicId, s)));
  const pickFrom = available.length ? available : pool.filter(s => !ex.has(scenarioKey(topicId, s)));
  const finalPool = pickFrom.length ? pickFrom : pool;
  if (!finalPool.length) return null;
  return finalPool[Math.floor(Math.random() * finalPool.length)];
}

function showMissionReadStep(step, stepIndex) {
  const panel = document.getElementById('missionStepPanel');
  if (!panel) return;
  const card = knowledgeCardById(step.cardId);
  if (!card) {
    completeMissionStep(stepIndex);
    advanceMission();
    return;
  }
  setMissionViewMode('read');
  const bodyPages = paginateCardBody(card.body || '');
  let bodyPage = 0;
  const render = () => {
    const bodyText = bodyPages[bodyPage] || '';
    const bodyPager = bodyPages.length > 1
      ? `<div class="mission-read-pager">
          <button type="button" class="kc-nav" id="missionBodyPrev" ${bodyPage <= 0 ? 'disabled' : ''}>上一页</button>
          <span class="knowledge-pager-pos">${bodyPage + 1} / ${bodyPages.length}</span>
          <button type="button" class="kc-nav" id="missionBodyNext" ${bodyPage >= bodyPages.length - 1 ? 'disabled' : ''}>下一页</button>
        </div>`
      : '';
    panel.innerHTML = `
      <article class="surface-card mission-read-card">
        <div class="mission-step-tag">第 ${stepIndex + 1} 步 · 阅读</div>
        <h3>${escapeHtml(card.title)}</h3>
        <div class="mission-read-body mission-read-body-paged">${escapeHtml(bodyText)}</div>
        ${bodyPager}
        <button type="button" class="btn-primary mission-step-done-btn" id="missionStepDoneBtn">已读完，继续</button>
      </article>
    `;
    document.getElementById('missionBodyPrev')?.addEventListener('click', () => {
      if (bodyPage <= 0) return;
      bodyPage -= 1;
      render();
    });
    document.getElementById('missionBodyNext')?.addEventListener('click', () => {
      if (bodyPage >= bodyPages.length - 1) return;
      bodyPage += 1;
      render();
    });
    document.getElementById('missionStepDoneBtn').onclick = () => {
      completeMissionStep(stepIndex);
      advanceMission();
    };
  };
  render();
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function showMissionPracticeStep(step, stepIndex) {
  setMissionViewMode('practice');
  if (!step.scenario) {
    step.scenario = resolvePracticeScenario(step.topicId, step.keywords, agentMission.doneKeys);
  }
  if (!step.scenario) {
    showGoalPlanError('该模块暂无可用题目');
    completeMissionStep(stepIndex);
    advanceMission();
    return;
  }
  agentMission.doneKeys.push(scenarioKey(step.topicId, step.scenario));
  switchTab(step.topicId, null);
  loadScenario(step.topicId, step.scenario, { allowExternal: !!(step.external || step.fromSearch || step.generated) });
  updateModuleHead(step.topicId);
  renderMissionBar();
  renderMissionStepList();
  const caseEl = document.getElementById('scenario-' + step.topicId);
  if (caseEl) caseEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function runMissionStep(index) {
  if (!agentMission || !agentMission.steps[index]) return;
  agentMission.currentIndex = index;
  const step = agentMission.steps[index];
  step.status = step.status === 'done' ? 'done' : 'current';
  agentMission.steps.forEach((s, i) => {
    if (i !== index && s.status === 'current') s.status = 'pending';
  });
  renderMissionBar();
  renderMissionStepList();
  if (step.type === 'read') showMissionReadStep(step, index);
  else if (step.type === 'practice') showMissionPracticeStep(step, index);
}

function completeMissionStep(index) {
  if (!agentMission || !agentMission.steps[index]) return;
  agentMission.steps[index].status = 'done';
  renderMissionBar();
  renderMissionStepList();
}

function advanceMission() {
  if (!agentMission) return;
  const next = agentMission.steps.findIndex((s, i) => i > agentMission.currentIndex && s.status !== 'done');
  const firstPending = agentMission.steps.findIndex(s => s.status !== 'done');
  const idx = next >= 0 ? next : firstPending;
  if (idx < 0) {
    showGoalPlanError('');
    const bar = document.getElementById('missionProgress');
    if (bar) bar.textContent = '任务完成 ✓';
    setMissionViewMode('practice');
    return;
  }
  runMissionStep(idx);
}

function insertRemedialSteps(topicId, scenario) {
  if (!agentMission) return;
  const insertAt = agentMission.currentIndex + 1;
  const newSteps = [];
  const cardIds = readingIdsForNav(topicId, scenario);
  cardIds.slice(0, 2).forEach(cardId => {
    const card = knowledgeCardById(cardId);
    if (card) newSteps.push({ type: 'read', cardId: card.id, title: card.title, status: 'pending', remedial: true });
  });
  const extraScenario = resolvePracticeScenario(topicId, agentMission.keywords || [], agentMission.doneKeys);
  if (extraScenario) {
    newSteps.push({
      type: 'practice',
      topicId,
      keywords: agentMission.keywords || [],
      scenario: extraScenario,
      status: 'pending',
      remedial: true
    });
  }
  if (!newSteps.length) return;
  agentMission.steps.splice(insertAt, 0, ...newSteps);
  renderMissionBar();
  renderMissionStepList();
}

function onMissionPracticeComplete(topicId, rubricAvg, scenario) {
  if (!agentMission) return;
  const cur = agentMission.steps[agentMission.currentIndex];
  if (!cur || cur.type !== 'practice' || cur.topicId !== topicId) return;
  if (scenario && !cur.scenario) cur.scenario = scenario;
  completeMissionStep(agentMission.currentIndex);
  const score = Number(rubricAvg);
  if (Number.isFinite(score) && score < 3) {
    insertRemedialSteps(topicId, cur.scenario || scenario);
  }
  setTimeout(() => advanceMission(), 800);
}

async function startMission(goal) {
  goal = String(goal || '').trim();
  if (!goal) {
    showGoalPlanError('请输入学习目标');
    return;
  }
  if (!TOPICS.length) {
    showGoalPlanError('题目尚未加载完成');
    return;
  }
  const btn = document.getElementById('goalPlanBtn');
  const input = document.getElementById('goalPlanInput');
  showGoalPlanError('');
  const coachIntent = detectCoachIntentLocal(goal);
  if (coachIntent) {
    if (btn) { btn.disabled = false; btn.textContent = '开始训练'; }
    openCoachFromGoal(goal, coachIntent);
    if (input) input.blur();
    return;
  }
  if (btn) {
    btn.disabled = true;
    btn.textContent = /面|面试|明[天日]|后天/i.test(goal) ? '规划并 AI 出题…' : '规划中…';
  }
  try {
    if (workspaceMode !== 'train') {
      workspaceMode = 'train';
      renderTopics();
    }
    const catalog = TOPICS.map(t => ({
      id: t.id,
      label: t.label,
      cat: t.cat,
      catLabel: t.catLabel
    }));
    const cardCatalog = buildCardCatalog();
    const res = await fetch('/api/plan', {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({ goal, catalog, cardCatalog })
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || '规划失败（HTTP ' + res.status + '）');
    const steps = (Array.isArray(data.steps) ? data.steps : []).map(s => ({
      ...s,
      status: 'pending'
    }));
    if (!steps.length) {
      showGoalPlanError('未生成有效任务，请换个目标描述再试');
      return;
    }
    agentMission = {
      goal,
      focus: data.focus || goal,
      keywords: data.keywords || [],
      weakTopicIds: data.weakTopicIds || [],
      intent: data.intent || null,
      externalSearch: data.externalSearch || null,
      llmGenerate: data.llmGenerate || null,
      ragChunks: data.ragChunks || [],
      ragSession: data.ragSession || null,
      steps,
      currentIndex: 0,
      doneKeys: []
    };
    activeGoalFocus = agentMission.focus;
    renderMissionBar();
    renderExternalSearchBox(agentMission.externalSearch);
    renderLlmDemoBox(agentMission.llmGenerate, agentMission.ragSession);
    renderMissionStepList();
    runMissionStep(0);
    if (input) input.blur();
  } catch (e) {
    showGoalPlanError(e.message || '规划失败');
  } finally {
    if (btn) {
      btn.disabled = false;
      btn.textContent = '开始训练';
    }
  }
}

function startByGoal(goal) {
  return startMission(goal);
}

function bindScenarioSearch() {
  const input = document.getElementById('scenarioSearchInput');
  const box = document.getElementById('scenarioSearchResults');
  const wrap = document.getElementById('scenarioSearchWrap');
  if (!input || !box) return;

  const run = () => renderScenarioSearchResults(input.value);

  input.addEventListener('input', () => {
    clearTimeout(scenarioSearchTimer);
    scenarioSearchTimer = setTimeout(run, 120);
  });
  input.addEventListener('focus', () => {
    if (input.value.trim()) run();
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      box.hidden = true;
      input.blur();
    } else if (e.key === 'Enter') {

const DOC_PARSER_SCRIPTS = {
  pdf: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js',
  pdfWorker: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js',
  mammoth: 'https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js'
};
const MAX_UPLOAD_BYTES = 10 * 1024 * 1024;

function loadExternalScript(src) {
  if (document.querySelector(`script[src="${src}"]`)) return Promise.resolve();
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.async = true;
    s.onload = () => resolve();
    s.onerror = () => reject(new Error('无法加载文档解析组件，请检查网络或改粘贴文本'));
    document.head.appendChild(s);
  });
}

async function ensureDocParsers() {
  if (window.__docParsersReady) return;
  await loadExternalScript(DOC_PARSER_SCRIPTS.pdf);
  await loadExternalScript(DOC_PARSER_SCRIPTS.mammoth);
  if (window.pdfjsLib) {
    window.pdfjsLib.GlobalWorkerOptions.workerSrc = DOC_PARSER_SCRIPTS.pdfWorker;
  }
  window.__docParsersReady = true;
}

function fileExtension(name) {
  const n = String(name || '').toLowerCase();
  const i = n.lastIndexOf('.');
  return i >= 0 ? n.slice(i + 1) : '';
}

async function parseUploadedDocument(file) {
  if (!file) throw new Error('未选择文件');
  if (file.size > MAX_UPLOAD_BYTES) throw new Error('文件超过 10MB，请压缩或粘贴文本');
  const ext = fileExtension(file.name);
  const type = String(file.type || '').toLowerCase();

  if (['txt', 'md', 'text'].includes(ext) || type.startsWith('text/')) {
    return { text: await file.text(), format: ext || 'txt' };
  }

  if (ext === 'doc') {
    throw new Error('旧版 .doc 暂不支持，请在 Word 中另存为 .docx 或导出 PDF');
  }

  await ensureDocParsers();

  if (ext === 'pdf' || type === 'application/pdf') {
    const pdf = await window.pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
    const parts = [];
    for (let p = 1; p <= pdf.numPages; p++) {
      const page = await pdf.getPage(p);
      const content = await page.getTextContent();
      parts.push(content.items.map(it => it.str).join(' '));
    }
    const text = parts.join('\n').replace(/[ \t]+\n/g, '\n').replace(/\n{3,}/g, '\n\n').trim();
    if (!text) {
      throw new Error('PDF 未识别到文字（可能是扫描件图片）。请换可复制文字的 PDF，或直接粘贴简历内容');
    }
    return { text, format: 'pdf' };
  }

  if (ext === 'docx' || type.includes('wordprocessingml')) {
    const result = await window.mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
    const text = String(result.value || '').trim();
    if (!text) throw new Error('DOCX 解析结果为空，请检查文件是否损坏');
    return { text, format: 'docx' };
  }

  throw new Error('不支持的格式，请上传 PDF、DOCX 或 TXT');
}

async function applyParsedFileToField(file, field) {
  const isResume = field === 'resume';
  const statusEl = document.getElementById(isResume ? 'resumeFileStatus' : 'jdFileStatus');

  if (statusEl) {
    statusEl.textContent = `正在解析 ${file.name}…`;
    statusEl.classList.remove('is-error');
  }
  try {
    const { text, format } = await parseUploadedDocument(file);
    if (isResume) {
      profileResume = text;
      localStorage.setItem('profileResume', profileResume);
    } else {
      profileJd = text;
      localStorage.setItem('profileJd', profileJd);
    }
    if (ta) ta.value = text;
    if (statusEl) statusEl.textContent = `已导入 ${file.name}（${format.toUpperCase()}，${text.length} 字）`;
  } catch (e) {
    if (statusEl) {
      statusEl.textContent = e.message || '解析失败';
      statusEl.classList.add('is-error');
    }
    alert(e.message || '文件解析失败');
  }
}

async function sendModuleCoachMessage(opts) {
  const {
    module, message, mode, action, messages, threadId,
    errId, btnId, inputId,
    displayMessage, restoreInputOnError = true,
    triggerBtnId, triggerBtnLabel
  } = opts;
  const errEl = document.getElementById(errId);
  const btn = document.getElementById(btnId);
  const input = document.getElementById(inputId);
  const triggerBtn = triggerBtnId ? document.getElementById(triggerBtnId) : null;
  const threadLabel = displayMessage || (action ? (triggerBtnLabel || '处理中') : message);

  if (errEl) { errEl.hidden = true; errEl.textContent = ''; }
  messages.push({ role: 'user', content: threadLabel });
  if (input) input.value = '';
  renderModuleThread(threadId, messages);
  if (btn && !triggerBtnId) { btn.disabled = true; btn.textContent = '生成中…'; }
  if (triggerBtn) {
    triggerBtn.disabled = true;
    triggerBtn.dataset.prevLabel = triggerBtn.textContent;
    triggerBtn.textContent = (triggerBtnLabel || '处理中') + '…';
  }
  syncExtraNotesFromDom();
  saveProfileFromDom();
  try {
    const payload = {
      accessCode,
      userId: userAccountId,
      contextModule: module,
      intake: buildCoachIntakeFromProfile(),
      history: messages.slice(0, -1)
    };
    if (action) payload.action = action;
    else {
      payload.message = message;
      payload.mode = mode || '';
    }
    const res = await fetch('/api/coach', {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify(payload)
    });
    const raw = await res.text();
    let data = {};
    try {
      data = raw ? JSON.parse(raw) : {};
    } catch {
      if (!res.ok) throw new Error(raw.slice(0, 300) || '请求失败（HTTP ' + res.status + '）');
    }
    if (!res.ok) {
      throw new Error(data.error || raw.slice(0, 300) || '请求失败（HTTP ' + res.status + '）');
    }
    messages.push({ role: 'assistant', content: data.reply || '' });
    renderModuleThread(threadId, messages);
  } catch (e) {
    if (errEl) {
      errEl.hidden = false;
      errEl.textContent = e.message || '发送失败';
    }
    messages.pop();
    renderModuleThread(threadId, messages);
    if (restoreInputOnError && input && message) input.value = message;
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '发送'; }
    if (triggerBtn) {
      triggerBtn.disabled = false;
      triggerBtn.textContent = triggerBtn.dataset.prevLabel || triggerBtnLabel || '完成';
    }
  }
}

function detectCoachIntentLocal(text) {
  const t = String(text || '').trim();
  if (!t) return null;
  const rules = [
    [/完整|落地方案|规划.*AI\s*项目|转\s*AI\s*产品/i, 'full-report'],
    [/迭代|无面试|没回复|demo.*弱|优化.*项目/i, 'project-iteration'],
    [/简历|诊断|改写|优化简历/i, 'resume-diagnosis'],
    [/面试防御|追问|讲项目|被问穿|准备面试/i, 'interview-defense'],
    [/没有.*项目|项目方向|找方向/i, 'project-direction'],
    [/AI\s*产品|RAG|Agent|评测|Eval|badcase/i, 'ai-pm-qa']
  ];
  for (const [re, mode] of rules) {
    if (re.test(t)) return mode;
  }
  return null;
}

async function runV2Analyze(topicId, mode) {
  const scenario = document.getElementById('scenario-' + topicId)?.textContent?.trim();
  const prep = document.getElementById('v2prep-' + topicId);
  if (!scenario || !prep) return;
  prep.hidden = false;
  prep.innerHTML = '<p class="stream-status">生成中…</p>';
  const answer = document.getElementById('answer-' + topicId)?.value?.trim() || '';
  const payload = { accessCode, userId: userAccountId, mode, scenario, bankMeta: activeBankQuestion || null };
  if (mode === 'compare') {
    if (!answer) { prep.innerHTML = '<p>请先写下回答，再点「参考对比」</p>'; return; }
    payload.answer = answer;
    payload.referenceOutline = activeBankQuestion?.referenceOutline;
  }
  try {
    const res = await fetch('/api/analyze', { method: 'POST', headers: authHeaders(), body: JSON.stringify(payload) });
    const data = await res.json();
    if (!res.ok) { prep.innerHTML = '<p>' + escapeHtml(data.error || '失败') + '</p>'; return; }
    prep.innerHTML = renderV2PrepHtml(mode, data.structured, data.text);
  } catch (e) {
    prep.innerHTML = '<p>网络错误：' + escapeHtml(e.message) + '</p>';
  }
}

function renderV2PrepHtml(mode, st, raw) {
  if (!st) return escapeHtml(raw || '').replace(/\n/g, '<br/>');
  if (mode === 'framework') {
    return `<h5>${escapeHtml(st.frameworkName || '回答框架')}</h5>` +
      (st.steps || []).map(s => `<p><strong>${escapeHtml(s.title)}</strong> ${escapeHtml(s.hint)}</p>`).join('') +
      (st.mustMention?.length ? `<h5>必须覆盖</h5><p>${st.mustMention.map(escapeHtml).join(' · ')}</p>` : '');
  }
  if (mode === 'rubric') {
    return `<h5>题型：${escapeHtml(st.questionType || '')}</h5>` +
      (st.dimensions || []).map(d => `<p><strong>${escapeHtml(d.name)}</strong> · 5分：${escapeHtml(d.excellent || '')}</p>`).join('');
  }
  if (mode === 'compare') {
    return `<p>覆盖度 ${st.coverageScore || '?'}/5</p>` +
      (st.missing?.length ? `<h5>遗漏</h5><p>${st.missing.map(escapeHtml).join(' · ')}</p>` : '') +
      (st.rewriteHint ? `<p>${escapeHtml(st.rewriteHint)}</p>` : '');
  }
  return escapeHtml(JSON.stringify(st));
}

function toggleV2Timer(topicId) {
  const el = document.getElementById('v2timer-' + topicId);
  if (!el) return;
  let t = v2TimerByTopic[topicId];
  if (t?.interval) { clearInterval(t.interval); v2TimerByTopic[topicId] = { sec: t.sec, interval: null }; return; }
  if (!t) t = { sec: 0, interval: null };
  t.interval = setInterval(() => {
    t.sec += 1;
    el.textContent = String(Math.floor(t.sec / 60)).padStart(2, '0') + ':' + String(t.sec % 60).padStart(2, '0');
  }, 1000);
  v2TimerByTopic[topicId] = t;
}

async function toggleV2Voice(topicId) {
  const btn = document.querySelector('#panel-' + topicId + ' [data-v2-voice]');
  const ta = document.getElementById('answer-' + topicId);
  if (!btn || !ta) return;
  if (v2RecorderByTopic[topicId]?.recording) { v2RecorderByTopic[topicId].recorder.stop(); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const recorder = new MediaRecorder(stream);
    const chunks = [];
    recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
    recorder.onstop = async () => {
      btn.classList.remove('recording'); btn.textContent = '语音输入';
      v2RecorderByTopic[topicId] = { recording: false };
      stream.getTracks().forEach(tr => tr.stop());
      const blob = new Blob(chunks, { type: 'audio/webm' });
      const b64 = await new Promise((resolve, reject) => {
        const r = new FileReader(); r.onload = () => resolve(String(r.result).split(',')[1]); r.onerror = reject; r.readAsDataURL(blob);
      });
      btn.textContent = '转写中…';
      try {
        const res = await fetch('/api/transcribe', { method: 'POST', headers: authHeaders(), body: JSON.stringify({ accessCode, userId: userAccountId, audioBase64: b64, mimeType: 'audio/webm' }) });
        const data = await res.json();
        if (res.ok && data.text) ta.value = (ta.value ? ta.value + '\n' : '') + data.text;
        else alert(data.error || '转写失败');
      } catch (e) { alert(e.message); }
      btn.textContent = '语音输入';
    };
    recorder.start();
    v2RecorderByTopic[topicId] = { recording: true, recorder };
    btn.classList.add('recording'); btn.textContent = '停止录音';
  } catch { alert('无法访问麦克风'); }
}

async function openAnalyticsModal() {

    document.body.appendChild(modal);
    modal.onclick = e => { if (e.target === modal) modal.classList.remove('open'); };
    modal.querySelector('#analyticsClose').onclick = () => modal.classList.remove('open');
  }
  const body = document.getElementById('analyticsBody');
  body.innerHTML = '<p style="color:var(--ink3)">加载中…</p>';
  modal.classList.add('open');
  try {
    const res = await fetch('/api/analytics', { method: 'POST', headers: authHeaders(), body: JSON.stringify({ accessCode, userId: userAccountId, topicIds: TOPICS.map(t => t.id) }) });
    const data = await res.json();
    if (!data.progressCurve?.length) { body.innerHTML = '<p>' + escapeHtml(data.summary || '暂无数据') + '</p>'; return; }

  } catch (e) { body.innerHTML = '<p>' + escapeHtml(e.message) + '</p>'; }

function resolveSystemPrompt(scenario, fallbackPrompt) {
  const text = String(scenario || '');
  const tag = text.match(/^【([^·】]+)·([^】]+)】/);
  const map = topicMap();
  if (tag) {
    const industry = tag[1];
    const kind = tag[2].split('·')[0];
    const mianjingMap = {
      需求: 'user', 决策: 'decision', 数据: 'data', 增长: 'growth', 留存: 'retention',
      竞品: 'competitor', 功能: 'feature', 危机: 'crisis', 活动: 'content',
      实习: 'iv-exp', 行为: 'iv-self', 规划: 'iv-career', 产品: 'iv-pm', AI: 'iv-pm',
      实操: 'iv-skills', 估算: 'iv-skills', 运营: 'iv-ops', 综合: 'iv-misc',
      策略: 'iv-open', 设计: 'prod-open', 变现: 'biz-monetize', 笔试: 'iv-misc'
    };
    if (industry === '面经') {
      const topicId = mianjingMap[kind];
      const tp = topicId && map.get(topicId);
      if (tp?.systemPrompt) return tp.systemPrompt;
    }
    const industryMap = {
      OTA: { 需求: 'user', 决策: 'decision', 数据: 'data', 竞品: 'competitor', 增长: 'growth', 功能: 'feature', 危机: 'crisis', 开放: 'iv-open' },
      电商: { 需求: 'user', 决策: 'decision', 数据: 'data', 竞品: 'competitor', 增长: 'growth', 功能: 'feature', 危机: 'crisis' },
      社区: { 需求: 'user', 决策: 'decision', 数据: 'data', 竞品: 'competitor', 增长: 'growth', 功能: 'feature', 危机: 'crisis' },
      即时零售: { 需求: 'user', 决策: 'decision', 数据: 'data' }
    };
    const topicId = industryMap[industry]?.[kind];
    const tp = topicId && map.get(topicId);
    if (tp?.systemPrompt) return tp.systemPrompt;
  }
  if (/^【AI PM/.test(text) || /^【AI·/.test(text)) {
    const pm = map.get('iv-pm');
    if (pm?.systemPrompt) return pm.systemPrompt;
  }
  if (/^【创作者运营/.test(text)) {
    const ops = map.get('iv-ops');
    if (ops?.systemPrompt) return ops.systemPrompt;
  }
  if (/^【面经/.test(text) || /^【面试/.test(text) || /面试题/.test(text)) {
    const pm = map.get('iv-pm');
    if (pm?.systemPrompt) return pm.systemPrompt;
  }
  return fallbackPrompt;
}

    html += `<div class="rubric-dim"><div class="rubric-dim-head"><span>${escapeHtml(d.name)}</span><span>${d.score}/5</span></div><div class="rubric-bar"><span style="width:${pct}%"></span></div><p>${escapeHtml(d.comment)}</p></div>`;
  });
  html += '<div class="rubric-lists">';
  if (review.strengths?.length) html += `<h5>亮点</h5><p>${review.strengths.map(s => escapeHtml(s)).join(' · ')}</p>`;
  if (review.gaps?.length) html += `<h5>待加强</h5><p>${review.gaps.map(s => escapeHtml(s)).join(' · ')}</p>`;
  if (review.actions?.length) html += `<h5>建议行动</h5><p>${review.actions.map(s => escapeHtml(s)).join(' · ')}</p>`;
  if (review.growth) html += `<h5>思维成长</h5><p>${escapeHtml(review.growth)}</p>`;
  html += '</div></div>';
  return html;
}

function renderKnowledgeMarkdownish(text) {
  return escapeHtml(text)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br/>');
}

function paginateCardBody(text, maxChars = 240) {
  const raw = String(text || '').trim();
  if (!raw) return [''];
  if (raw.length <= maxChars) return [raw];
  const pages = [];
  const paras = raw.split(/\n\n+/).filter(Boolean);
  let buf = '';
  const flush = () => {
    if (buf.trim()) { pages.push(buf.trim()); buf = ''; }
  };
  const pushLong = (p) => {
    let rest = p;
    while (rest.length > maxChars) {
      let cut = rest.lastIndexOf('。', maxChars);
      if (cut < maxChars * 0.35) cut = rest.lastIndexOf('\n', maxChars);
      if (cut < maxChars * 0.35) cut = maxChars;
      pages.push(rest.slice(0, cut).trim());
      rest = rest.slice(cut).trim();
    }
    if (rest) buf = rest;
  };
  for (const p of paras) {
    const next = buf ? `${buf}\n\n${p}` : p;
    if (next.length <= maxChars) { buf = next; continue; }
    flush();
    if (p.length > maxChars) pushLong(p);
    else buf = p;
  }
  flush();
  return pages.length ? pages : [raw];
}

function knowledgeFlatCardsForPage(pageId) {
  const flat = [];
  for (const sec of knowledgeSectionsForPage(pageId)) {
    for (const card of sec.cards || []) {
      flat.push({
        ...card,
        sectionTitle: sec.title,
        sectionCat: sec.cat || 'ops',
        bodyPages: paginateCardBody(card.body || '')
      });
    }
  }
  return flat;
}

function renderKnowledgeFlatViewerHtml(flat, cardIndex, bodyPageIndex) {
  if (!flat.length) {
    return '<p style="color:var(--ink3)">本页暂无条目</p>';
  }
  const ci = Math.max(0, Math.min(cardIndex, flat.length - 1));
  const card = flat[ci];
  const bodyPages = card.bodyPages || paginateCardBody(card.body || '');
  const bi = Math.max(0, Math.min(bodyPageIndex, bodyPages.length - 1));
  const bodyText = bodyPages[bi];
  const bodyNav = bodyPages.length > 1
    ? `<button type="button" class="kc-nav kc-body-prev" ${bi <= 0 ? 'disabled' : ''}>上一页</button>
       <span class="knowledge-pager-pos">${bi + 1} / ${bodyPages.length}</span>
       <button type="button" class="kc-nav kc-body-next" ${bi >= bodyPages.length - 1 ? 'disabled' : ''}>下一页</button>`
    : '';
  return `<section class="knowledge-flat-viewer cat-${escapeHtml(card.sectionCat || 'ops')}" data-card-id="${escapeAttr(card.id || '')}">
    <div class="knowledge-section-head">
      <h3>${escapeHtml(card.sectionTitle || '')}</h3>
      <span class="knowledge-counter">${ci + 1} / ${flat.length}</span>
    </div>
    <article class="knowledge-card knowledge-card-single">
      <h4>${escapeHtml(card.title)}</h4>
      <div class="kc-tags">${(card.tags || []).map(t => `<span class="kc-tag">${escapeHtml(t)}</span>`).join('')}</div>
      <div class="kc-body kc-body-paged">${renderKnowledgeMarkdownish(bodyText)}</div>
    </article>
    ${bodyNav ? `<div class="mission-read-pager">${bodyNav}</div>` : ''}
    <div class="knowledge-stack-nav" aria-label="卡片翻页">
      <button type="button" class="kc-nav kc-card-prev" ${ci <= 0 ? 'disabled' : ''} aria-label="上一张">← 上一张</button>
      <span class="knowledge-pager-pos">${ci + 1} / ${flat.length}</span>
      <button type="button" class="kc-nav kc-card-next" ${ci >= flat.length - 1 ? 'disabled' : ''} aria-label="下一张">下一张 →</button>
    </div>
  </section>`;
}

function bindKnowledgeFlatPager(flat) {
  const root = document.getElementById('knowledgeFlatViewer');
  if (!root || !flat.length) return;
  const rerender = () => {
    root.innerHTML = renderKnowledgeFlatViewerHtml(flat, knowledgeFlatIndex, knowledgeBodyPageIndex);
    bindKnowledgeFlatPager(flat);
  };
  root.querySelector('.kc-card-prev')?.addEventListener('click', () => {
    if (knowledgeFlatIndex <= 0) return;
    knowledgeFlatIndex -= 1;
    knowledgeBodyPageIndex = 0;
    rerender();
  });
  root.querySelector('.kc-card-next')?.addEventListener('click', () => {
    if (knowledgeFlatIndex >= flat.length - 1) return;
    knowledgeFlatIndex += 1;
    knowledgeBodyPageIndex = 0;
    rerender();
  });
  root.querySelector('.kc-body-prev')?.addEventListener('click', () => {
    if (knowledgeBodyPageIndex <= 0) return;
    knowledgeBodyPageIndex -= 1;
    rerender();
  });
  root.querySelector('.kc-body-next')?.addEventListener('click', () => {
    const pages = flat[knowledgeFlatIndex]?.bodyPages || [''];
    if (knowledgeBodyPageIndex >= pages.length - 1) return;
    knowledgeBodyPageIndex += 1;
    rerender();
  });
  let touchX = 0;
  root.addEventListener('touchstart', e => { touchX = e.changedTouches[0].clientX; }, { passive: true, once: true });
  root.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) < 40) return;
    if (dx < 0 && knowledgeFlatIndex < flat.length - 1) {
      knowledgeFlatIndex += 1;
      knowledgeBodyPageIndex = 0;
      rerender();
    } else if (dx > 0 && knowledgeFlatIndex > 0) {
      knowledgeFlatIndex -= 1;
      knowledgeBodyPageIndex = 0;
      rerender();
    }
  }, { passive: true, once: true });
}

function getKnowledgePage(pageId) {
  return KNOWLEDGE_PAGES.find(p => p.id === pageId) || KNOWLEDGE_PAGES[0];
}

function knowledgeSectionsForPage(pageId) {
  const page = getKnowledgePage(pageId);
  const idSet = new Set(page.sectionIds);
  return KNOWLEDGE.filter(sec => idSet.has(sec.id));
}

function knowledgeCardCountForPage(page) {
  return page.sectionIds.reduce((n, sid) => {
    const sec = KNOWLEDGE.find(s => s.id === sid);
    return n + (sec?.cards?.length || 0);
  }, 0);
}

function findKnowledgePageForCard(cardId) {
  for (const page of KNOWLEDGE_PAGES) {
    for (const sid of page.sectionIds) {
      const sec = KNOWLEDGE.find(s => s.id === sid);
      if (sec?.cards?.some(c => c.id === cardId)) return page.id;
    }
  }
  return null;
}

  if (navId === 'biz-platform' || navId.startsWith('biz-') || navId.startsWith('map-')) {
    const bz = list.filter(s => typeof s === 'string' && (s.includes('【业务分析·') || s.includes('【地图·')));
    return bz.length ? bz : list;
  }
  return list;
}

function scenariosForNavModule(navId) {
  const mod = getNavModule(navId);
  if (!mod) {
    const t = getTopic(navId);
    return t?.scenarios || [];
  }
  let list = [];
  curriculumPoolIds(mod).forEach(id => {
    const t = getTopic(id);
    if (t?.scenarios?.length) list.push(...t.scenarios);
  });
  return filterScenarioPool(navId, list);
}

function pickScenarios(topic) {
  const navId = topic.id || '';
  const pooled = scenariosForNavModule(navId);
  if (pooled.length) return pooled;
  return topic.scenarios || [];
}

function answerHintForScenario(scenarioText, fallback) {
  if (!scenarioText) return fallback || '请阅读上方场景，结构化写出你的分析。';
  const body = scenarioText.replace(/^【[^】]+】\s*/, '').trim();
  const ask = body.match(/请[^。；？]+[。；？]?/);
  if (ask) return ask[0].replace(/[。；]$/, '') + '。';
  const q = body.match(/[^。；]*？/);
  if (q) return '请回答：' + q[0].trim();
  if (/面试官问：/.test(body)) {
    const part = body.split(/[。；]/)[0];
    return part + '。';
  }
  if (/：[^：]{10,}/.test(body) && !body.includes('？') && !/请|如何|怎么|面试官/.test(body)) {
    const idx = body.indexOf('：');
    const head = body.slice(0, idx);
  return '请围绕「' + head + '」按要求作答：' + body.slice(idx + 1).replace(/[。.]$/, '') + '。';
  }
  return fallback || '请阅读上方场景，写出你的分析思路、依据与可验证的下一步。';
}

function loadScenario(id, preferredScenario, opts) {
  opts = opts || {};
  const t = getTopic(id);
  const pool = pickScenarios(t);
  const allowExternal = opts.allowExternal && preferredScenario;
  if (!pool.length && !allowExternal) {
    document.getElementById('scenario-' + id).textContent = '本题库暂无题目，请检查 scenarios-interview-pm.json';
    return;
  }
  let scenario;
  if (preferredScenario && (pool.includes(preferredScenario) || allowExternal)) {
    scenario = preferredScenario;
  } else if (!opts.forceRandom && scenarioPinByTopic[id] && pool.includes(scenarioPinByTopic[id])) {
    scenario = scenarioPinByTopic[id];
  } else {
    scenario = pool[Math.floor(Math.random() * pool.length)];
  }
  scenarioPinByTopic[id] = scenario;
  document.getElementById('scenario-' + id).textContent = scenario;
  updateReadingTip(id, scenario);
  const hintEl = document.querySelector('#panel-' + id + ' .wb-hint');
  if (hintEl) hintEl.textContent = answerHintForScenario(scenario, t.fieldLabel);
  if (!opts.preserveAnswer) {
    document.getElementById('answer-' + id).value = '';
    delete answerDraftByTopic[id];
  }
  if (!opts.preserveFeedback) {
    const resp = document.getElementById('resp-' + id);
    if (resp) resp.classList.remove('visible');
    clearMentorSession(id);
  }
}

function clearMentorSession(id) {
  delete mentorSessions[id];
  const wrap = document.getElementById('followup-' + id);
  const thread = document.getElementById('followup-thread-' + id);
  const input = document.getElementById('followup-input-' + id);
  const btn = document.getElementById('followup-btn-' + id);
  if (wrap) wrap.classList.remove('visible');
  if (thread) thread.innerHTML = '';
  if (input) { input.value = ''; input.disabled = true; }
  if (btn) { btn.disabled = true; btn.textContent = '发送追问'; }
}

function initFollowUp(id) {
  const input = document.getElementById('followup-input-' + id);
  const btn = document.getElementById('followup-btn-' + id);
  if (!input || !btn) return;
  btn.onclick = () => submitFollowUp(id);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!btn.disabled) submitFollowUp(id);
    }
  });
}

function enableFollowUp(id) {
  const wrap = document.getElementById('followup-' + id);
  const input = document.getElementById('followup-input-' + id);
  const btn = document.getElementById('followup-btn-' + id);
  if (wrap) wrap.classList.add('visible');
  if (input) input.disabled = false;
  if (btn) btn.disabled = false;
}

function appendFollowUpBubble(id, role, text, pending) {
  const thread = document.getElementById('followup-thread-' + id);
  if (!thread) return null;
  const el = document.createElement('div');
  el.className = 'fu-msg ' + role + (pending ? ' pending' : '');
  if (pending) {
    el.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
  } else {
    el.textContent = text;
  }
  thread.appendChild(el);
  thread.scrollTop = thread.scrollHeight;
  return el;
}

async function submitFollowUp(id) {
  if (!accessCode) { accessCode = 'guest'; userAccountId = userAccountId || 'guest'; }
  const session = mentorSessions[id];
  if (!session?.feedback) {
    alert('请先完成首轮作答并获取 AI 点评');
    return;
  }
  const input = document.getElementById('followup-input-' + id);
  const btn = document.getElementById('followup-btn-' + id);
  const question = (input?.value || '').trim();
  if (!question) { alert('请输入追问内容'); return; }

  const t = getTopic(id);
  btn.disabled = true;
  input.disabled = true;
  btn.textContent = '回复中…';
  appendFollowUpBubble(id, 'user', question, false);
  input.value = '';
  const pending = appendFollowUpBubble(id, 'assistant', '', true);

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({
        accessCode,
        userId: userAccountId,
        topicId: id,
        mode: 'followup',
        systemPrompt: t.systemPrompt,
        topicPrompts: topicPromptsPayload(),
        scenario: session.scenario,
        answer: session.answer,
        priorFeedback: session.feedback,
        history: session.history,
        question,
        ...(agentMission?.ragChunks?.length ? { ragChunks: agentMission.ragChunks } : {})
      })
    });
    let data = {};
    const raw = await res.text();
    try { data = raw ? JSON.parse(raw) : {}; } catch { /* */ }

    if (pending) pending.remove();
    if (res.ok && data.text) {
      session.history.push({ q: question, a: data.text });
      appendFollowUpBubble(id, 'assistant', data.text, false);
    } else if (res.status === 401) {
      appendFollowUpBubble(id, 'assistant', data.error || '请求失败，请稍后重试。', false);
    } else if (res.status === 429) {
      appendFollowUpBubble(id, 'assistant', data.error || '今日次数已达上限', false);
    } else {
      appendFollowUpBubble(id, 'assistant', data.error || ('请求失败（HTTP ' + res.status + '）'), false);
    }
  } catch (e) {
    if (pending) pending.remove();
    appendFollowUpBubble(id, 'assistant', '网络错误：' + e.message, false);
  }

  btn.disabled = false;
  input.disabled = false;
  btn.textContent = '发送追问';
  input.focus();
}

function finishReviewForTopic(id, scenario, data) {
  const metaHtml = reviewMetaHtml(data);
  const respBody = document.getElementById('resp-body-' + id);
  if (respBody) {
    respBody.innerHTML = data.structured
      ? renderStructuredReview(data.structured, metaHtml)
      : metaHtml + escapeHtml(data.text || '').replace(/\n/g, '<br/>');
  }
  mentorSessions[id] = { scenario, answer: document.getElementById('answer-' + id)?.value || '', feedback: data.text, history: [] };
  enableFollowUp(id);
  onMissionPracticeComplete(id, data.rubricAvg, scenario);
}

async function submitAnswer(id) {
  if (!accessCode) { accessCode = 'guest'; userAccountId = userAccountId || 'guest'; }
  const answer = document.getElementById('answer-' + id).value.trim();
  if (!answer) { alert('请先写下你的判断'); return; }

  const t = getTopic(id);
  const scenario = document.getElementById('scenario-' + id).textContent;
  const btn = document.getElementById('btn-' + id);
  const respArea = document.getElementById('resp-' + id);
  const respBody = document.getElementById('resp-body-' + id);
  const systemPrompt = resolveSystemPrompt(scenario, t.systemPrompt);

  btn.disabled = true;
  btn.textContent = 'Judgement 生成中…';
  respArea.classList.add('visible');
  respBody.innerHTML = '<p class="stream-status">正在生成 Judgement…</p>';

  const payload = {
    accessCode,
    userId: userAccountId,
    topicId: id,
    stream: true,
    systemPrompt,
    scenario,
    answer,
    topicPrompts: topicPromptsPayload()
  };
  if (agentMission?.ragChunks?.length) {
    payload.ragChunks = agentMission.ragChunks;
  }
  if (activeBankQuestion) {
    payload.bankMeta = activeBankQuestion;
  }

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify(payload)
    });
    const ctype = res.headers.get('content-type') || '';

    if (ctype.includes('ndjson') && res.body) {
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop() || '';
        for (const line of lines) {
          if (!line.trim()) continue;
          let evt;
          try { evt = JSON.parse(line); } catch { continue; }
          if (evt.type === 'done') {
            finishReviewForTopic(id, scenario, evt);
          } else if (evt.type === 'error') {
            respBody.textContent = evt.error || '生成失败';
            clearMentorSession(id);
          }
        }
      }
    } else {
      let data = {};
      const raw = await res.text();
      try { data = raw ? JSON.parse(raw) : {}; } catch {
        respBody.textContent = '服务端返回格式异常';
        return;
      }
      if (res.ok && data.text) {
        finishReviewForTopic(id, scenario, data);
      } else if (res.status === 401) {
        respBody.textContent = '请求失败，请稍后重试。';
      } else if (res.status === 429) {
        respBody.textContent = data.error || '今日次数已达上限';
      } else {
        respBody.textContent = data.error || ('请求失败（HTTP ' + res.status + '）');
        clearMentorSession(id);
      }
    }
  } catch (e) {
    respBody.textContent = '网络错误：' + e.message;
    clearMentorSession(id);
  }

  btn.disabled = false;
  btn.textContent = '提交判断 · Judgement';
}


function initMobile() {
  const mq = window.matchMedia('(max-width: 899px), (hover: none) and (pointer: coarse)');
  const apply = () => {
    document.documentElement.classList.toggle('is-mobile', mq.matches);
    if (TOPICS.length) {
      const { ordered } = topicsByCategory();
      setupMobileModuleNav(ordered);
    }
  };
  apply();
  if (mq.addEventListener) mq.addEventListener('change', apply);
  else mq.addListener(apply);
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(apply, 180);
  });
}

function initHorizonWave() {
  if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  document.querySelectorAll('.bg-horizon-svg animate').forEach(el => el.remove());
}

function initHeroWaveform() {
  const canvas = document.getElementById('heroWaveform');
  if (!canvas || canvas.dataset.ready === '1') return;
  canvas.dataset.ready = '1';
  const ctx = canvas.getContext('2d');
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  let mouse = { x: -9999, y: -9999 };
  let tick = 0;
  let cw = 0;
  let ch = 0;

  function resize() {
    const rect = canvas.getBoundingClientRect();
    cw = Math.max(1, rect.width);
    ch = Math.max(1, rect.height);
    canvas.width = Math.floor(cw * dpr);
    canvas.height = Math.floor(ch * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function roundRect(x, y, w, h, r) {
    const rr = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + rr, y);
    ctx.arcTo(x + w, y, x + w, y + h, rr);
    ctx.arcTo(x + w, y + h, x, y + h, rr);
    ctx.arcTo(x, y + h, x, y, rr);
    ctx.arcTo(x, y, x + w, y, rr);
    ctx.closePath();
  }

  function draw() {
    resize();
    ctx.clearRect(0, 0, cw, ch);
    const rect = canvas.getBoundingClientRect();
    const BAR = Math.max(36, Math.floor(cw / 5.2));
    const step = cw / BAR;
    const barW = step * 0.42;
    const midY = ch * 0.52;
    const bandH = ch * 0.92;
    const mx = mouse.x - rect.left;
    const my = mouse.y - rect.top;

    for (let i = 0; i < BAR; i++) {
      const x = i * step + (step - barW) / 2;
      const cx = x + barW / 2;
      const phase = i * 0.42;
      let amp = 0.18 + 0.82 * Math.pow(Math.abs(Math.sin(tick * 0.028 + phase)), 1.35);
      amp *= 0.55 + 0.45 * Math.sin(i * 0.22 + tick * 0.012);
      const dist = Math.hypot(mx - cx, my - midY);
      const boost = Math.max(0, 1 - dist / Math.max(140, cw * 0.38));
      amp = Math.min(1, amp + boost * 0.85);
      const barH = 8 + bandH * amp * 0.62;
      const y = midY - barH / 2;
      const g = ctx.createLinearGradient(x, y, x, y + barH);
      g.addColorStop(0, 'rgba(74, 224, 173, 0.08)');
      g.addColorStop(0.35, 'rgba(50, 213, 152, 0.42)');
      g.addColorStop(0.7, 'rgba(38, 194, 129, 0.55)');
      g.addColorStop(1, 'rgba(38, 194, 129, 0.12)');
      ctx.fillStyle = g;
      roundRect(x, y, barW, barH, barW / 2);
      ctx.fill();
    }
    tick += 1;
    if (!reduced) requestAnimationFrame(draw);
  }

  window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; }, { passive: true });
  window.addEventListener('touchmove', (e) => {
    if (e.touches[0]) { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; }
  }, { passive: true });
  if (typeof ResizeObserver !== 'undefined') new ResizeObserver(resize).observe(canvas);
  else window.addEventListener('resize', resize, { passive: true });
  tick = reduced ? 36 : 0;
  function boot() {
    resize();
    if (canvas.getBoundingClientRect().width < 2) {
      requestAnimationFrame(boot);
      return;
    }
    if (reduced) draw();
    else requestAnimationFrame(draw);
  }
  boot();
}


async function bootstrap() {
  initMobile();
  initHorizonWave();
  window.addEventListener('resize', () => {});
  const btnHistory = document.getElementById('btnHistory');
  if (btnHistory) btnHistory.onclick = openAnalyticsModal;
  await enterApp();
}

bootstrap();
