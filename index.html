<!DOCTYPE html>
<!-- CVassistant 3.0 -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, viewport-fit=cover" />
<script>
(function () {
  var t = localStorage.getItem('cvTheme');
  document.documentElement.setAttribute('data-theme', t === 'dark' ? 'dark' : 'light');
})();
(function () {
  var mq = window.matchMedia('(max-width: 899px), (hover: none) and (pointer: coarse)');
  function apply() { document.documentElement.classList.toggle('is-mobile', mq.matches); }
  apply();
  if (mq.addEventListener) mq.addEventListener('change', apply);
  else if (mq.addListener) mq.addListener(apply);
})();
</script>
<meta name="color-scheme" content="light dark" />
<meta name="format-detection" content="telephone=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>CVassistant · AI 产品经理训练</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Outfit:wght@600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --white: #ffffff;
    --wash: #f0f7ff;
    --ink: #1d1d1f;
    --ink2: #6e6e73;
    --ink3: #86868b;
    --line: rgba(0, 0, 0, 0.06);
    --line-strong: rgba(0, 0, 0, 0.1);
    --accent: #0071e3;
    --accent-soft: rgba(0, 113, 227, 0.08);
    --product: #26c281;
    --product-soft: rgba(38, 194, 129, 0.12);
    --btn-green-top: #4ae0ad;
    --btn-green-mid: #32d598;
    --btn-green-base: #26c281;
    --btn-green-lip: #1e9e68;
    --btn-green-glow: rgba(38, 194, 129, 0.38);
    --btn-green-hover-top: #55e6b8;
    --btn-green-hover-mid: #3adba2;
    --btn-green-hover-base: #2bcc8a;
    --btn-green-hover-glow: rgba(38, 194, 129, 0.44);
    --hero-ink: #141416;
    --hero-accent: #26c281;
    --ops: #0066cc;
    --ops-soft: rgba(0, 102, 204, 0.08);
    --interview: #5e5ce6;
    --interview-soft: rgba(94, 92, 230, 0.08);
    --biz: #30b0a6;
    --biz-soft: rgba(48, 176, 166, 0.08);
    --map: #ac8e68;
    --map-soft: rgba(172, 142, 104, 0.1);
    --wave-1: #e8f4ff;
    --wave-2: #e6faf0;
    --frost: rgba(255, 255, 255, 0.42);
    --frost-strong: rgba(255, 255, 255, 0.62);
    --frost-solid: rgba(255, 255, 255, 0.78);
    --frost-border: rgba(255, 255, 255, 0.72);
    --frost-edge: rgba(0, 0, 0, 0.05);
    --frost-dark: rgba(29, 29, 31, 0.72);
    --blur-sm: blur(14px) saturate(165%);
    --blur-md: blur(28px) saturate(185%);
    --blur-lg: blur(44px) saturate(200%);
    --inset-hi: inset 0 1px 0 rgba(255, 255, 255, 0.75);
    --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.04);
    --shadow: 0 8px 32px rgba(0, 0, 0, 0.06), 0 2px 8px rgba(0, 0, 0, 0.03);
    --shadow-lg: 0 24px 56px rgba(0, 0, 0, 0.08), 0 8px 20px rgba(0, 0, 0, 0.04);
    --danger: #ff3b30;
    --danger-bg: rgba(255, 59, 48, 0.08);
    --ok: #34c759;
    --r: 12px;
    --r-md: 16px;
    --r-lg: 20px;
    --r-xl: 28px;
    --max: 1080px;
    --max-agent: 1440px;
    --agent-nav-w: 188px;
    --agent-chat-w: 300px;
    --sidebar-w: 200px;
    --sidebar-gap: 20px;
    --sans: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'HarmonyOS Sans SC', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --sans-en: 'Syne', 'Outfit', var(--sans);
    /* —— 统一方块/卡片 token（浅色：白·浅灰·蓝绿描边）—— */
    --block-bg: #ffffff;
    --block-bg-elevated: rgba(255, 255, 255, 0.85);
    --block-bg-subtle: rgba(255, 255, 255, 0.55);
    --block-bg-muted: rgba(255, 255, 255, 0.28);
    --block-bg-inset: rgba(255, 255, 255, 0.45);
    --block-bg-gradient: linear-gradient(180deg, #ffffff 0%, #f0f7ff 100%);
    --block-border: var(--frost-border);
    --block-border-subtle: rgba(0, 0, 0, 0.06);
    --block-border-accent: rgba(38, 194, 129, 0.35);
    --block-border-accent-hover: rgba(38, 194, 129, 0.55);
    --block-accent-soft: rgba(38, 194, 129, 0.06);
    --block-accent-fill: rgba(37, 99, 235, 0.04);
    --block-accent-border: rgba(37, 99, 235, 0.35);
    --block-radius-sm: 12px;
    --block-radius: 14px;
    --block-radius-lg: 16px;
    --block-shadow: var(--shadow-sm), var(--inset-hi);
    --block-glow: none;
    --btn-pill-radius: 10px;
    --btn-min-h: 36px;
    --btn-min-h-sm: 32px;
  }

  html {
    font-size: 16px;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
  }
  html, body {
    overflow-x: hidden;
    max-width: 100%;
  }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    min-height: 100dvh;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    word-break: break-word;
    overflow-wrap: anywhere;
  }

  .bg-scene {
    position: absolute; inset: 0; z-index: 0; pointer-events: none;
    background: linear-gradient(180deg, #f8fbff 0%, #f0f9f4 48%, #eef6ff 100%);
    overflow: hidden;
  }
  .bg-horizon-svg {
    position: absolute;
    top: 0;
    left: -10%;
    width: 120%;
    height: clamp(300px, 44vh, 480px);
    z-index: 1;
    pointer-events: none;
    will-change: transform;
    animation: horizonPan 28s ease-in-out infinite;
  }
  .bg-horizon-svg path {
    transform-box: fill-box;
    transform-origin: 50% 100%;
    animation: horizonPathSway 14s ease-in-out infinite;
  }
  @keyframes horizonPan {
    0%, 100% { transform: translate3d(0, 0, 0); }
    50% { transform: translate3d(-5%, 0, 0); }
  }
  @keyframes horizonPathSway {
    0%, 100% { transform: translate3d(0, 0, 0) scaleY(1); }
    33% { transform: translate3d(2%, -2%, 0) scaleY(1.018); }
    66% { transform: translate3d(-2%, 1.5%, 0) scaleY(0.985); }
  }
  .bg-wave-svg {
    position: absolute; width: 140%; left: -20%; top: 24%;
    opacity: 0.82;
    will-change: transform;
    z-index: 0;
    animation: wavePan 28s ease-in-out infinite;
  }
  .bg-wave-mid {
    transform-origin: 55% 85%;
    animation: waveDriftMid 14s ease-in-out infinite;
  }
  .bg-wave-back {
    transform-origin: 50% 80%;
    animation: waveDriftBack 18s ease-in-out infinite;
  }
  .bg-wave-front {
    transform-origin: 40% 90%;
    animation: waveDriftFront 11s ease-in-out infinite;
  }
  @keyframes wavePan {
    0%, 100% { transform: translate3d(0, 0, 0); }
    50% { transform: translate3d(-5%, 0, 0); }
  }
  @keyframes waveDriftMid {
    0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
    25% { transform: translate3d(4%, -3%, 0) scale(1.025); }
    50% { transform: translate3d(-3%, 2.5%, 0) scale(0.985); }
    75% { transform: translate3d(2%, -1.5%, 0) scale(1.015); }
  }
  @keyframes waveDriftBack {
    0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
    33% { transform: translate3d(-5%, 2.5%, 0) scale(1.03); }
    66% { transform: translate3d(3.5%, -2%, 0) scale(0.98); }
  }
  @keyframes waveDriftFront {
    0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
    50% { transform: translate3d(6%, -3.5%, 0) scale(1.04); }
  }
  .bg-blob {
    position: absolute; border-radius: 50%; filter: blur(80px);
    opacity: 0.58; will-change: transform;
  }
  .bg-blob-1 {
    width: 480px; height: 480px; top: -100px; right: -80px;
    background: linear-gradient(135deg, rgba(74, 224, 173, 0.55), rgba(184, 212, 255, 0.5));
    animation: blobFloat1 18s ease-in-out infinite;
  }
  .bg-blob-2 {
    width: 360px; height: 360px; bottom: 8%; left: -90px;
    background: linear-gradient(135deg, rgba(212, 245, 224, 0.65), rgba(232, 240, 255, 0.55));
    animation: blobFloat2 24s ease-in-out infinite;
  }
  .bg-blob-3 {
    width: 280px; height: 280px; top: 38%; right: 12%;
    background: linear-gradient(135deg, rgba(38, 194, 129, 0.22), rgba(94, 92, 230, 0.12));
    animation: blobFloat3 20s ease-in-out infinite;
  }
  @keyframes blobFloat3 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(-25px, 30px) scale(1.06); }
  }
  @keyframes blobFloat1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(-30px, 25px) scale(1.08); }
  }
  @keyframes blobFloat2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(40px, -20px) scale(1.05); }
  }
  @media (prefers-reduced-motion: reduce) {
    .bg-horizon-svg, .bg-horizon-svg path, .bg-wave-svg, .bg-wave-mid, .bg-wave-back, .bg-wave-front, .bg-blob-1, .bg-blob-2, .bg-blob-3 { animation: none; }
  }

  .frost-base {
    background: var(--frost);
    backdrop-filter: var(--blur-md);
    -webkit-backdrop-filter: var(--blur-md);
    border: 1px solid var(--frost-border);
    box-shadow: var(--shadow), var(--inset-hi);
  }
  .glass {
    background: var(--frost);
    backdrop-filter: var(--blur-md);
    -webkit-backdrop-filter: var(--blur-md);
    border: 1px solid var(--frost-border);
    box-shadow: var(--shadow-sm), var(--inset-hi);
  }
  .surface {
    background: var(--frost-strong);
    backdrop-filter: var(--blur-lg);
    -webkit-backdrop-filter: var(--blur-lg);
    border: 1px solid var(--frost-border);
    box-shadow: var(--shadow), var(--inset-hi);
  }
  .surface-card {
    background: var(--block-bg-elevated);
    backdrop-filter: var(--blur-md);
    -webkit-backdrop-filter: var(--blur-md);
    border: 1px solid var(--block-border);
    border-radius: var(--r-xl);
    box-shadow: var(--block-shadow), var(--block-glow);
  }
  .surface-card--flat {
    box-shadow: var(--shadow-sm), var(--inset-hi);
    border-radius: var(--r-lg);
  }
  .btn-frost {
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    line-height: 1.3;
    min-height: var(--btn-min-h-sm);
    padding: 6px 12px;
    border-radius: var(--btn-pill-radius);
    cursor: pointer;
    background: var(--frost);
    backdrop-filter: var(--blur-sm);
    -webkit-backdrop-filter: var(--blur-sm);
    border: 1px solid var(--frost-border);
    box-shadow: var(--inset-hi), 0 2px 10px rgba(0, 0, 0, 0.04);
    transition: background 0.25s, border-color 0.25s, transform 0.2s, box-shadow 0.25s;
  }
  .btn-frost:hover {
    background: var(--frost-strong);
    border-color: rgba(255, 255, 255, 0.85);
  }
  @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
    .glass, .surface, .surface-card, .btn-frost {
      background: rgba(255, 255, 255, 0.94);
    }
  }

  .btn-primary {
    font-size: 13px; font-weight: 600; font-family: inherit;
    line-height: 1.3;
    min-height: var(--btn-min-h);
    padding: 8px 16px;
    color: #fff;
    border: none;
    border-radius: var(--btn-pill-radius);
    cursor: pointer;
    position: relative;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    background: linear-gradient(
      180deg,
      var(--btn-green-top) 0%,
      var(--btn-green-mid) 42%,
      var(--btn-green-base) 100%
    );
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.24),
      inset 0 -1px 0 rgba(0, 0, 0, 0.12),
      0 3px 0 var(--btn-green-lip),
      0 4px 12px var(--btn-green-glow);
    text-shadow: 0 1px 0 rgba(0, 0, 0, 0.1);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .btn-primary.btn-frost {
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    border: none;
    background: linear-gradient(
      180deg,
      var(--btn-green-top) 0%,
      var(--btn-green-mid) 42%,
      var(--btn-green-base) 100%
    );
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.24),
      inset 0 -1px 0 rgba(0, 0, 0, 0.12),
      0 4px 0 var(--btn-green-lip),
      0 6px 16px var(--btn-green-glow);
  }
  .btn-primary:hover {
    background: linear-gradient(
      180deg,
      var(--btn-green-hover-top) 0%,
      var(--btn-green-hover-mid) 42%,
      var(--btn-green-hover-base) 100%
    );
    transform: translateY(-1px);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.3),
      inset 0 -1px 0 rgba(0, 0, 0, 0.1),
      0 5px 0 var(--btn-green-lip),
      0 8px 20px var(--btn-green-hover-glow);
  }
  .btn-primary:active {
    transform: translateY(3px);
    background: linear-gradient(
      180deg,
      var(--btn-green-mid) 0%,
      var(--btn-green-base) 55%,
      var(--btn-green-lip) 100%
    );
    box-shadow:
      inset 0 2px 4px rgba(0, 0, 0, 0.2),
      inset 0 1px 0 rgba(255, 255, 255, 0.16),
      0 1px 0 var(--btn-green-lip),
      0 3px 10px var(--btn-green-glow);
  }
  .btn-primary:disabled {
    opacity: 0.72;
    cursor: not-allowed;
    transform: none;
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.16),
      0 3px 0 var(--btn-green-lip),
      0 4px 10px rgba(0, 0, 0, 0.08);
  }
  .review-meta {
    font-size: 12px;
    color: var(--ink3);
    margin-bottom: 0.75rem;
    line-height: 1.5;
  }

  /* —— 主应用 —— */
  #app { display: none; position: relative; z-index: 1; min-height: 100vh; }
  #app.visible { display: flex; flex-direction: column; }

  .page-wrap {
    position: relative; z-index: 1;
    max-width: var(--max); margin: 0 auto;
    padding: 0 24px 3rem; width: 100%;
  }
  .page-wrap.page-wrap--agent {
    max-width: var(--max-agent);
    padding-left: 16px;
    padding-right: 16px;
  }
  .page-wrap.page-wrap--agent .hero-compact {
    padding: 1.1rem 0 0.65rem;
    max-width: none;
  }

  .hero-compact {
    position: relative;
    padding: 2.25rem 0 1.5rem;
    max-width: 720px;
    isolation: isolate;
  }
  .hero-eyebrow-row {
    display: flex;
    align-items: center;
    gap: clamp(12px, 3vw, 28px);
    margin-bottom: 0.65rem;
    min-height: 92px;
  }
  .hero-eyebrow-row .eyebrow {
    flex: 0 0 auto;
    margin-bottom: 0;
    line-height: 1.3;
  }
    position: relative;
    z-index: 0;
    flex: 1 1 auto;
    min-width: 140px;
    max-width: min(480px, 58vw);
    height: 92px;
    pointer-events: none;
    opacity: 0.68;
    -webkit-mask-image: linear-gradient(90deg, transparent 0%, rgba(0, 0, 0, 0.35) 12%, rgba(0, 0, 0, 0.92) 42%, rgba(0, 0, 0, 0.55) 100%);
    mask-image: linear-gradient(90deg, transparent 0%, rgba(0, 0, 0, 0.35) 12%, rgba(0, 0, 0, 0.92) 42%, rgba(0, 0, 0, 0.55) 100%);
  }
  .hero-copy {
    position: relative;
    z-index: 1;
  }
  @media (max-width: 720px) {
    .hero-eyebrow-row {
      flex-wrap: wrap;
      min-height: 0;
      gap: 0.35rem 0.75rem;
      margin-bottom: 0.6rem;
    }
    .hero-waveform {
      flex: 1 1 100%;
      max-width: none;
      height: 80px;
      opacity: 0.52;
    }
  }
  .hero-compact::before {
    content: '';
    position: absolute;
    inset: -24px -40px auto -20px;
    height: 200px;
    border-radius: 48px;
    background: radial-gradient(ellipse 90% 100% at 20% 0%, rgba(38, 194, 129, 0.1), transparent 68%),
                radial-gradient(ellipse 70% 80% at 80% 20%, rgba(184, 212, 255, 0.18), transparent 72%);
    pointer-events: none;
    z-index: -1;
  }
  .hero-brand {
    font-family: var(--sans-en);
    font-size: clamp(2.25rem, 5.5vw, 3.35rem);
    line-height: 1.12;
    margin-bottom: 1.1rem;
    letter-spacing: -0.04em;
    white-space: nowrap;
  }
  .hero-brand .hb-mind {
    font-weight: 800;
    letter-spacing: -0.045em;
    color: var(--hero-ink);
  }
  .hero-brand .hb-train {
    font-family: 'Outfit', var(--sans);
    font-weight: 700;
    letter-spacing: -0.028em;
    color: var(--hero-accent);
  }
  .hero-copy .eyebrow {
    font-size: 12px; font-weight: 600; color: var(--accent);
    margin-bottom: 0.75rem; letter-spacing: 0.02em;
  }
  .hero-copy h1 {
    font-size: clamp(1.75rem, 4vw, 2.35rem);
    font-weight: 700; letter-spacing: -0.035em;
    line-height: 1.12; margin-bottom: 0.75rem;
  }
  .hero-copy .desc {
    font-size: 15px; color: var(--ink2); line-height: 1.6;
    max-width: 36em;
  }

  .sync-bar {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--ink3);
    padding: 12px 16px; border-radius: var(--r-lg);
    margin-bottom: 1rem;
  }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ink3); }
  .sync-dot.ok { background: var(--ok); }
  .sync-dot.err { background: var(--danger); }

  .workspace-shell {
    border-radius: var(--r-xl);
    padding: 20px;
    margin-bottom: 1rem;
    overflow: visible;
    background: var(--frost-strong);
    border: 1px solid var(--frost-border);
    box-shadow: var(--shadow-sm), var(--inset-hi);
  }
  .workspace-mode-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 1.25rem;
    padding: 4px;
    border-radius: var(--r-lg);
    background: rgba(255, 255, 255, 0.35);
    border: 1px solid var(--frost-border);
    width: fit-content;
    max-width: 100%;
  }
  .mode-btn {
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 14px;
    min-height: var(--btn-min-h-sm);
    border: none;
    border-radius: var(--r);
    background: transparent;
    color: var(--ink2);
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .mode-btn.active {
    background: var(--white);
    color: var(--ink);
    box-shadow: var(--shadow-sm), var(--inset-hi);
  }

  /* —— 3.0 Agent 工作台：左 Nav · 中 Canvas · 右 Chat —— */
  .agent-workspace {
    display: grid;
    grid-template-columns: var(--agent-nav-w) minmax(0, 1fr) var(--agent-chat-w);
    gap: 0;
    min-height: min(72vh, 720px);
    border-radius: var(--r-xl);
    overflow: hidden;
    background: var(--block-bg-inset);
    border: 1px solid var(--block-border);
    box-shadow: var(--block-shadow), var(--block-glow);
    margin-bottom: 1rem;
  }
  .agent-nav {
    background: var(--block-bg-muted);
    border-right: 1px solid var(--block-border);
    padding: 12px 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .agent-nav-brand {
    font-family: var(--sans-en);
    font-weight: 700;
    font-size: 13px;
    padding: 10px 10px 12px;
    letter-spacing: -0.02em;
    border-bottom: 1px solid var(--line);
    margin-bottom: 4px;
  }
  .agent-nav-brand span { color: var(--product); }
  .agent-nav-btn {
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    text-align: left;
    padding: 7px 10px;
    min-height: var(--btn-min-h-sm);
    border-radius: var(--r);
    border: 1px solid transparent;
    background: transparent;
    color: var(--ink2);
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
  }
  .agent-nav-btn:hover:not(:disabled) {
    background: rgba(255, 255, 255, 0.55);
    color: var(--ink);
  }
  .agent-nav-btn.active {
    background: var(--white);
    border-color: var(--frost-border);
    color: var(--ink);
    box-shadow: var(--shadow-sm), var(--inset-hi);
  }
  .agent-nav-btn:disabled { opacity: 0.42; cursor: default; }
  .agent-nav-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 99px;
    background: var(--accent-soft);
    color: var(--accent);
    margin-left: 4px;
    vertical-align: middle;
  }
  .agent-canvas {

function buildScenarioIndex() {
  SCENARIO_INDEX = [];
  for (const mod of CURRICULUM.aiPm) {
    const pool = scenariosForNavModule(mod.id);
    const seen = new Set();
    pool.forEach(scenario => {
      if (!scenario || seen.has(scenario)) return;
      seen.add(scenario);
      const tagMatch = String(scenario).match(/^【([^·】]+)·([^】]+)】/);
      SCENARIO_INDEX.push({
        navId: mod.id,
        moduleLabel: mod.label,
        scenario,
        tag: tagMatch ? tagMatch[1] + '·' + tagMatch[2].split('·')[0] : ''
      });
    });
  }
}

function highlightSearchText(text, query) {
  const safe = escapeHtml(text);
  const q = String(query || '').trim();
  if (!q) return safe;
  const tokens = q.split(/\s+/).filter(Boolean);
  let out = safe;
  for (const tok of tokens) {
    const re = new RegExp(tok.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
    out = out.replace(re, m => `<mark>${m}</mark>`);
  }
  return out;
}

function searchScenarios(query, limit = 24) {
  const q = String(query || '').trim().toLowerCase();
  if (!q) return [];
  const tokens = q.split(/\s+/).filter(Boolean);
  const scored = [];
  for (const item of SCENARIO_INDEX) {
    const hay = (item.scenario + ' ' + item.moduleLabel + ' ' + item.tag).toLowerCase();
    if (!tokens.every(t => hay.includes(t))) continue;
    let score = 0;
    if (item.scenario.toLowerCase().startsWith('【' + tokens[0])) score += 3;
    if (item.tag.toLowerCase().includes(tokens[0])) score += 2;
    if (item.scenario.toLowerCase().indexOf(q) >= 0) score += 1;
    scored.push({ item, score });
  }
  scored.sort((a, b) => b.score - a.score || a.item.scenario.length - b.item.scenario.length);
  return scored.slice(0, limit).map(s => s.item);
}

function resolvePracticeScenario(topicId, keywords, excludeKeys) {
  const t = getTopic(topicId);
  if (!t) return null;
  let pool = pickScenarios(t);
  const kw = (keywords || []).filter(Boolean);
  if (kw.length) {
    const filtered = pool.filter(s => kw.some(k => String(s).includes(k)));
    if (filtered.length) pool = filtered;
  }
  const ex = new Set(excludeKeys || []);
  const available = pool.filter(s => !ex.has(scenarioKey(topicId, s)));
  const pickFrom = available.length ? available : pool.filter(s => !ex.has(scenarioKey(topicId, s)));
  const finalPool = pickFrom.length ? pickFrom : pool;
  if (!finalPool.length) return null;
  return finalPool[Math.floor(Math.random() * finalPool.length)];
}

  if (intent.mode === 'interview') {
    modeLabel = intent.urgent ? '明日面试冲刺' : '面试备战';
    if (intent.roleLabel || intent.company) {
      modeLabel += ' · ' + [intent.company, intent.roleLabel].filter(Boolean).join(' ');
    }
  }
  const titleEl = bar.querySelector('.mission-bar-title');
  if (titleEl) titleEl.textContent = modeLabel;
  if (prog) prog.textContent = `进度 ${done}/${total} · 第 ${cur} 步`;
  if (focusEl) focusEl.innerHTML = `<strong>本次重点：</strong>${escapeHtml(agentMission.focus || agentMission.goal)}`;
  activeGoalFocus = agentMission.focus || agentMission.goal;
}

function renderMissionStepList() {
  const box = document.getElementById('goalPlanList');
  if (!box || !agentMission) {
    if (box) { box.hidden = true; box.innerHTML = ''; }
    return;
  }
  const steps = agentMission.steps;
  if (!steps.length) {
    box.hidden = true;
    return;
  }
  box.hidden = false;
  box.innerHTML = `
    <div class="goal-plan-list-head">任务清单</div>
    ${steps.map((step, i) => {
      const isCurrent = i === agentMission.currentIndex && step.status !== 'done';
      const isDone = step.status === 'done';
      let label = '';
      let preview = '';
      if (step.type === 'read') {
        label = '阅读 · ' + (step.title || step.cardId || '知识卡');
        preview = '先读框架再练题';
      } else if (step.type === 'practice') {
        const mod = getNavModule(step.topicId);
        const prefix = step.generated
          ? (step.grounded || (step.scenario && step.scenario.includes('RAG面经')) ? 'RAG面经 · ' : 'AI 生成 · ')
          : step.external || step.fromSearch ? '外部面经 · ' : '练习 · ';
        label = prefix + (mod ? mod.label : step.topicId);
        preview = step.scenario
          ? step.scenario.replace(/^【[^】]+】\s*/, '').trim().slice(0, 72) + (step.scenario.length > 72 ? '…' : '')
          : '待加载题目';
      } else {
        label = step.type;
        preview = '';
      }
      return `<button type="button" class="goal-plan-item${isDone ? ' done' : ''}${isCurrent ? ' current' : ''}" data-step="${i}" ${isDone ? '' : ''}>
        <span class="goal-plan-item-label">${i + 1}. ${escapeHtml(label)}</span>
        <span class="goal-plan-item-text">${escapeHtml(preview)}</span>
      </button>`;
    }).join('')}
  `;
  box.querySelectorAll('.goal-plan-item').forEach(btn => {
    btn.onclick = () => {
      const idx = Number(btn.dataset.step);
      if (Number.isNaN(idx) || !agentMission.steps[idx]) return;
      runMissionStep(idx);
    };
  });
}

function setMissionViewMode(mode) {
  const panels = document.getElementById('panels');
  const msp = document.getElementById('missionStepPanel');
  if (mode === 'read') {
    if (panels) panels.style.display = 'none';
    if (msp) msp.hidden = false;
  } else {

  }

function showMissionReadStep(step, stepIndex) {
  const panel = document.getElementById('missionStepPanel');
  if (!panel) return;
  const card = knowledgeCardById(step.cardId);
  if (!card) {
    completeMissionStep(stepIndex);
    advanceMission();
    return;
  }
  setMissionViewMode('read');
  const bodyPages = paginateCardBody(card.body || '');
  let bodyPage = 0;
  const render = () => {
    const bodyText = bodyPages[bodyPage] || '';
    const bodyPager = bodyPages.length > 1
      ? `<div class="mission-read-pager">
          <button type="button" class="kc-nav" id="missionBodyPrev" ${bodyPage <= 0 ? 'disabled' : ''}>上一页</button>
          <span class="knowledge-pager-pos">${bodyPage + 1} / ${bodyPages.length}</span>
          <button type="button" class="kc-nav" id="missionBodyNext" ${bodyPage >= bodyPages.length - 1 ? 'disabled' : ''}>下一页</button>
        </div>`
      : '';
    panel.innerHTML = `
      <article class="surface-card mission-read-card">
        <div class="mission-step-tag">第 ${stepIndex + 1} 步 · 阅读</div>
        <h3>${escapeHtml(card.title)}</h3>
        <div class="mission-read-body mission-read-body-paged">${escapeHtml(bodyText)}</div>
        ${bodyPager}
        <button type="button" class="btn-primary mission-step-done-btn" id="missionStepDoneBtn">已读完，继续</button>
      </article>
    `;
    document.getElementById('missionBodyPrev')?.addEventListener('click', () => {
      if (bodyPage <= 0) return;
      bodyPage -= 1;
      render();
    });
    document.getElementById('missionBodyNext')?.addEventListener('click', () => {
      if (bodyPage >= bodyPages.length - 1) return;
      bodyPage += 1;
      render();
    });
    document.getElementById('missionStepDoneBtn').onclick = () => {
      completeMissionStep(stepIndex);
      advanceMission();
    };
  };
  render();
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function showMissionPracticeStep(step, stepIndex) {
  setMissionViewMode('practice');
  if (!step.scenario) {
    step.scenario = resolvePracticeScenario(step.topicId, step.keywords, agentMission.doneKeys);
  }
  if (!step.scenario) {
    showGoalPlanError('该模块暂无可用题目');
    completeMissionStep(stepIndex);
    advanceMission();
    return;
  }
  agentMission.doneKeys.push(scenarioKey(step.topicId, step.scenario));
  switchTab(step.topicId, null);
  loadScenario(step.topicId, step.scenario, { allowExternal: !!(step.external || step.fromSearch || step.generated) });
  updateModuleHead(step.topicId);
  renderMissionBar();
  renderMissionStepList();
  const caseEl = document.getElementById('scenario-' + step.topicId);
  if (caseEl) caseEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function runMissionStep(index) {
  if (!agentMission || !agentMission.steps[index]) return;
  agentMission.currentIndex = index;
  const step = agentMission.steps[index];
  step.status = step.status === 'done' ? 'done' : 'current';
  agentMission.steps.forEach((s, i) => {
    if (i !== index && s.status === 'current') s.status = 'pending';
  });
  renderMissionBar();
  renderMissionStepList();
  if (step.type === 'read') showMissionReadStep(step, index);
  else if (step.type === 'practice') showMissionPracticeStep(step, index);
}

function completeMissionStep(index) {
  if (!agentMission || !agentMission.steps[index]) return;
  agentMission.steps[index].status = 'done';
  renderMissionBar();
  renderMissionStepList();
}

function advanceMission() {
  if (!agentMission) return;
  const next = agentMission.steps.findIndex((s, i) => i > agentMission.currentIndex && s.status !== 'done');
  const firstPending = agentMission.steps.findIndex(s => s.status !== 'done');
  const idx = next >= 0 ? next : firstPending;
  if (idx < 0) {
    showGoalPlanError('');
    const bar = document.getElementById('missionProgress');
    if (bar) bar.textContent = '任务完成 ✓';
    setMissionViewMode('practice');
    return;
  }
  runMissionStep(idx);
}

function insertRemedialSteps(topicId, scenario) {
  if (!agentMission) return;
  const insertAt = agentMission.currentIndex + 1;
  const newSteps = [];
  const cardIds = readingIdsForNav(topicId, scenario);
  cardIds.slice(0, 2).forEach(cardId => {
    const card = knowledgeCardById(cardId);
    if (card) newSteps.push({ type: 'read', cardId: card.id, title: card.title, status: 'pending', remedial: true });
  });
  const extraScenario = resolvePracticeScenario(topicId, agentMission.keywords || [], agentMission.doneKeys);
  if (extraScenario) {
    newSteps.push({
      type: 'practice',
      topicId,
      keywords: agentMission.keywords || [],
      scenario: extraScenario,
      status: 'pending',
      remedial: true
    });
  }
  if (!newSteps.length) return;
  agentMission.steps.splice(insertAt, 0, ...newSteps);
  renderMissionBar();
  renderMissionStepList();
}

function onMissionPracticeComplete(topicId, rubricAvg, scenario) {
  if (!agentMission) return;
  const cur = agentMission.steps[agentMission.currentIndex];
  if (!cur || cur.type !== 'practice' || cur.topicId !== topicId) return;
  if (scenario && !cur.scenario) cur.scenario = scenario;
  completeMissionStep(agentMission.currentIndex);
  const score = Number(rubricAvg);
  if (Number.isFinite(score) && score < 3) {
    insertRemedialSteps(topicId, cur.scenario || scenario);
  }
  setTimeout(() => advanceMission(), 800);
}

async function startMission(goal) {
  goal = String(goal || '').trim();
  if (!goal) {
    showGoalPlanError('请输入学习目标');
    return;
  }
  if (!TOPICS.length) {
    showGoalPlanError('题目尚未加载完成');
    return;
  }
  const btn = document.getElementById('goalPlanBtn');
  const input = document.getElementById('goalPlanInput');
  showGoalPlanError('');
  const coachIntent = detectCoachIntentLocal(goal);
  if (coachIntent) {
    if (btn) { btn.disabled = false; btn.textContent = '开始训练'; }
    openCoachFromGoal(goal, coachIntent);
    if (input) input.blur();
    return;
  }
  if (btn) {
    btn.disabled = true;
    btn.textContent = /面|面试|明[天日]|后天/i.test(goal) ? '规划并 AI 出题…' : '规划中…';
  }
  try {
    if (workspaceMode !== 'train') {
      workspaceMode = 'train';
      renderTopics();
    }
    const catalog = TOPICS.map(t => ({
      id: t.id,
      label: t.label,
      cat: t.cat,
      catLabel: t.catLabel
    }));
    const cardCatalog = buildCardCatalog();
    const res = await fetch('/api/plan', {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({ goal, catalog, cardCatalog })
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || '规划失败（HTTP ' + res.status + '）');
    const steps = (Array.isArray(data.steps) ? data.steps : []).map(s => ({
      ...s,
      status: 'pending'
    }));
    if (!steps.length) {
      showGoalPlanError('未生成有效任务，请换个目标描述再试');
      return;
    }
    agentMission = {
      goal,
      focus: data.focus || goal,
      keywords: data.keywords || [],
      weakTopicIds: data.weakTopicIds || [],
      intent: data.intent || null,
      externalSearch: data.externalSearch || null,
      llmGenerate: data.llmGenerate || null,
      ragChunks: data.ragChunks || [],
      ragSession: data.ragSession || null,
      steps,
      currentIndex: 0,
      doneKeys: []
    };
    activeGoalFocus = agentMission.focus;
    renderMissionBar();
    renderExternalSearchBox(agentMission.externalSearch);
    renderLlmDemoBox(agentMission.llmGenerate, agentMission.ragSession);
    renderMissionStepList();
    runMissionStep(0);
    if (input) input.blur();
  } catch (e) {
    showGoalPlanError(e.message || '规划失败');
  } finally {
    if (btn) {
      btn.disabled = false;
      btn.textContent = '开始训练';
    }
  }
}

function startByGoal(goal) {
  return startMission(goal);
}

function bindGoalPlan() {
  const btn = document.getElementById('goalPlanBtn');
  const input = document.getElementById('goalPlanInput');
  if (!btn || !input) return;
  btn.onclick = () => startMission(input.value);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      startMission(input.value);
    }
  });
  if (agentMission) {
    renderMissionBar();
    renderExternalSearchBox(agentMission.externalSearch);
    renderLlmDemoBox(agentMission.llmGenerate, agentMission.ragSession);
    renderMissionStepList();
    const cur = agentMission.steps[agentMission.currentIndex];
    if (cur && cur.type === 'read' && cur.status !== 'done') {
      showMissionReadStep(cur, agentMission.currentIndex);
    } else {
      setMissionViewMode('practice');
    }
  }
}

function bindScenarioSearch() {
  const input = document.getElementById('scenarioSearchInput');
  const box = document.getElementById('scenarioSearchResults');
  const wrap = document.getElementById('scenarioSearchWrap');
  if (!input || !box) return;

  const run = () => renderScenarioSearchResults(input.value);

  input.addEventListener('input', () => {
    clearTimeout(scenarioSearchTimer);
    scenarioSearchTimer = setTimeout(run, 120);
  });
  input.addEventListener('focus', () => {
    if (input.value.trim()) run();
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      box.hidden = true;
      input.blur();
    } else if (e.key === 'Enter') {
      e.preventDefault();
      const first = box.querySelector('.scenario-search-item');
      if (first && !box.hidden) first.click();
    }
  });

  document.getElementById('scenarioSearchChips')?.querySelectorAll('.scenario-search-chip').forEach(chip => {
    chip.onclick = () => {
      input.value = chip.dataset.q || '';
      input.focus();
      run();
    };
  });

  document.addEventListener('click', e => {
    if (!wrap?.contains(e.target)) box.hidden = true;
  });
}

const TRACE_API_CACHE_MS = 30000;
const traceApiCache = { traces: { data: null, at: 0 }, tokenDay7: { data: null, at: 0 } };

async function fetchTracesFromApi(limit = 50) {
  const now = Date.now();
  if (traceApiCache.traces.data && now - traceApiCache.traces.at < TRACE_API_CACHE_MS) {
    return traceApiCache.traces.data;
  }
  const res = await fetch('/api/records', {
    method: 'POST',
    headers: authHeaders(),
    body: JSON.stringify({ accessCode, userId: userAccountId, recordType: 'traces', limit })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || '加载 trace 失败');
  traceApiCache.traces = { data, at: now };
  return data;
}

async function fetchTokenAggregate(period = 'day', days = 7) {
  const cacheKey = period === 'day' ? 'tokenDay7' : `token_${period}_${days}`;
  const now = Date.now();
  if (period === 'day' && days === 7 && traceApiCache.tokenDay7.data && now - traceApiCache.tokenDay7.at < TRACE_API_CACHE_MS) {
    return traceApiCache.tokenDay7.data;
  }
  const res = await fetch('/api/records', {
    method: 'POST',
    headers: authHeaders(),
    body: JSON.stringify({ accessCode, userId: userAccountId, recordType: 'token-aggregate', period, days })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || '加载 token 统计失败');
  if (period === 'day' && days === 7) traceApiCache.tokenDay7 = { data, at: now };
  return data;
}

function filterTracesForScene(traces, scene) {
  if (!Array.isArray(traces)) return [];
  return traces.filter((t) => {
    const src = String(t.source || '');
    const ragRefs = t.context?.ragRefs;
    const hasRag = Array.isArray(ragRefs) && ragRefs.length > 0;
    if (scene === 'resume') {
      return src === 'coach-action-resume-score' || src === 'coach-action-resume-optimize' || /resume/i.test(src);
    }
    if (scene === 'scenario') return src === 'chat-review' || src === 'chat-followup';
    if (scene === 'prep') return src === 'coach-action-interview-prep';
    if (scene === 'kb') return hasRag || /knowledge|rag|kb/i.test(src);
    return true;
  });
}

function traceToolLabel(source) {
  const map = {
    'chat-review': 'review_answer',
    'chat-followup': 'followup',
    'coach-action-resume-score': 'score_resume',

    'coach-action-interview-prep': 'prepare_interview'
  };
  return map[source] || String(source || '—').replace(/^coach-action-/, '');

function traceSummaryHtml(t) {
  const at = t.at ? t.at.slice(0, 19).replace('T', ' ') : '—';
  const parts = [];
  if (t.result?.rubricAvg != null) parts.push(`均分 ${t.result.rubricAvg}`);
  const preview = t.result?.summary || t.result?.textPreview;
  if (preview) parts.push(String(preview).slice(0, 100));
  const body = parts.length ? parts.join(' · ') : (t.userAnswer ? String(t.userAnswer).slice(0, 80) + '…' : '—');
  return `${escapeHtml(at)}<br/><span style="color:var(--ink2)">${escapeHtml(body)}</span>`;
}

function traceBadcaseHtml(t) {
  if (!t.badcase?.tagged) return '—';
  const reasons = (t.badcase.reasons || []).join(', ') || 'tagged';
  return `<span class="trace-badcase" title="${escapeHtml(reasons)}">${escapeHtml(reasons)}</span>`;
}

function formatTokenBucketsBar(buckets) {
  if (!Array.isArray(buckets) || !buckets.length) return '';
  const total = buckets.reduce((s, b) => s + (Number(b.total) || 0), 0);
  const reqs = buckets.reduce((s, b) => s + (Number(b.requests) || 0), 0);
  return `<p class="trace-token-bar">近 ${buckets.length} 日 · ${reqs} 次请求 · ${total.toLocaleString()} tokens</p>`;
}

function buildTracePanelHtml(scene, { historyEnabled, traces, badcases, tokenBuckets, error }) {
  if (error) {
    return `<div class="resume-pane-empty" style="color:var(--danger)">${escapeHtml(error)}</div>`;
  }
  if (!historyEnabled) {
    return `<div class="resume-pane-empty">历史存储未启用（需配置 Upstash）</div>`;
  }
  if (!traces.length) {
    return `<div class="resume-pane-empty">暂无 trace，先完成一次评分/点评/准备</div>`;
  }
  const rows = traces.map((t) => `
    <tr>
      <td>${escapeHtml(String(t.turn ?? '—'))}</td>
      <td>${escapeHtml(traceToolLabel(t.source))}</td>
      <td>${t.tokens?.total != null ? escapeHtml(String(t.tokens.total)) : '—'}</td>
      <td>${traceBadcaseHtml(t)}</td>
      <td>${traceSummaryHtml(t)}</td>
    </tr>`).join('');
  const badcaseHint = badcases?.length
    ? `<p style="font-size:12px;color:var(--ink3);margin-top:10px">全账号 badcase ${badcases.length} 条（本场景 ${traces.filter(t => t.badcase?.tagged).length} 条）</p>`
    : '';
  return `
    ${formatTokenBucketsBar(tokenBuckets)}
    <div class="surface-card surface-card--flat" style="padding:0;overflow:hidden">
      <table class="trace-table">
        <thead><tr><th>轮次</th><th>Tool</th><th>Token</th><th>Badcase</th><th>摘要</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    ${badcaseHint}`;
}

async function loadTracePanel(hostEl, scene) {
  if (!hostEl) return;
  hostEl.innerHTML = '<div class="trace-panel-loading">加载 trace…</div>';
  try {
    const [traceData, tokenData] = await Promise.all([
      fetchTracesFromApi(50),
      fetchTokenAggregate('day', 7)
    ]);
    const filtered = filterTracesForScene(traceData.traces || [], scene);
    hostEl.innerHTML = buildTracePanelHtml(scene, {
      historyEnabled: traceData.historyEnabled !== false,
      traces: filtered,
      badcases: traceData.badcases || [],
      tokenBuckets: tokenData.buckets || [],
      error: null
    });
  } catch (e) {
    hostEl.innerHTML = buildTracePanelHtml(scene, {
      historyEnabled: true,
      traces: [],
      badcases: [],
      tokenBuckets: [],
      error: e.message || '加载失败'
    });
  }
}

}
function bindAgentWorkspace(scene) {
  const root = document.getElementById('agentWorkspace');
  if (!root) return;

  root.querySelectorAll('[data-agent-scene]').forEach(btn => {
    if (btn.disabled) return;
    btn.onclick = () => setAgentScene(btn.dataset.agentScene);
  });

  root.querySelectorAll('[data-canvas-tab]').forEach(btn => {
    btn.onclick = () => {
      setCanvasTab(scene, btn.dataset.canvasTab);
      refreshAgentCanvas();
    };
  });
  root.querySelectorAll('[data-artifact-tab]').forEach(btn => {
    btn.onclick = () => {
      setCanvasTab(scene, btn.dataset.artifactTab);
      refreshAgentCanvas();
    };
  });

  const send = () => {
    const input = document.getElementById('agentChatInput');
    const msg = input?.value?.trim();
    if (!msg) return;
    if (scene === 'resume') {
      if (!resumeScoreResult.content && !resumeOptimizeResult.content) {
        alert('请先一键评分或优化');
        return;
      }
      saveProfileFromDom();
      sendModuleCoachMessage({
        module: 'resume', message: msg, mode: '',
        messages: resumeMessages, threadId: 'resumeThread',
        errId: 'resumeScoreError', btnId: 'agentChatSend', inputId: 'agentChatInput',
        restoreInputOnError: true
      });
    } else if (scene === 'prep') {
      if (!interviewPrepResult.content && !interviewPrepResult.prepReport) {
        alert('请先一键准备面试');
        return;
      }
      saveProfileFromDom();
      sendModuleCoachMessage({
        module: 'interview', message: msg, mode: '',
        messages: interviewPrepMessages, threadId: 'interviewPrepThread',
        errId: 'interviewPrepError', btnId: 'agentChatSend', inputId: 'agentChatInput'
      });
    } else if (scene === 'scenario') {
      if (/换|下一|another/i.test(msg)) startRandomSense();
      else alert('业务场景可先点「换一题」；追问请在点评 Tab 使用下方输入');
    }
    if (input) input.value = '';
  };

  document.getElementById('agentChatSend')?.addEventListener('click', send);
  document.getElementById('agentChatInput')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); send(); }
  });
  document.getElementById('agentChatReset')?.addEventListener('click', () => {
    if (scene === 'resume') {
      resumeMessages.length = 0;
      renderAgentChatBubbles('resume');
    } else if (scene === 'prep') {
      interviewPrepMessages.length = 0;
      renderAgentChatBubbles('prep');
    }
  });

  document.getElementById('agentChatFab')?.addEventListener('click', () => {
    document.getElementById('agentChatBackdrop')?.classList.add('open');
    document.querySelector('.agent-chat')?.classList.add('drawer-open');
  });
  document.getElementById('agentChatBackdrop')?.addEventListener('click', closeAgentChatDrawer);
  if (!window.__agentChatEscBound) {
    window.__agentChatEscBound = true;
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeAgentChatDrawer();
    });
  }

  document.getElementById('docExportMdBtn')?.addEventListener('click', exportResumeMarkdown);
  document.getElementById('prepDocExportMdBtn')?.addEventListener('click', exportPrepMarkdown);
}

function setAgentScene(scene) {
  if (scene === 'kb') {
    agentScene = 'kb';
    renderKbView();
    return;

  if (scene === 'resume') {
    workspaceMode = 'resume';
    localStorage.setItem('workspaceMode', 'resume');

    return;
  }
  workspaceMode = 'interview';
  localStorage.setItem('workspaceMode', 'interview');
  agentScene = scene;
  interviewSubView = scene === 'scenario' ? 'scenario' : 'prep';
  localStorage.setItem('interviewSubView', interviewSubView);

}

function refreshAgentCanvas() {
  if (agentScene === 'resume') {
    if (getCanvasTab('resume') !== '评分') saveProfileFromDom();
    renderResumeCanvasPanels();

    renderPrepCanvasPanels();

function renderCanvasTitleCta(scene, tab) {
  const host = document.getElementById('canvasTitleCta');
  if (!host) return;
  host.innerHTML = '';
  const parts = [];

  if (scene === 'resume' && tab === '评分') {
    if (resumeScoreResult.loading) parts.push('<button type="button" class="btn-primary" disabled>评分中…</button>');
    else if (resumeScoreResult.scoreReport || resumeScoreResult.content) {
      parts.push('<button type="button" class="btn-primary" id="resumeGoOptimizeBtn">去优化</button>');
    } else {
      const disabled = !profileResume.trim() ? ' disabled' : '';
      parts.push(`<button type="button" class="btn-primary" id="resumeStartScoreBtn"${disabled}>开始评分</button>`);
    }
  } else if (scene === 'resume' && tab === '优化') {
    if (resumeOptimizeResult.loading) parts.push('<button type="button" class="btn-primary" disabled>优化中…</button>');
    else if (!resumeOptimizeResult.optimizeReport && !resumeOptimizeResult.content) {
      const disabled = !resumeHasScore() ? ' disabled' : '';
      parts.push(`<button type="button" class="btn-primary" id="resumeStartOptimizeBtn"${disabled}>开始优化</button>`);
    }
  } else if (scene === 'resume' && tab === '文档') {
    const hasDoc = Boolean(resumeOptimizeResult.optimizeReport?.bullets?.length || resumeOptimizeResult.content);
    if (hasDoc) parts.push('<button type="button" class="btn-primary btn-frost" id="docExportMdBtn">下载 Markdown</button>');
  } else if (scene === 'prep' && tab === '准备报告') {
    if (interviewPrepResult.loading) parts.push('<button type="button" class="btn-primary" disabled>准备中…</button>');
    else if (!interviewPrepResult.prepReport && !interviewPrepResult.content) {
      parts.push('<button type="button" class="btn-primary" id="interviewPrepBtn">一键准备面试</button>');
    }
  } else if (scene === 'prep' && tab === '文档') {
    if (interviewPrepResult.prepReport || interviewPrepResult.content) {
      parts.push('<button type="button" class="btn-primary" id="prepDocExportMdBtn">下载 Markdown</button>');
    }
  } else if (scene === 'scenario') {
    const tid = activeBankQuestion?.topicId || activeTopicId || 'iv-pm';
    if (tab === '题目') parts.push(`<button type="button" class="btn-primary" id="btn-${tid}">提交 · 获取点评</button>`);
  }

  host.innerHTML = parts.join('');
  bindResumePaneActions();
  document.getElementById('docExportMdBtn')?.addEventListener('click', exportResumeMarkdown);
  document.getElementById('prepDocExportMdBtn')?.addEventListener('click', exportPrepMarkdown);
  document.getElementById('interviewPrepBtn')?.addEventListener('click', () => {
    saveProfileFromDom();
    if (!profileResume.trim() && !coachIntake.extra?.trim()) {
      alert('请先在「简历 Agent」上传简历，或填写补充说明');
      return;
    }
    runInterviewPrepAction();
  });
  document.getElementById('resumeGoOptimizeBtn')?.addEventListener('click', () => {
    setCanvasTab('resume', '优化');
    refreshAgentCanvas();
  });
  const tid = activeBankQuestion?.topicId || activeTopicId;
  if (tid) document.getElementById('btn-' + tid)?.addEventListener('click', () => submitAnswer(tid));
}

function exportResumeMarkdown() {
  const text = resumeOptimizeResult.content || JSON.stringify(resumeOptimizeResult.optimizeReport || {}, null, 2);
  downloadTextFile('简历优化.md', text);
}

function exportPrepMarkdown() {
  const text = interviewPrepResult.content || JSON.stringify(interviewPrepResult.prepReport || {}, null, 2);
  downloadTextFile('面试准备.md', text);
}

function downloadTextFile(name, text) {
  const blob = new Blob([text], { type: 'text/markdown;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  URL.revokeObjectURL(a.href);
}

function renderCoachBubbleHtml(content, role) {
  if (role !== 'assistant') {
    return escapeHtml(content).replace(/\n/g, '<br/>');
  }
  return formatCoachMarkdown(content);
}

function formatCoachMarkdown(text) {
  const lines = String(text || '').split('\n');
  /** @type {string[]} */
  const parts = [];
  /** @type {string[][]} */
  let tableRows = [];

  function flushTable() {
    if (tableRows.length < 2) {
      tableRows.forEach(row => parts.push(`<p>${escapeHtml(row.join(' | '))}</p>`));
      tableRows = [];
      return;
    }
    const parseRow = (row) => row.split('|').map(c => c.trim()).filter(Boolean);
    const header = parseRow(tableRows[0]);
    const bodyRows = tableRows.slice(2).map(parseRow);
    let tbl = '<table class="coach-md-table"><thead><tr>';
    header.forEach(c => { tbl += `<th>${escapeHtml(c)}</th>`; });
    tbl += '</tr></thead><tbody>';
    bodyRows.forEach(cells => {
      tbl += '<tr>';
      cells.forEach(c => { tbl += `<td>${escapeHtml(c)}</td>`; });
      tbl += '</tr>';
    });
    tbl += '</tbody></table>';
    parts.push(tbl);
    tableRows = [];
  }

  for (const line of lines) {
    const trimmed = line.trim();
    if (/^\|/.test(trimmed)) {
      tableRows.push(trimmed);
      continue;
    }
    if (tableRows.length) flushTable();
    if (/^###\s+/.test(trimmed)) parts.push(`<h4>${escapeHtml(trimmed.slice(4))}</h4>`);
    else if (/^##\s+/.test(trimmed)) parts.push(`<h3>${escapeHtml(trimmed.slice(3))}</h3>`);
    else if (/^#\s+/.test(trimmed)) parts.push(`<h3>${escapeHtml(trimmed.slice(2))}</h3>`);
    else if (trimmed === '---') parts.push('<hr/>');
    else if (!trimmed) parts.push('');
    else parts.push(`<p>${escapeHtml(trimmed)}</p>`);
  }
  if (tableRows.length) flushTable();
  return parts.join('').replace(/<\/p><p>/g, '<br/>');
}

const DOC_PARSER_SCRIPTS = {
  pdf: [
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js',
    'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js'
  ],
  pdfWorker: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js',
  mammoth: [
    'https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js',
    'https://unpkg.com/mammoth@1.8.0/mammoth.browser.min.js'
  ]
};
const MAX_UPLOAD_BYTES = 10 * 1024 * 1024;

async function loadExternalScript(srcOrList) {
  const urls = Array.isArray(srcOrList) ? srcOrList : [srcOrList];
  for (const src of urls) {
    if (document.querySelector(`script[src="${src}"]`)) return;
    try {
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src;
        s.async = true;
        s.onload = () => resolve();
        s.onerror = () => reject(new Error('load failed'));
        document.head.appendChild(s);
      });
      return;
    } catch { /* try next CDN */ }
  }
  throw new Error('无法加载文档解析组件，请检查网络或改粘贴文本');
}

async function ensureDocParsers() {
  if (window.__docParsersReady) return;
  await loadExternalScript(DOC_PARSER_SCRIPTS.pdf);
  await loadExternalScript(DOC_PARSER_SCRIPTS.mammoth);
  if (window.pdfjsLib) {
    window.pdfjsLib.GlobalWorkerOptions.workerSrc = DOC_PARSER_SCRIPTS.pdfWorker;
  }
  window.__docParsersReady = true;
}

function fileExtension(name) {
  const n = String(name || '').toLowerCase();
  const i = n.lastIndexOf('.');
  return i >= 0 ? n.slice(i + 1) : '';
}

async function parseUploadedDocument(file) {
  if (!file) throw new Error('未选择文件');
  if (file.size > MAX_UPLOAD_BYTES) throw new Error('文件超过 10MB，请压缩或粘贴文本');
  const ext = fileExtension(file.name);
  const type = String(file.type || '').toLowerCase();

  if (['txt', 'md', 'text'].includes(ext) || type.startsWith('text/')) {
    return { text: await file.text(), format: ext || 'txt' };
  }

  if (ext === 'doc') {
    throw new Error('旧版 .doc 暂不支持，请在 Word 中另存为 .docx 或导出 PDF');
  }

  await ensureDocParsers();

  if (ext === 'pdf' || type === 'application/pdf') {
    const pdf = await window.pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
    const parts = [];
    for (let p = 1; p <= pdf.numPages; p++) {
      const page = await pdf.getPage(p);
      const content = await page.getTextContent();
      parts.push(content.items.map(it => it.str).join(''));
    }
    const text = parts.join('\n').replace(/[ \t]+\n/g, '\n').replace(/\n{3,}/g, '\n\n').trim();
    if (!text) {
      throw new Error('PDF 未识别到文字（可能是扫描件图片）。请换可复制文字的 PDF，或直接粘贴简历内容');
    }
    return { text, format: 'pdf' };
  }

  if (ext === 'docx' || type.includes('wordprocessingml')) {
    const result = await window.mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
    const text = String(result.value || '').trim();
    if (!text) throw new Error('DOCX 解析结果为空，请检查文件是否损坏');
    return { text, format: 'docx' };
  }

  throw new Error('不支持的格式，请上传 PDF、DOCX 或 TXT');
}

function updateUploadDropzoneUI(field, { fileName, charCount, parsing, error }) {
  const isResume = field === 'resume';
  const zone = document.getElementById(isResume ? 'resumeDropzone' : 'jdDropzone');
  const body = document.getElementById(isResume ? 'resumeDropzoneBody' : 'jdDropzoneBody');
  const statusEl = document.getElementById(isResume ? 'resumeFileStatus' : 'jdFileStatus');
  const repickId = isResume ? 'resumeRepickBtn' : 'jdRepickBtn';
  if (!zone || !body) return;

  if (parsing) {
    zone.classList.remove('upload-dropzone--done');
    body.innerHTML = `<div class="upload-dropzone-loading">正在识别 ${escapeHtml(fileName || '文件')}…</div>`;
    if (statusEl) {
      statusEl.textContent = '解析中，请稍候';
      statusEl.classList.remove('is-error', 'is-ok');
    }
    return;
  }

  if (error) {
    zone.classList.remove('upload-dropzone--done');
    body.innerHTML = `<div class="upload-dropzone-icon">↑</div>
      <div class="upload-dropzone-title">点击或拖拽上传${isResume ? '简历' : ' JD'}</div>
      <div class="upload-dropzone-hint">自动识别 PDF · DOCX · TXT</div>`;
    if (statusEl) {
      statusEl.textContent = error;
      statusEl.classList.add('is-error');
      statusEl.classList.remove('is-ok');
    }
    return;
  }

  if (charCount > 0) {
    zone.classList.add('upload-dropzone--done');
    const label = isResume ? '简历' : 'JD';
    body.innerHTML = `<div class="upload-done-title">已识别${label}</div>
      <div class="upload-done-meta">${fileName ? escapeHtml(fileName) + ' · ' : ''}${charCount.toLocaleString()} 字</div>
      <button type="button" class="upload-done-repick" id="${repickId}">换一份</button>`;
    document.getElementById(repickId)?.addEventListener('click', e => {
      e.stopPropagation();
      document.getElementById(isResume ? 'resumeFileInput' : 'jdFileInput')?.click();
    });
    if (statusEl) {
      statusEl.textContent = isResume ? '识别完成，可直接点「一键评分」' : 'JD 已导入';
      statusEl.classList.remove('is-error');
      statusEl.classList.add('is-ok');
    }
  }
}

function bindFileDropzone(dropzoneId, inputId, field) {
  const zone = document.getElementById(dropzoneId);
  const input = document.getElementById(inputId);
  if (!zone || !input) return;

  zone.addEventListener('click', e => {
    if (e.target.closest('.upload-done-repick')) return;
    input.click();
  });
  zone.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      input.click();
    }
  });
  zone.addEventListener('dragover', e => {
    e.preventDefault();
    zone.classList.add('is-dragover');
  });
  zone.addEventListener('dragleave', () => zone.classList.remove('is-dragover'));
  zone.addEventListener('drop', async e => {
    e.preventDefault();
    zone.classList.remove('is-dragover');
    const file = e.dataTransfer?.files?.[0];
    if (file) await applyParsedFileToField(file, field);
  });
  input.addEventListener('change', async e => {
    const file = e.target.files?.[0];
    if (file) await applyParsedFileToField(file, field);
    e.target.value = '';
  });
  document.getElementById(field === 'resume' ? 'resumeRepickBtn' : 'jdRepickBtn')?.addEventListener('click', e => {
    e.stopPropagation();
    input.click();
  });
}

async function applyParsedFileToField(file, field) {
  const isResume = field === 'resume';
  const ta = document.getElementById(isResume ? 'profileResumeInput' : 'profileJdInput');
  updateUploadDropzoneUI(field, { fileName: file.name, parsing: true });
  try {
    const { text, format } = await parseUploadedDocument(file);
    if (isResume) {
      profileResume = text;
      profileResumeFileName = file.name;
      localStorage.setItem('profileResume', profileResume);
    } else {
      profileJd = text;
      profileJdFileName = file.name;
      localStorage.setItem('profileJd', profileJd);
    }
    if (ta) ta.value = text;
    updateUploadDropzoneUI(field, { fileName: file.name, charCount: text.length });
    if (isResume && agentScene === 'resume') {
      renderResumeScorePane();
      updateCanvasChrome('resume');
    }
  } catch (e) {
    const msg = e.message || '文件解析失败';
    updateUploadDropzoneUI(field, { error: msg });
    alert(msg);
  }
}

function renderScorePaneContent(report, opts) {
  const options = opts || {};
  if (options.skeleton) {
    const skMode = options.skeleton === true ? 'loading' : options.skeleton;
    return renderScoreSkeletonHtml(skMode);
  }
  const overall = report.overallScore ?? (report.overallScore10 != null ? Math.round(report.overallScore10 * 10) : '—');
  const overallNum = typeof overall === 'number' ? overall : parseInt(String(overall), 10);
  const animate = Boolean(options.animate);
  const dims = (report.dimensions && report.dimensions.length)
    ? report.dimensions
    : SCORE_DIMENSION_NAMES.map(name => ({ name, score: 0 }));
  const bars = dims.map((d, i) => {
    const pct = Math.round((Number(d.score) / 5) * 100);
    const fillW = animate ? 0 : pct;
    const delay = animate ? ` transition-delay:${i * 90}ms;` : '';
    return `<div class="score-pane-bar-row" data-target-pct="${pct}" data-target-score="${escapeAttr(String(d.score))}">
      <span class="score-pane-bar-name" title="${escapeAttr(d.name)}">${escapeHtml(d.name)}</span>
      <div class="score-pane-bar-track"><div class="score-pane-bar-fill" style="width:${fillW}%;${delay}"></div></div>
      <span class="score-pane-bar-num" data-target-num="${escapeAttr(String(d.score))}">${escapeHtml(animate ? '0' : String(d.score))}</span>
    </div>`;
  }).join('');
  const fixes = (report.topFixes || []).slice(0, 3).map(f => `<li>${escapeHtml(f)}</li>`).join('');
  const summaryCls = animate ? ' score-reveal-delayed' : '';
  const fixesCls = animate ? ' score-reveal-delayed score-reveal-delayed--2' : '';
  const countAttr = animate && !Number.isNaN(overallNum) ? ` data-count-target="${overallNum}"` : '';
  const overallText = animate && !Number.isNaN(overallNum) ? '0' : String(overall);
  return `<div class="score-pane${animate ? ' score-pane--animating' : ''}">
    <div class="score-pane-metrics score-pane-metrics--single">
      <div class="score-pane-metric"><div class="score-pane-metric-label">综合</div><div class="score-pane-metric-value score-pane-metric-value--rose"${countAttr}>${escapeHtml(overallText)}</div></div>
    </div>
    ${report.summary ? `<p class="score-pane-summary${summaryCls}">${escapeHtml(report.summary)}</p>` : ''}
    <div class="score-pane-bars">${bars}</div>
    ${fixes ? `<div class="score-pane-fixes${fixesCls}"><strong>优先改</strong><ol>${fixes}</ol></div>` : ''}
  </div>`;
}

function animateScorePane(root) {
  if (!root) return;
  requestAnimationFrame(() => {
    const overallEl = root.querySelector('[data-count-target]');
    if (overallEl) {
      const target = Number(overallEl.dataset.countTarget);
      const start = performance.now();
      const dur = 780;
      const step = (now) => {
        const p = Math.min(1, (now - start) / dur);
        const eased = 1 - Math.pow(1 - p, 3);
        overallEl.textContent = String(Math.round(target * eased));
        if (p < 1) requestAnimationFrame(step);
        else overallEl.textContent = String(target);
      };
      requestAnimationFrame(step);
    }
    root.querySelectorAll('.score-pane-bar-row').forEach((row, i) => {
      window.setTimeout(() => {
        const fill = row.querySelector('.score-pane-bar-fill');
        const numEl = row.querySelector('.score-pane-bar-num');
        if (fill) fill.style.width = row.dataset.targetPct + '%';
        const targetScore = Number(row.dataset.targetScore);
        if (numEl && !Number.isNaN(targetScore)) {
          let stepN = 0;
          const steps = 10;
          const iv = window.setInterval(() => {
            stepN++;
            numEl.textContent = String(Math.round(targetScore * stepN / steps));
            if (stepN >= steps) {
              window.clearInterval(iv);
              numEl.textContent = String(targetScore);
            }
          }, 45);
        }
      }, i * 90);
    });
    window.setTimeout(() => {
      root.querySelectorAll('.score-reveal-delayed').forEach(el => el.classList.add('score-reveal-visible'));
    }, 380);
  });
}

async function sendModuleCoachMessage(opts) {
  const {
    module, message, mode, action, messages, threadId,
    errId, btnId, inputId,
    displayMessage, restoreInputOnError = true,
    triggerBtnId, triggerBtnLabel
  } = opts;
  const errEl = document.getElementById(errId);
  const btn = document.getElementById(btnId);
  const input = document.getElementById(inputId);
  const triggerBtn = triggerBtnId ? document.getElementById(triggerBtnId) : null;
  const threadLabel = displayMessage || (action ? (triggerBtnLabel || '处理中') : message);

  if (errEl) { errEl.hidden = true; errEl.textContent = ''; }
  messages.push({ role: 'user', content: threadLabel });
  if (input) input.value = '';
  renderModuleThread(threadId, messages);
  if (btn && !triggerBtnId) { btn.disabled = true; btn.textContent = '生成中…'; }
  if (triggerBtn) {
    triggerBtn.disabled = true;
    triggerBtn.dataset.prevLabel = triggerBtn.textContent;
    triggerBtn.textContent = (triggerBtnLabel || '处理中') + '…';
  }
  syncExtraNotesFromDom();
  saveProfileFromDom();
  try {
    const payload = {
      accessCode,
      userId: userAccountId,
      contextModule: module,
      intake: buildCoachIntakeFromProfile(),
      history: module === 'resume'
        ? getResumeCoachHistory(messages.slice(0, -1))
        : module === 'interview'
          ? getInterviewCoachHistory(messages.slice(0, -1))
          : messages.slice(0, -1)
    };
    if (action) payload.action = action;
    else {
      payload.message = message;
      payload.mode = mode || '';
    }
    const res = await fetch('/api/coach', {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify(payload)
    });
    const raw = await res.text();
    let data = {};
    try {
      data = raw ? JSON.parse(raw) : {};
    } catch {
      if (!res.ok) throw new Error(raw.slice(0, 300) || '请求失败（HTTP ' + res.status + '）');
    }
    if (!res.ok) {
      throw new Error(data.error || raw.slice(0, 300) || '请求失败（HTTP ' + res.status + '）');
    }
    messages.push({ role: 'assistant', content: data.reply || '' });
    renderModuleThread(threadId, messages);
  } catch (e) {
    if (errEl) {
      errEl.hidden = false;
      errEl.textContent = e.message || '发送失败';
    }
    messages.pop();
    renderModuleThread(threadId, messages, opts.emptyHint);
    if (restoreInputOnError && input && message) input.value = message;
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = btnId === 'resumeSendBtn' || btnId === 'interviewSendBtn' ? '追问' : '发送'; }
    if (triggerBtn) {
      triggerBtn.disabled = false;
      triggerBtn.textContent = triggerBtn.dataset.prevLabel || triggerBtnLabel || '完成';
    }
  }
}

function detectCoachIntentLocal(text) {
  const t = String(text || '').trim();
  if (!t) return null;
  const rules = [
    [/完整|落地方案|规划.*AI\s*项目|转\s*AI\s*产品/i, 'full-report'],
    [/迭代|无面试|没回复|demo.*弱|优化.*项目/i, 'project-iteration'],
    [/简历|诊断|改写|优化简历/i, 'resume-diagnosis'],
    [/面试防御|追问|讲项目|被问穿|准备面试/i, 'interview-defense'],
    [/没有.*项目|项目方向|找方向/i, 'project-direction'],
    [/AI\s*产品|RAG|Agent|评测|Eval|badcase/i, 'ai-pm-qa']
  ];
  for (const [re, mode] of rules) {
    if (re.test(t)) return mode;
  }
  return null;
}

async function loadReviewExtras(topicId, scenario, answer) {
  const extrasHost = document.getElementById('scenarioExtrasHost-' + topicId);
  const respHost = document.getElementById('resp-body-' + topicId);
  const host = extrasHost || respHost;
  if (!host) return;
  const labels = { framework: '回答框架', rubric: '评分标准', compare: '参考对比' };
  const loadingHtml = '<div class="review-extras"><p class="stream-status">加载框架与对照…</p></div>';
  if (extrasHost) {
    extrasHost.innerHTML = loadingHtml;
  } else {
    const extras = document.createElement('div');
    extras.className = 'review-extras';
    extras.innerHTML = '<p class="stream-status">加载框架与对照…</p>';
    host.appendChild(extras);
  }

  const modes = ['framework', 'rubric', 'compare'];
  const results = await Promise.all(modes.map(async mode => ({ mode, data: await fetchV2Analyze(topicId, mode, answer) })));

  const blocksHtml = results.map(({ mode, data }) => {

    return `<details class="review-extra-block"${open}><summary>${labels[mode]}</summary><div class="review-extra-body">${body}</div></details>`;
  }).join('');

    extrasHost.innerHTML = `<div class="review-extras">${blocksHtml}</div>`;

function renderV2PrepHtml(mode, st, raw) {

      (st.steps || []).map(s => `<p><strong>${escapeHtml(s.title)}</strong> ${escapeHtml(s.hint)}</p>`).join('') +
      (st.mustMention?.length ? `<h5>必须覆盖</h5><p>${st.mustMention.map(escapeHtml).join(' · ')}</p>` : '');
  }
  if (mode === 'rubric') {
    return `<h5>题型：${escapeHtml(st.questionType || '')}</h5>` +
      (st.dimensions || []).map(d => `<p><strong>${escapeHtml(d.name)}</strong> · 5分：${escapeHtml(d.excellent || '')}</p>`).join('');
  }
  if (mode === 'compare') {

      (st.missing?.length ? `<h5>遗漏</h5><p>${st.missing.map(escapeHtml).join(' · ')}</p>` : '') +
      (st.rewriteHint ? `<p>${escapeHtml(st.rewriteHint)}</p>` : '');
  }
  return escapeHtml(JSON.stringify(st));
}

async function toggleV2Voice(topicId) {
  const btn = document.getElementById('voice-' + topicId);
  const ta = document.getElementById('answer-' + topicId);
  if (!btn || !ta) return;
  if (v2RecorderByTopic[topicId]?.recording) { v2RecorderByTopic[topicId].recorder.stop(); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const recorder = new MediaRecorder(stream);
    const chunks = [];
    recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
    recorder.onstop = async () => {
      btn.classList.remove('recording'); btn.textContent = '语音输入';
      v2RecorderByTopic[topicId] = { recording: false };
      stream.getTracks().forEach(tr => tr.stop());
      const blob = new Blob(chunks, { type: 'audio/webm' });
      const b64 = await new Promise((resolve, reject) => {
        const r = new FileReader(); r.onload = () => resolve(String(r.result).split(',')[1]); r.onerror = reject; r.readAsDataURL(blob);
      });
      btn.textContent = '转写中…';
      try {
        const res = await fetch('/api/chat', { method: 'POST', headers: authHeaders(), body: JSON.stringify({ accessCode, userId: userAccountId, tool: 'transcribe', audioBase64: b64, mimeType: 'audio/webm' }) });
        const data = await res.json();
        if (res.ok && data.text) ta.value = (ta.value ? ta.value + '\n' : '') + data.text;
        else alert(data.error || '转写失败');
      } catch (e) { alert(e.message); }
      btn.textContent = '语音输入';
    };
    recorder.start();
    v2RecorderByTopic[topicId] = { recording: true, recorder };
    btn.classList.add('recording'); btn.textContent = '停止录音';
  } catch { alert('无法访问麦克风'); }
}

function resolveSystemPrompt(scenario, fallbackPrompt) {
  const text = String(scenario || '');
  const tag = text.match(/^【([^·】]+)·([^】]+)】/);
  const map = topicMap();
  if (tag) {
    const industry = tag[1];
    const kind = tag[2].split('·')[0];
    const mianjingMap = {
      需求: 'user', 决策: 'decision', 数据: 'data', 增长: 'growth', 留存: 'retention',
      竞品: 'competitor', 功能: 'feature', 危机: 'crisis', 活动: 'content',
      实习: 'iv-exp', 行为: 'iv-self', 规划: 'iv-career', 产品: 'iv-pm', AI: 'iv-pm',
      实操: 'iv-skills', 估算: 'iv-skills', 运营: 'iv-ops', 综合: 'iv-misc',
      策略: 'iv-open', 设计: 'prod-open', 变现: 'biz-monetize', 笔试: 'iv-misc'
    };
    if (industry === '面经') {
      const topicId = mianjingMap[kind];
      const tp = topicId && map.get(topicId);
      if (tp?.systemPrompt) return tp.systemPrompt;
    }
    const industryMap = {
      OTA: { 需求: 'user', 决策: 'decision', 数据: 'data', 竞品: 'competitor', 增长: 'growth', 功能: 'feature', 危机: 'crisis', 开放: 'iv-open' },
      电商: { 需求: 'user', 决策: 'decision', 数据: 'data', 竞品: 'competitor', 增长: 'growth', 功能: 'feature', 危机: 'crisis' },
      社区: { 需求: 'user', 决策: 'decision', 数据: 'data', 竞品: 'competitor', 增长: 'growth', 功能: 'feature', 危机: 'crisis' },
      即时零售: { 需求: 'user', 决策: 'decision', 数据: 'data' }
    };
    const topicId = industryMap[industry]?.[kind];
    const tp = topicId && map.get(topicId);
    if (tp?.systemPrompt) return tp.systemPrompt;
  }
  if (/^【AI PM/.test(text) || /^【AI·/.test(text)) {
    const pm = map.get('iv-pm');
    if (pm?.systemPrompt) return pm.systemPrompt;
  }
  if (/^【创作者运营/.test(text)) {
    const ops = map.get('iv-ops');
    if (ops?.systemPrompt) return ops.systemPrompt;
  }
  if (/^【面经/.test(text) || /^【面试/.test(text) || /面试题/.test(text)) {
    const pm = map.get('iv-pm');
    if (pm?.systemPrompt) return pm.systemPrompt;
  }
  return fallbackPrompt;
}

function paginateCardBody(text, maxChars = 240) {
  const raw = String(text || '').trim();
  if (!raw) return [''];
  if (raw.length <= maxChars) return [raw];
  const pages = [];
  const paras = raw.split(/\n\n+/).filter(Boolean);
  let buf = '';
  const flush = () => {
    if (buf.trim()) { pages.push(buf.trim()); buf = ''; }
  };
  const pushLong = (p) => {
    let rest = p;
    while (rest.length > maxChars) {
      let cut = rest.lastIndexOf('。', maxChars);
      if (cut < maxChars * 0.35) cut = rest.lastIndexOf('\n', maxChars);
      if (cut < maxChars * 0.35) cut = maxChars;
      pages.push(rest.slice(0, cut).trim());
      rest = rest.slice(cut).trim();
    }
    if (rest) buf = rest;
  };
  for (const p of paras) {
    const next = buf ? `${buf}\n\n${p}` : p;
    if (next.length <= maxChars) { buf = next; continue; }
    flush();
    if (p.length > maxChars) pushLong(p);
    else buf = p;
  }
  flush();
  return pages.length ? pages : [raw];
}

  const bi = Math.max(0, Math.min(bodyPageIndex, bodyPages.length - 1));
  const bodyText = bodyPages[bi];
  const bodyNav = bodyPages.length > 1
    ? `<button type="button" class="kc-nav kc-body-prev" ${bi <= 0 ? 'disabled' : ''}>上一页</button>

       <button type="button" class="kc-nav kc-body-next" ${bi >= bodyPages.length - 1 ? 'disabled' : ''}>下一页</button>`
    : '';
  return `<section class="knowledge-flat-viewer cat-${escapeHtml(card.sectionCat || 'ops')}" data-card-id="${escapeAttr(card.id || '')}">
    <div class="knowledge-section-head">
      <h3>${escapeHtml(card.sectionTitle || '')}</h3>
      <span class="knowledge-counter">${ci + 1} / ${flat.length}</span>
    </div>
    <article class="knowledge-card knowledge-card-single">
      <h4>${escapeHtml(card.title)}</h4>
      <div class="kc-tags">${(card.tags || []).map(t => `<span class="kc-tag">${escapeHtml(t)}</span>`).join('')}</div>
      <div class="kc-body kc-body-paged">${renderKnowledgeMarkdownish(bodyText)}</div>
    </article>
    ${bodyNav ? `<div class="mission-read-pager">${bodyNav}</div>` : ''}
    <div class="knowledge-stack-nav" aria-label="卡片翻页">
      <button type="button" class="kc-nav kc-card-prev" ${ci <= 0 ? 'disabled' : ''} aria-label="上一张">← 上一张</button>
      <span class="knowledge-pager-pos">${ci + 1} / ${flat.length}</span>
      <button type="button" class="kc-nav kc-card-next" ${ci >= flat.length - 1 ? 'disabled' : ''} aria-label="下一张">下一张 →</button>
    </div>
  </section>`;
}

function bindKnowledgeFlatPager(flat) {
  const root = document.getElementById('knowledgeFlatViewer');
  if (!root || !flat.length) return;
  const rerender = () => {
    root.innerHTML = renderKnowledgeFlatViewerHtml(flat, knowledgeFlatIndex, knowledgeBodyPageIndex);
    bindKnowledgeFlatPager(flat);
  };
  root.querySelector('.kc-card-prev')?.addEventListener('click', () => {
    if (knowledgeFlatIndex <= 0) return;
    knowledgeFlatIndex -= 1;
    knowledgeBodyPageIndex = 0;
    rerender();
  });
  root.querySelector('.kc-card-next')?.addEventListener('click', () => {
    if (knowledgeFlatIndex >= flat.length - 1) return;
    knowledgeFlatIndex += 1;
    knowledgeBodyPageIndex = 0;
    rerender();
  });
  root.querySelector('.kc-body-prev')?.addEventListener('click', () => {
    if (knowledgeBodyPageIndex <= 0) return;
    knowledgeBodyPageIndex -= 1;
    rerender();
  });
  root.querySelector('.kc-body-next')?.addEventListener('click', () => {
    const pages = flat[knowledgeFlatIndex]?.bodyPages || [''];
    if (knowledgeBodyPageIndex >= pages.length - 1) return;
    knowledgeBodyPageIndex += 1;
    rerender();
  });
  let touchX = 0;
  root.addEventListener('touchstart', e => { touchX = e.changedTouches[0].clientX; }, { passive: true, once: true });
  root.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) < 40) return;
    if (dx < 0 && knowledgeFlatIndex < flat.length - 1) {
      knowledgeFlatIndex += 1;
      knowledgeBodyPageIndex = 0;
      rerender();
    } else if (dx > 0 && knowledgeFlatIndex > 0) {
      knowledgeFlatIndex -= 1;
      knowledgeBodyPageIndex = 0;
      rerender();
    }
  }, { passive: true, once: true });
}

function getKnowledgePage(pageId) {
  return KNOWLEDGE_PAGES.find(p => p.id === pageId) || KNOWLEDGE_PAGES[0];
}

function knowledgeSectionsForPage(pageId) {
  const page = getKnowledgePage(pageId);
  const idSet = new Set(page.sectionIds);
  return KNOWLEDGE.filter(sec => idSet.has(sec.id));
}

function knowledgeCardCountForPage(page) {
  return page.sectionIds.reduce((n, sid) => {
    const sec = KNOWLEDGE.find(s => s.id === sid);
    return n + (sec?.cards?.length || 0);
  }, 0);
}

function findKnowledgePageForCard(cardId) {
  for (const page of KNOWLEDGE_PAGES) {
    for (const sid of page.sectionIds) {
      const sec = KNOWLEDGE.find(s => s.id === sid);
      if (sec?.cards?.some(c => c.id === cardId)) return page.id;
    }
  }
  return null;
}

function setKnowledgePage(pageId) {
  if (!getKnowledgePage(pageId)) return;
  knowledgePageId = pageId;
  localStorage.setItem('knowledgePageId', knowledgePageId);
  knowledgeFlatIndex = 0;
  knowledgeBodyPageIndex = 0;
  if (agentScene === 'kb' && document.getElementById('kbCanvasRoot')) {
    renderKbReadPanel();
  } else {
    renderKbView();
  }
  const pager = document.getElementById('knowledgePager');
  if (pager) pager.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function knowledgePagerHtml() {
  const pageIndex = KNOWLEDGE_PAGES.findIndex(p => p.id === knowledgePageId);
  const page = getKnowledgePage(knowledgePageId);
  const btns = KNOWLEDGE_PAGES.map(p =>
    `<button type="button" class="knowledge-page-btn cat-${p.cat}${p.id === knowledgePageId ? ' active' : ''}" data-page="${escapeAttr(p.id)}">${escapeHtml(p.label)}<span class="kpage-count">${knowledgeCardCountForPage(p)}</span></button>`
  ).join('');
  const prev = pageIndex > 0 ? KNOWLEDGE_PAGES[pageIndex - 1] : null;
  const next = pageIndex < KNOWLEDGE_PAGES.length - 1 ? KNOWLEDGE_PAGES[pageIndex + 1] : null;
  return `<nav class="knowledge-pager" id="knowledgePager" aria-label="知识库分页">
    ${btns}
    <p class="knowledge-page-hint">${escapeHtml(page.hint)} · 本页 ${knowledgeCardCountForPage(page)} 张卡</p>
  </nav>
  <div class="knowledge-pager-nav" aria-label="翻页">
    <button type="button" id="knowledgePrevPage" ${prev ? '' : 'disabled'}>${prev ? '← ' + escapeHtml(prev.label) : '已是第一页'}</button>
    <span class="knowledge-pager-pos">${pageIndex + 1} / ${KNOWLEDGE_PAGES.length}</span>
    <button type="button" id="knowledgeNextPage" ${next ? '' : 'disabled'}>${next ? escapeHtml(next.label) + ' →' : '已是最后一页'}</button>
  </div>`;
}

function bindKnowledgePager() {
  document.querySelectorAll('.knowledge-page-btn').forEach(btn => {
    btn.onclick = () => setKnowledgePage(btn.dataset.page);
  });
  const prev = document.getElementById('knowledgePrevPage');
  const next = document.getElementById('knowledgeNextPage');
  const idx = KNOWLEDGE_PAGES.findIndex(p => p.id === knowledgePageId);
  if (prev && idx > 0) prev.onclick = () => setKnowledgePage(KNOWLEDGE_PAGES[idx - 1].id);
  if (next && idx < KNOWLEDGE_PAGES.length - 1) next.onclick = () => setKnowledgePage(KNOWLEDGE_PAGES[idx + 1].id);
}

function scrollToKnowledgeCard(cardId) {
  if (!cardId) return;
  const pageId = findKnowledgePageForCard(cardId);
  if (pageId && pageId !== knowledgePageId) {
    knowledgePageId = pageId;
    localStorage.setItem('knowledgePageId', knowledgePageId);
  }
  const flat = knowledgeFlatCardsForPage(knowledgePageId);
  const index = flat.findIndex(c => c.id === cardId);
  if (index >= 0) {
    knowledgeFlatIndex = index;
    knowledgeBodyPageIndex = 0;
  }
  if (agentScene !== 'kb' || !document.getElementById('kbCanvasRoot')) {
    renderKbView(cardId);
    return;
  }
  renderKbReadPanel(cardId);
  setTimeout(() => {
    document.querySelector(`.knowledge-flat-viewer[data-card-id="${CSS.escape(cardId)}"]`)

}

function escapeAttr(s) {

}
