<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>运营思维训练器</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --surface2: #f1efe8;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text2: #6b6b67;
    --text3: #9e9e99;
    --accent: #534AB7;
    --accent-light: #eeedfe;
    --accent-dark: #3c3489;
    --success: #3b6d11;
    --success-bg: #eaf3de;
    --danger: #b3261e;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #181816;
      --surface: #222220;
      --surface2: #2c2c2a;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.18);
      --text: #f0efe8;
      --text2: #a0a09a;
      --text3: #6b6b67;
      --accent: #7F77DD;
      --accent-light: #26215c;
      --accent-dark: #afa9ec;
      --success: #97c459;
      --success-bg: #173404;
      --danger: #f2a39f;
    }
  }

  html { font-size: 16px; }
  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  .page { max-width: 780px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

  .header { margin-bottom: 2.5rem; }
  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-light);
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 10px;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 8px;
  }
  .header p { font-size: 15px; color: var(--text2); max-width: 520px; }

  .key-section {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 14px;
    padding: 1.25rem;
    margin-bottom: 2rem;
  }
  .key-section label { font-size: 13px; color: var(--text2); display: block; margin-bottom: 8px; }
  .key-row { display: flex; gap: 8px; }
  .key-row input {
    flex: 1;
    height: 38px;
    padding: 0 12px;
    font-size: 13px;
    font-family: monospace;
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .key-row input:focus { border-color: var(--accent); }
  .btn-save {
    height: 38px;
    padding: 0 18px;
    font-size: 13px;
    font-weight: 500;
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .btn-save:hover { opacity: 0.85; }
  .key-tip { margin-top: 8px; font-size: 12px; color: var(--text3); }
  .key-status { font-size: 12px; color: var(--success); margin-top: 8px; display: none; }
  .key-error { font-size: 12px; color: var(--danger); margin-top: 8px; display: none; }

  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .tab {
    padding: 7px 16px;
    font-size: 13px;
    font-weight: 500;
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--surface);
    color: var(--text2);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab:hover:not(.active) { background: var(--surface2); color: var(--text); }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .panel { display: none; }
  .panel.active { display: block; }

  .scenario-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 1.25rem;
  }
  .scenario-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .scenario-text { font-size: 15px; color: var(--text); line-height: 1.7; }

  .field-label { font-size: 13px; color: var(--text2); margin-bottom: 8px; margin-top: 1.25rem; }
  textarea {
    width: 100%;
    min-height: 100px;
    padding: 12px 14px;
    font-size: 14px;
    font-family: 'Noto Sans SC', sans-serif;
    line-height: 1.7;
    background: var(--surface);
    color: var(--text);
    border: 0.5px solid var(--border2);
    border-radius: 10px;
    resize: vertical;
    outline: none;
    transition: border-color 0.15s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text3); }

  .btn-row { display: flex; gap: 8px; margin-top: 1rem; align-items: center; flex-wrap: wrap; }
  .btn-primary {
    height: 38px;
    padding: 0 20px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:active { transform: scale(0.97); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-ghost {
    height: 38px;
    padding: 0 16px;
    font-size: 13px;
    font-family: 'Noto Sans SC', sans-serif;
    background: transparent;
    color: var(--text2);
    border: 0.5px solid var(--border2);
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }

  .response-area {
    margin-top: 1.25rem;
    border: 0.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: none;
  }
  .response-area.visible { display: block; }
  .response-header {
    padding: 9px 16px;
    background: var(--surface2);
    border-bottom: 0.5px solid var(--border);
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .response-body {
    padding: 1.25rem 1.5rem;
    font-size: 14px;
    line-height: 1.9;
    color: var(--text);
    white-space: pre-wrap;
    background: var(--surface);
  }

  .dots { display: inline-flex; gap: 4px; padding: 8px 0; }
  .dots span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text3);
    animation: pulse 1.2s ease-in-out infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

  .footer {
    margin-top: 4rem;
    padding-top: 1.5rem;
    border-top: 0.5px solid var(--border);
    font-size: 12px;
    color: var(--text3);
    text-align: center;
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="badge">AI · 运营</div>
    <h1>运营思维训练器</h1>
    <p>真实业务场景 × AI 点评，训练你的决策判断力——不只是生成内容，而是学会思考。</p>
  </div>

  <div class="key-section">
    <label>访问码</label>
    <div class="key-row">
      <input type="password" id="savedCode" placeholder="请输入访问码" autocomplete="off" />
      <button class="btn-save" onclick="saveCode()">保存</button>
    </div>
    <div class="key-tip">访问码仅保存在本地浏览器，不会上传。没有访问码？找站长要一个。</div>
    <div class="key-status" id="keyStatus">✓ 已保存访问码，可以开始练习了</div>
    <div class="key-error" id="keyError"></div>
  </div>

  <div class="tabs" id="tabs"></div>
  <div id="panels"></div>

  <div class="footer">运营思维训练器 · Powered by Claude · 仅供学习使用</div>
</div>

<script>
const TOPICS = [
  {
    id: 'user',
    label: '用户需求挖掘',
    fieldLabel: '你认为用户的核心需求是什么？表面需求和深层需求分别是？',
    placeholder: '写下你的分析思路...',
    scenarios: [
      '一款健身 App，用户在应用商店给出大量一星评价，留言写的是"功能太少""界面丑"。产品团队准备大改界面和增加功能。',
      '外卖平台上，用户反复投诉"配送太慢"，客服数据显示这是第一大投诉类别。运营团队决定向骑手施压要求提速。',
      '在线教育产品，用户完课率只有 12%。用户反馈说"课程内容太难""老师讲得不好"。团队准备换讲师。',
      '一款社交 App，用户频繁反馈"朋友都不用这个"。产品团队认为应该做更多推广活动来拉新。'
    ],
    systemPrompt: `你是一位资深互联网产品运营专家，专注于用户需求分析。你的任务是点评一位运营新手的分析，帮助他建立"挖掘核心需求"的思维框架。

点评要求：
1. 先肯定他答对的部分（如果有）
2. 指出他分析中遗漏或错误的地方
3. 用"表面需求 vs 核心需求"的框架给出专业分析
4. 解释正确的用户需求挖掘方法（比如 Jobs-to-be-Done、5Why等）
5. 给出 1-2 个实际行动建议

语气：像一个耐心的导师，鼓励为主。回复控制在 300 字以内，使用中文。`
  },
  {
    id: 'decision',
    label: '业务决策推演',
    fieldLabel: '你会做什么决策？为什么这么做？预期带来什么结果？',
    placeholder: '说明你的决策逻辑和业务理由...',
    scenarios: [
      '你是一款 B 端 SaaS 产品的运营，月活跃用户增长停滞了 3 个月。你手上有 50 万预算，该怎么用？',
      '你负责一款读书 App，发现 30 岁以上用户留存率比年轻用户高 40%，但目前所有运营活动都在针对年轻人。你会怎么做？',
      '电商平台大促前一个月，你要决定：是做满减活动还是做会员专属折扣，二选一。你怎么做决策？',
      '你的产品即将上线一个新功能，产品经理希望做大规模推送通知，运营希望做分层精准推送。你会支持哪一方？理由是什么？'
    ],
    systemPrompt: `你是一位资深互联网运营总监，专注于业务决策和增长策略。你的任务是点评一位运营新手的决策分析。

点评要求：
1. 评估他的决策逻辑是否清晰
2. 指出他有没有说清楚"为什么做"和"能带来什么"
3. 给出专业的决策框架（比如：目标-路径-资源-风险）
4. 补充他遗漏的关键考量点
5. 给出你的专业建议

语气：像一个严格但公正的上级，帮助他学会"讲清楚决策逻辑"。回复控制在 300 字以内，使用中文。`
  },
  {
    id: 'data',
    label: '数据异常分析',
    fieldLabel: '数据异常可能的原因是什么？你会怎么排查？接下来怎么行动？',
    placeholder: '写下你的排查思路和行动方案...',
    scenarios: [
      '某社区 App 上周新用户注册量突然下降 35%，但老用户活跃度正常，广告投放没有变化。你怎么排查？',
      '电商平台本月转化率从 3.2% 跌到 1.8%，同期流量增加了 20%。可能发生了什么？',
      '一款工具 App，某个核心功能的日均使用次数上周突然增加了 200%，但没有做任何推广。你会怎么看待这个数据？',
      '用户调研 NPS 分数本季度从 42 跌到 28，但同期营收增长了 15%。这两个数据同时存在说明了什么？'
    ],
    systemPrompt: `你是一位资深数据运营专家。你的任务是点评一位运营新手对数据异常的排查思路。

点评要求：
1. 评估他的排查逻辑是否系统
2. 指出他遗漏了哪些可能的原因
3. 教他正确的数据异常排查框架（比如：分层拆解、对比维度、假设验证）
4. 说明"数据驱动运营"的正确姿势
5. 给出行动建议

语气：像一个喜欢教学的分析师，帮他建立系统的数据思维。回复控制在 300 字以内，使用中文。`
  },
  {
    id: 'competitor',
    label: '竞品拆解',
    fieldLabel: '这个竞品动作背后的逻辑是什么？他们想解决什么问题？你的产品应该怎么应对？',
    placeholder: '分析竞品决策背后的业务逻辑...',
    scenarios: [
      '微信读书突然推出"免费读"活动，所有书籍限时免费。作为某竞品读书 App 的运营，你怎么分析这个动作？',
      '某头部外卖平台开始大力推广"月卡"订阅制，每月 15 元享受多项权益。这背后是什么战略意图？',
      '抖音开始在视频下方测试"边看边买"功能，和淘宝的直播电商正面交锋。作为淘宝直播的运营，你应该如何应对？',
      '你的竞品刚刚宣布开放 API，允许第三方开发者接入。这个决策的背后逻辑是什么，对你意味着什么？'
    ],
    systemPrompt: `你是一位有丰富竞品分析经验的产品运营专家。你的任务是点评一位运营新手对竞品动作的分析。

点评要求：
1. 评估他的分析是否抓住了竞品动作的核心逻辑
2. 补充他遗漏的战略层面考量
3. 教他竞品分析的正确方法（战略意图、用户价值、市场影响）
4. 给出应对建议框架
5. 提醒他避免哪些常见误判

语气：像一个见多识广的导师，帮他学会"看透"竞品动作。回复控制在 300 字以内，使用中文。`
  },
  {
    id: 'growth',
    label: '增长 / AARRR',
    fieldLabel: '你会从 AARRR（获客-激活-留存-付费-传播）哪个环节切入？怎么设计这个动作？预期指标变化？',
    placeholder: '说出你切入的环节、动作设计和预期指标...',
    scenarios: [
      '一款记账 App，DAU 10 万，付费转化率 0.8%，行业平均 2.5%。CEO 要求在不增加预算的前提下，3 个月内把付费率拉到 2%。你怎么做？',
      '一款 AI 写作工具，新用户注册当天体验完产品后，第二天回访率只有 15%。用户访谈反馈"试过觉得不错但想不起来用"。你怎么提升 D1 留存？',
      '某社区产品，月活 50 万，但用户邀请新用户的比例只有 3%。产品本身有较强的传播价值（用户分享内容会被点赞）。你怎么设计"传播"环节的增长动作？',
      '一款工具型 App，激活率（注册后完成核心动作）只有 35%。竞品平均在 60% 以上。新用户在哪一步流失你不知道，你会怎么开始？'
    ],
    systemPrompt: `你是一位资深增长运营专家，熟悉 AARRR 模型和增长黑客方法论。你的任务是点评一位运营新手对增长问题的分析。

点评要求：
1. 评估他对增长问题的诊断是否到位（找对环节比下手快更重要）
2. 检查他的方案是否有可量化的指标和验证逻辑
3. 用 AARRR 框架补充他可能遗漏的环节（注意：增长不一定从拉新做起）
4. 教他"增长不是营销活动，是系统性优化"的思维
5. 给出 1-2 个可立即执行的实验设计建议

语气：像一个数据驱动的增长 leader，理性但不冰冷。回复控制在 300 字以内，使用中文。`
  },
  {
    id: 'retention',
    label: '用户分层 / 留存',
    fieldLabel: '你会怎么对用户分层？针对不同层级的策略是什么？怎么验证策略有效？',
    placeholder: '写下你的分层逻辑和差异化运营方案...',
    scenarios: [
      '一款电商 App，月活 200 万。运营团队过去半年所有的活动（满减、优惠券、推送）都是全量用户发送，付费转化率持续下滑。你接手后会怎么重构运营策略？',
      '一款付费订阅型 SaaS 产品，年流失率 35%。CEO 想做"挽留活动"。但你不知道流失的用户是哪类用户、什么时候开始不活跃、流失前有什么信号。你的第一步是什么？',
      '一款健身 App 的核心用户分两类：①每周打卡 5 次以上的硬核用户（占 8%）②每周打卡 1-2 次的休闲用户（占 60%）。运营资源有限，你优先服务哪一类？理由是什么？',
      '某内容平台 30 天未活跃用户占总用户 40%，召回成本越来越高且效果差。有人建议"放弃这部分用户，集中资源服务活跃用户"，你怎么看？'
    ],
    systemPrompt: `你是一位资深用户运营专家，精通用户生命周期管理和分层运营。你的任务是点评一位运营新手对用户分层和留存策略的分析。

点评要求：
1. 评估他的分层维度是否合理（RFM、生命周期阶段、价值贡献、行为特征等）
2. 检查他是否做到"差异化运营"而不是"一刀切发券"
3. 提醒他流失定义、流失预警、召回成本的核心概念
4. 教他"留存的本质是给用户持续创造价值"，而不是发福利
5. 给出可落地的运营动作建议

语气：像一个细腻、懂用户的运营 leader。回复控制在 300 字以内，使用中文。`
  },
  {
    id: 'content',
    label: '文案 / 活动传播力',
    fieldLabel: '这个文案/活动机制能不能传播？为什么？如果让你改，你会改哪里？',
    placeholder: '分析传播潜力，给出修改建议...',
    scenarios: [
      '某教育产品双 11 活动文案："全场课程 5 折，限时 3 天，错过等一年！" 落地页转化率只有 1.2%，低于行业平均。你会怎么诊断和改写？',
      '一款理财 App 想做"邀请好友双方各得 30 元"的拉新活动。市场部认为 30 元已经是行业最高水平，但分享率只有 5%。问题在哪里？',
      '某品牌做了一个"晒单赢奖品"的小红书活动，奖品价值 5000 元的旅行套餐，但只有 80 个人参与。问题出在哪？',
      '运营写了一条 push 文案："你有一份神秘惊喜待领取 →" 打开率只有 1.8%。同期另一条："你的优惠券将在 24 小时后过期" 打开率 7.5%。为什么差距这么大？'
    ],
    systemPrompt: `你是一位资深内容运营和增长营销专家，精通用户心理学和传播规律。你的任务是点评一位运营新手对文案/活动传播力的分析。

点评要求：
1. 评估他是否抓住了"用户为什么会分享/点击"的核心动因
2. 补充传播力分析框架（社交货币、利他、稀缺、情绪、具体性等）
3. 指出文案/机制设计上的具体问题（指向性、紧迫感、利益点、参与门槛）
4. 教他区分"信息文案"和"行动文案"的差异
5. 给出 1-2 个具体的改写或机制调整建议

语气：像一个对文案有手感的资深运营，犀利但有据。回复控制在 300 字以内，使用中文。`
  },
  {
    id: 'crisis',
    label: '危机公关 / 负面舆情',
    fieldLabel: '你的判断是什么？建议立刻做什么、暂时不做什么？给出回应的核心立场和措辞框架。',
    placeholder: '写下你的判断和处置方案...',
    scenarios: [
      '一位拥有 50 万粉丝的博主在微博发帖，指控你公司的产品"数据造假、欺骗消费者"，2 小时内转发 8000+，评论区情绪开始失控。但你内部初步核查认为该指控有部分误解。CEO 让你 1 小时内给出处置方案。',
      '某用户在抖音晒出使用你产品后皮肤过敏的视频，附带就医照片。视频开始发酵（10 万播放）。客服查到该用户确实购买过，但你们的产品有明确警示禁忌人群。法务建议"不回应"，PR 建议"立刻道歉"。你怎么决策？',
      '你的 App 因为系统故障，导致部分用户充值的余额显示为 0，社交媒体上出现大量"骗钱"的指控。技术团队预计 6 小时内修复。这 6 小时你做什么、不做什么？',
      '一篇微信公众号文章爆料你公司"加班严重、压榨员工"，10 万+ 阅读。文章中有部分内容属实、部分内容被夸大。HR、PR、法务给出三种不同建议。作为运营 leader，你会怎么参与决策？'
    ],
    systemPrompt: `你是一位资深品牌公关和危机管理专家，处理过多起一线互联网公司的负面舆情。你的任务是点评一位运营新手对危机事件的处置思路。

点评要求：
1. 评估他对事件性质的判断是否准确（是否区分了"事实问题"、"情绪问题"、"价值观问题"）
2. 检查他的时间窗口意识（黄金 1 小时、6 小时、24 小时的不同动作）
3. 补充危机公关的核心原则（先承认情绪、不否认事实、给出明确动作、不甩锅）
4. 提醒他常见的错误反应（沉默、辩解、攻击爆料人、过度道歉）
5. 给出回应措辞的框架建议（共情 - 事实 - 行动 - 承诺）

语气：像一个见过场面的 PR 老兵，冷静、有判断力、不空谈。回复控制在 300 字以内，使用中文。`
  }
];

let savedCode = '';

const KEY_STORAGE = 'ops-trainer-access-code';

function init() {
  const saved = localStorage.getItem(KEY_STORAGE);
  if (saved) {
    savedCode = saved;
    document.getElementById('savedCode').value = '••••••••••••••••';
    document.getElementById('keyStatus').style.display = 'block';
  }
  renderTopics();
}

function renderTopics() {
  const tabs = document.getElementById('tabs');
  const panels = document.getElementById('panels');
  tabs.innerHTML = '';
  panels.innerHTML = '';

  TOPICS.forEach((t, i) => {
    const tab = document.createElement('button');
    tab.className = 'tab' + (i === 0 ? ' active' : '');
    tab.textContent = t.label;
    tab.onclick = () => switchTab(t.id, tab);
    tabs.appendChild(tab);

    const panel = document.createElement('div');
    panel.className = 'panel' + (i === 0 ? ' active' : '');
    panel.id = 'panel-' + t.id;
    panel.innerHTML = `
      <div class="scenario-card">
        <div class="scenario-label">场景</div>
        <div class="scenario-text" id="scenario-${t.id}"></div>
      </div>
      <div class="field-label">${t.fieldLabel}</div>
      <textarea id="answer-${t.id}" placeholder="${t.placeholder}"></textarea>
      <div class="btn-row">
        <button class="btn-primary" id="btn-${t.id}" onclick="submitAnswer('${t.id}')">提交分析 →</button>
        <button class="btn-ghost" onclick="loadScenario('${t.id}')">换一个场景</button>
      </div>
      <div class="response-area" id="resp-${t.id}">
        <div class="response-header">AI 点评</div>
        <div class="response-body" id="resp-body-${t.id}"></div>
      </div>
    `;
    panels.appendChild(panel);
    loadScenario(t.id);
  });
}

function getTopic(id) {
  return TOPICS.find(t => t.id === id);
}

function saveCode() {
  const input = document.getElementById('savedCode');
  const val = input.value.trim();
  if (!val || val === '••••••••••••••••') return;
  savedCode = val;
  localStorage.setItem(KEY_STORAGE, savedCode);
  input.value = '••••••••••••••••';
  document.getElementById('keyStatus').style.display = 'block';
  document.getElementById('keyError').style.display = 'none';
}

function switchTab(id, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-' + id).classList.add('active');
}

function loadScenario(id) {
  const t = getTopic(id);
  const list = t.scenarios;
  const idx = Math.floor(Math.random() * list.length);
  document.getElementById('scenario-' + id).textContent = list[idx];
  document.getElementById('answer-' + id).value = '';
  document.getElementById('resp-' + id).classList.remove('visible');
}

async function submitAnswer(id) {
  if (!savedCode) {
    showError('请先输入并保存访问码');
    return;
  }
  const answer = document.getElementById('answer-' + id).value.trim();
  if (!answer) {
    alert('请先写下你的分析');
    return;
  }

  const t = getTopic(id);
  const scenario = document.getElementById('scenario-' + id).textContent;
  const btn = document.getElementById('btn-' + id);
  const respArea = document.getElementById('resp-' + id);
  const respBody = document.getElementById('resp-body-' + id);

  btn.disabled = true;
  btn.textContent = '分析中...';
  respArea.classList.add('visible');
  respBody.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Access-Code': savedCode
      },
      body: JSON.stringify({
        topic: id,
        systemPrompt: t.systemPrompt,
        scenario,
        answer
      })
    });
    const data = await res.json();
    if (res.ok && data.text) {
      respBody.textContent = data.text;
    } else if (res.status === 401) {
      respBody.textContent = '访问码无效，请联系站长。';
      showError('访问码无效');
    } else if (res.status === 429) {
      respBody.textContent = data.error || '今日使用次数已达上限，明天再来吧。';
    } else {
      respBody.textContent = '请求失败：' + (data.error || ('HTTP ' + res.status));
    }
  } catch (e) {
    respBody.textContent = '网络错误：' + e.message;
  }

  btn.disabled = false;
  btn.textContent = '提交分析 →';
}

function showError(msg) {
  const el = document.getElementById('keyError');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('keyStatus').style.display = 'none';
}

init();
</script>
